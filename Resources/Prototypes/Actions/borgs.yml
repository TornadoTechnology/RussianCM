- type: entity
  parent: BaseMentalAction # allow reading laws when crit
  id: ActionViewLaws
  name: ent-ActionViewLaws
  description: ent-ActionViewLaws-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_borg.rsi
      state: state-laws
    useDelay: 0.5
  - type: InstantAction
    event: !type:ToggleLawsScreenEvent

- type: entity
  parent: BaseAction
  id: ActionSelectBorgType
  name: ent-ActionSelectBorgType
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_borg.rsi
      state: select-type
    useDelay: 0.5
  - type: InstantAction
    event: !type:BorgToggleSelectTypeEvent
