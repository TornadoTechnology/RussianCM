# base actions

# base prototype for all action entities
- type: entity
  abstract: true
  id: BaseAction
  components:
  - type: Action

# an action that is done all in le head and cant be prevented by any means
- type: entity
  abstract: true
  parent: BaseAction
  id: BaseMentalAction
  components:
  - type: Action
    checkCanInteract: false
    checkConsciousness: false

- type: entity
  abstract: true
  parent: BaseMentalAction
  id: BaseSuicideAction
  components:
  - type: ConfirmableAction
    popup: suicide-action-popup

- type: entity
  abstract: true
  parent: BaseAction
  id: BaseImplantAction
  components:
  - type: InstantAction
    event: !type:ActivateImplantEvent

- type: entity
  abstract: true
  parent: BaseAction
  id: BaseToggleAction
  components:
  - type: InstantAction
    event: !type:ToggleActionEvent

# actions

- type: entity
  parent: BaseAction
  id: ActionScream
  name: ent-ActionScream
  description: ent-ActionScream-desc
  components:
  - type: Action
    useDelay: 20
    icon: Interface/Actions/scream.png
    checkCanInteract: false
  - type: InstantAction
    event: !type:ScreamActionEvent

- type: entity
  parent: BaseMentalAction
  id: ActionTurnUndead
  name: ent-ActionTurnUndead
  description: ent-ActionTurnUndead-desc
  components:
  - type: Action
    icon: Interface/Actions/zombie-turn.png
  - type: InstantAction
    event: !type:ZombifySelfActionEvent

- type: entity
  parent: BaseToggleAction
  id: ActionToggleLight
  name: ent-ActionToggleLight
  description: ent-ActionToggleLight-desc
  components:
  - type: Action
    useDelay: 1
    icon: { sprite: Objects/Tools/flashlight.rsi, state: flashlight }
    iconOn: { sprite: Objects/Tools/flashlight.rsi, state: flashlight-on }
  - type: ActionBlockIfDevoured # RMC14

- type: entity
