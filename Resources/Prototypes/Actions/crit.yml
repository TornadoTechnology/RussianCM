# Actions added to mobs in crit.
- type: entity
  abstract: true
  parent: BaseMentalAction
  id: BaseCritAction
  components:
  - type: Action
    itemIconStyle: NoItem

- type: entity
  parent: BaseCritAction
  id: ActionCritSuccumb
  name: ent-ActionCritSuccumb
  description: ent-ActionCritSuccumb-desc
  components:
  - type: Action
    startDelay: true
    useDelay: 10
    icon:
      sprite: Mobs/Ghosts/ghost_human.rsi
      state: icon
  - type: InstantAction
    event: !type:CritSuccumbEvent

- type: entity
  parent: BaseCritAction
  id: ActionCritFakeDeath
  name: ent-ActionCritFakeDeath
  description: ent-ActionCritFakeDeath-desc
  components:
  - type: Action
    useDelay: 30
    icon:
      sprite: Interface/Actions/actions_crit.rsi
      state: fakedeath
  - type: InstantAction
    event: !type:CritFakeDeathEvent

- type: entity
  parent: ActionCritSuccumb # for use delay
  id: ActionCritLastWords
  name: ent-ActionCritLastWords
  description: ent-ActionCritLastWords-desc
  components:
  - type: Action
    icon:
      sprite: Interface/Actions/actions_crit.rsi
      state: lastwords
  - type: InstantAction
    event: !type:CritLastWordsEvent
