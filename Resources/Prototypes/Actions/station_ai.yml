# Actions
- type: entity
  parent: BaseAction
  id: ActionJumpToCore
  name: ent-ActionJumpToCore
  description: ent-ActionJumpToCore-desc
  components:
  - type: Action
    priority: -9
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: ai_core
  - type: InstantAction
    event: !type:JumpToCoreEvent

- type: entity
  parent: BaseAction
  id: ActionSurvCameraLights
  name: ent-ActionSurvCameraLights
  description: ent-ActionSurvCameraLights-desc
  components:
  - type: Action
    priority: -5
    itemIconStyle: BigAction
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: camera_light
  - type: InstantAction
    event: !type:RelayedActionComponentChangeEvent
      components:
      - type: LightOnCollideCollider
      - type: FixturesChange
        fixtures:
          lightTrigger:
            shape:
              !type:PhysShapeCircle
              radius: 0.35
            density: 80
            hard: false
            layer:
            - GhostImpassable


- type: entity
  parent: BaseMentalAction
  id: ActionAIViewLaws
  name: ent-ActionAIViewLaws
  description: ent-ActionAIViewLaws-desc
  components:
  - type: Action
    priority: -3
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_ai.rsi
      state: state_laws
    useDelay: 0.5
  - type: InstantAction
    event: !type:ToggleLawsScreenEvent
