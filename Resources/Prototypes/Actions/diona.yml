- type: entity
  parent: BaseSuicideAction
  id: DionaGibAction
  name: ent-DionaGibAction
  description: ent-DionaGibAction-desc
  components:
  - type: Action
    icon:
      sprite: Mobs/Species/Diona/organs.rsi
      state: brain
  - type: InstantAction
    event: !type:GibActionEvent {}

- type: entity
  parent: BaseAction
  id: DionaReformAction
  name: ent-DionaReformAction
  description: ent-DionaReformAction-desc
  components:
  - type: Action
    useDelay: 600 # Once every 10 minutes. Keep them dead for a fair bit before reforming
    icon:
      sprite: Mobs/Species/Diona/parts.rsi
      state: full
  - type: InstantAction
    event: !type:ReformEvent {}
