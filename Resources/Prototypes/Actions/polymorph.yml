- type: entity
  parent: BaseAction
  id: ActionRevertPolymorph
  name: ent-ActionRevertPolymorph
  description: ent-ActionRevertPolymorph-desc
  components:
  - type: ConfirmableAction
    popup: revert-polymorph-action-popup
  - type: InstantAction
    event: !type:RevertPolymorphActionEvent

- type: entity
  abstract: true
  parent: BaseAction
  id: BaseActionPolymorph
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 60
  - type: InstantAction
    event: !type:PolymorphActionEvent

- type: entity
  parent: BaseActionPolymorph
  id: ActionPolymorphWizardSpider
  name: ent-ActionPolymorphWizardSpider
  description: ent-ActionPolymorphWizardSpider-desc
  components:
  - type: Action
    icon:
      sprite: Mobs/Animals/spider.rsi
      state: tarantula
  - type: InstantAction
    event: !type:PolymorphActionEvent
      protoId: WizardSpider

- type: entity
  parent: BaseActionPolymorph
  id: ActionPolymorphWizardRod
  name: ent-ActionPolymorphWizardRod
  description: ent-ActionPolymorphWizardRod-desc
  components:
  - type: Action
    icon:
      sprite: Objects/Fun/immovable_rod.rsi
      state: icon
  - type: InstantAction
    event: !type:PolymorphActionEvent
      protoId: WizardRod

- type: entity
  parent: BaseActionPolymorph
  id: ActionPolymorphJaunt
  name: ent-ActionPolymorphJaunt
  description: ent-ActionPolymorphJaunt-desc
  components:
  - type: Magic
  - type: Action
    useDelay: 30
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: jaunt
  - type: InstantAction
    event: !type:PolymorphActionEvent
      protoId: Jaunt
    # TODO: Effect ECS (from cardboard box)
  - type: ActionUpgrade
    effectedLevels:
      2: ActionPolymorphJauntII
      3: ActionPolymorphJauntIII

- type: entity
  parent: ActionPolymorphJaunt
  id: ActionPolymorphJauntII
  name: ent-ActionPolymorphJauntII
  description: ent-ActionPolymorphJauntII-desc
  components:
  - type: Action
    useDelay: 25

- type: entity
  parent: ActionPolymorphJaunt
  id: ActionPolymorphJauntIII
  name: ent-ActionPolymorphJauntIII
  description: ent-ActionPolymorphJauntIII-desc
  components:
  - type: Action
    useDelay: 20
