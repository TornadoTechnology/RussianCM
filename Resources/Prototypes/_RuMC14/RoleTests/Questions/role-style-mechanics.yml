- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCLFPhysician002
  text: 'CLF Physician: как правильно выбирать уровень разрушений?'
  answers:
  - столько, сколько позволит механика
  - столько, сколько нужно для целей и атмосферы, не превращая раунд в бессмысленный гриф
  - максимально быстро вывести всех из игры
