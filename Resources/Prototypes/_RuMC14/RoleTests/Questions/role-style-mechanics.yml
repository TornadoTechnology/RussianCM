# ============================================================
# ROLE-SPECIFIC STYLE AND MECHANICS QUESTIONS
# 10 вопросов на каждую роль. Вопросы подключены через job:<JobId>.
# ============================================================
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCivilianAmbassadorCCA001
  text: Вы играете за дипломатическую роль (Ambassador CCA). Переговоры начинают уходить в угрозы и взаимные обвинения. Какой стиль игры лучше всего сохраняет роль?
  answers:
  - фиксировать позиции сторон, снижать тон, отделять IC-позицию фракции от OOC-конфликта и не превращать разговор в провокацию
  - поддержать наиболее сильную сторону, чтобы быстрее закончить спор
  - публично высмеять слабую позицию оппонента, если это выгодно вашей фракции
  - перейти к ультиматумам, чтобы показать статус дипломатической роли
  correctAnswer: 0
  pools:
  - job:AU14JobCivilianAmbassadorCCA
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCivilianAmbassadorCCA002
  text: 'Ambassador CCA: вам сообщают непроверенную информацию о преступлении другой фракции. Как корректнее использовать её в RP?'
  answers:
  - сразу объявить фракцию виновной, чтобы получить переговорное преимущество
  - обозначить её как неподтверждённое сообщение и запросить проверку или официальный контакт
  - передать слух всем каналам как доказанный факт
  - использовать слух как основание для личного наказания подозреваемых
  correctAnswer: 1
  pools:
  - job:AU14JobCivilianAmbassadorCCA
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCivilianAmbassadorCCA003
  text: 'Ambassador CCA: представитель другой стороны ведёт себя грубо, но ещё не угрожает. Что лучше соответствует стилю дипломатической роли?'
  answers:
  - прекратить все переговоры и объявить сторону враждебной
  - ответить тем же уровнем грубости, чтобы не потерять авторитет
  - сохранять официальный тон, ограничить контакт рамками переговоров и при необходимости привлечь охрану/администрацию колонии IC
  - начать провоцировать его на нарушение, чтобы получить повод для силового решения
  correctAnswer: 2
  pools:
  - job:AU14JobCivilianAmbassadorCCA
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCivilianAmbassadorCCA004
  text: 'Ambassador CCA: вас просят передать военным точные координаты гражданского объекта после частной беседы. Какой вариант корректнее?'
  answers:
  - сфабриковать координаты, чтобы выиграть время
  - передать координаты сразу, если это может понравиться вооружённой стороне
  - передать координаты без контекста, чтобы сохранить нейтральность
  - уточнить IC-основания, риски для некомбатантов и законность передачи информации
  correctAnswer: 3
  pools:
  - job:AU14JobCivilianAmbassadorCCA
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCivilianAmbassadorCCA005
  text: 'Ambassador CCA: какой стиль публичного заявления лучше для дипломатической роли?'
  answers:
  - короткое официальное заявление с фактами, ограничениями и предложением канала связи
  - эмоциональный пост с обвинениями, чтобы поднять мораль союзников
  - анонимная агитация против оппонентов
  - угрозы силой от имени фракции без полномочий
  correctAnswer: 0
  pools:
  - job:AU14JobCivilianAmbassadorCCA
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCivilianAmbassadorCCA006
  text: 'Ambassador CCA: две стороны спорят о праве прохода через территорию. Что лучше сделать?'
  answers:
  - просто выбрать сторону, которая выглядит сильнее
  - уточнить статус территории, безопасность прохода, сопровождающих и письменные условия допуска
  - объявить территорию своей, чтобы спор закончился
  - попросить вооружённых людей решить вопрос на месте
  correctAnswer: 1
  pools:
  - job:AU14JobCivilianAmbassadorCCA
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCivilianAmbassadorCCA007
  text: 'Ambassador CCA: вы получили приказ использовать дипломатический иммунитет для обхода обыска с запрещённым предметом. Что делать?'
  answers:
  - спрятать предмет у помощника
  - согласиться, если предмет нужен фракции
  - не использовать дипломатический статус для обхода правил и запросить законное урегулирование
  - угрожать охране международным скандалом
  correctAnswer: 2
  pools:
  - job:AU14JobCivilianAmbassadorCCA
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCivilianAmbassadorCCA008
  text: 'Ambassador CCA: как лучше вести себя при задержании союзника другой стороной?'
  answers:
  - прервать RP и спорить в OOC
  - попытаться вывести союзника силой под предлогом дипломатии
  - объявить всех задержавших врагами
  - добиваться информации о причине, статусе и процедуре, не мешая законному задержанию физически
  correctAnswer: 3
  pools:
  - job:AU14JobCivilianAmbassadorCCA
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCivilianAmbassadorCCA009
  text: 'Ambassador CCA: другой игрок провоцирует вас на спор о реальной политике. Что правильнее?'
  answers:
  - вернуть разговор в рамки IC-ситуации или прекратить тему
  - ответить реальным политическим примером для убедительности
  - продолжить спор, если он идёт в IC
  - использовать тему как часть дипломатического давления
  correctAnswer: 0
  pools:
  - job:AU14JobCivilianAmbassadorCCA
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobCivilianAmbassadorCCA010
  text: 'Ambassador CCA: в чём хорошая ролевая манера дипломата?'
  answers:
  - руководить всеми вооружёнными группами через авторитет фракции
  - создавать переговорную игру, фиксировать последствия слов и не подменять дипломатию силовым командованием
  - добиваться победы своей стороны любыми средствами
  - вести себя как следователь, охранник и командир одновременно
  correctAnswer: 1
  pools:
  - job:AU14JobCivilianAmbassadorCCA
- type: roleTestQuestion
