  id: RoleStyleMechanicsAU14JobLEOBase001
  text: 'LEOBase: подозреваемый нервничает, но не угрожает. Что лучше?'
  answers:
  - собрать основания, дать понятное требование и не применять силу без необходимости
  - немедленно перейти к задержанию
  - обыскать его “для профилактики”
  - спровоцировать на сопротивление
  correctAnswer: 0
  pools:
  - job:AU14JobLEOBase
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobLEOBase002
  text: 'LEOBase: когда досмотр выглядит наиболее корректно?'
  answers:
  - если персонаж неприятно разговаривает
  - есть разумное основание, понятная цель поиска и минимальное вмешательство
  - если охране скучно
  - если нужно найти повод для ареста
  correctAnswer: 1
  pools:
  - job:AU14JobLEOBase
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobLEOBase003
  text: 'LEOBase: как лучше использовать нелетальную силу?'
  answers:
  - только для наказания после конфликта
  - как первое действие при любом споре
  - как пропорциональную меру, когда предупреждение/приказ не работают или есть риск
  - для ускорения бюрократии
  correctAnswer: 2
  pools:
  - job:AU14JobLEOBase
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobLEOBase004
  text: 'LEOBase: задержанный молчит. Что это означает?'
  answers:
  - можно игнорировать все его права
  - его можно наказать за молчание
  - он автоматически виновен
  - молчание само по себе не отменяет процедуру и не является поводом для унижения
  correctAnswer: 3
  pools:
  - job:AU14JobLEOBase
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobLEOBase005
  text: 'LEOBase: что важнее всего после применения силы?'
  answers:
  - обеспечить безопасность, зафиксировать причину и передать ситуацию по процедуре
  - сразу уйти, чтобы не спорить
  - скрыть применение силы
  - объявить всех свидетелей нарушителями
  correctAnswer: 0
  pools:
  - job:AU14JobLEOBase
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobLEOBase006
  text: 'LEOBase: гражданский стоит в опасной зоне и спорит. Как лучше?'
  answers:
  - сразу применить летальную силу
  - дать понятное законное требование покинуть зону и эскалировать только при отказе/угрозе
  - игнорировать, пока он не погибнет
  - задержать всех рядом
  correctAnswer: 1
  pools:
  - job:AU14JobLEOBase
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobLEOBase007
  text: 'LEOBase: как не превратить охрану в валидхантинг?'
  answers:
  - проверять всех подряд без причины
  - патрулировать все зоны в поиске боя
  - действовать по основаниям, обязанностям и текущей угрозе, а не искать “подозрительных” ради задержаний
  - использовать слухи как доказательства
  correctAnswer: 2
  pools:
  - job:AU14JobLEOBase
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobLEOBase008
  text: 'LEOBase: что делать с изъятым опасным предметом?'
  answers:
  - спрятать без записи
  - оставить себе до конца раунда
  - выдать знакомому сотруднику
  - передать/хранить по процедуре и не использовать как личное имущество
  correctAnswer: 3
  pools:
  - job:AU14JobLEOBase
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobLEOBase009
  text: 'LEOBase: чем отличается строгий стиль охраны от токсичного?'
  answers:
  - строгость опирается на процедуру, ясные требования и уважительный тон
  - строгость разрешает личные оскорбления
  - строгость означает постоянные угрозы
  - разницы нет
  correctAnswer: 0
  pools:
  - job:AU14JobLEOBase
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobLEOBase010
  text: 'LEOBase: при конфликте двух гражданских без оружия лучше сначала...'
  answers:
  - сразу задержать обоих на максимум
  - разделить стороны, выяснить факты и оценить угрозу
  - выбрать сторону, которая говорит увереннее
  - передать конфликт военным
  correctAnswer: 1
  pools:
  - job:AU14JobLEOBase
- type: roleTestQuestion
