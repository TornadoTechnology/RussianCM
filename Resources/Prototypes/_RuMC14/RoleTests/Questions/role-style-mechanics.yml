  - строгость означает постоянные угрозы
  - разницы нет
  correctAnswer: 0
  pools:
  - job:AU14JobWYGuard
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobWYGuard010
  text: 'WYGuard: при конфликте двух гражданских без оружия лучше сначала...'
