  - скрыть применение силы
  - объявить всех свидетелей нарушителями
  correctAnswer: 0
  pools:
  - job:AU14JobWYGuard
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobWYGuard006
  text: 'WYGuard: гражданский стоит в опасной зоне и спорит. Как лучше?'
  answers:
  - сразу применить летальную силу
  - дать понятное законное требование покинуть зону и эскалировать только при отказе/угрозе
  - игнорировать, пока он не погибнет
  - задержать всех рядом
  correctAnswer: 1
  pools:
  - job:AU14JobWYGuard
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobWYGuard007
  text: 'WYGuard: как не превратить охрану в валидхантинг?'
  answers:
  - проверять всех подряд без причины
  - патрулировать все зоны в поиске боя
  - действовать по основаниям, обязанностям и текущей угрозе, а не искать “подозрительных” ради задержаний
  - использовать слухи как доказательства
  correctAnswer: 2
  pools:
  - job:AU14JobWYGuard
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobWYGuard008
  text: 'WYGuard: что делать с изъятым опасным предметом?'
