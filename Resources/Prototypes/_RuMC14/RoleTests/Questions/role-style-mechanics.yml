  id: RoleStyleMechanicsAU14JobCLFPhysician001
  text: 'CLF Physician: вы играете угрозу. Что делает антагонистическую игру качественной?'
  answers:
  - создание интересного конфликта с целями, рисками и последствиями
  - максимальное число убийств любой ценой
  - мгновенное уничтожение ключевых систем без RP
  - использование OOC-знаний для победы
  correctAnswer: 0
  pools:
