  - спрятать без записи
  - оставить себе до конца раунда
  - выдать знакомому сотруднику
  - передать/хранить по процедуре и не использовать как личное имущество
  correctAnswer: 3
  pools:
  - job:AU14JobWYGuard
- type: roleTestQuestion
  id: RoleStyleMechanicsAU14JobWYGuard009
  text: 'WYGuard: чем отличается строгий стиль охраны от токсичного?'
  answers:
  - строгость опирается на процедуру, ясные требования и уважительный тон
