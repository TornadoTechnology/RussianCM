- type: entity
  id: ToolboxEmergencyFilled
  name: ent-ToolboxEmergencyFilled
  parent: ToolboxEmergency
  suffix: ent-ToolboxEmergencyFilled-suffix
  components:
  - type: StorageFill
    contents:
      - id: CrowbarRed
      - id: RadioHandheld
      - id: WelderMini
      - id: FireExtinguisherMini
      # Random lighting item orGroup
      - id: FlashlightLantern
        orGroup: LightingItem
      - id: Flare
        orGroup: LightingItem
      - id: GlowstickBase
        orGroup: LightingItem
      # Low-chance items
      - id: FoodSnackChocolate
        prob: 0.15
      - id: HarmonicaInstrument
        prob: 0.15

