- type: entityTable
  id: RandomMaterialCrateTable
  table: !type:GroupSelector
    children:
    - !type:GroupSelector # regular materials, 10
      weight: 35
      children:
      - id: SheetGlass10
      - id: SheetSteel10
      - id: SheetPlastic10
    - !type:GroupSelector # regular materials, stack
      weight: 30
      children:
      - id: SheetGlass
      - id: SheetSteel
      - id: SheetPlastic
    - !type:GroupSelector # secondary materials, stack
      weight: 30
      children:
      - id: MaterialCloth
      - id: SheetPlasteel
      - id: MaterialWoodPlank
      - id: PartRodMetal
    - !type:GroupSelector # tertiary materials, singles
      weight: 5
      children:
      - id: SheetPlasma1
      - id: SheetUranium1
      - id: IngotGold1
      - id: IngotSilver1

- type: entity
  id: CrateMaterialRandom
  parent: CrateGenericSteel
  name: ent-CrateMaterialRandom
  description: ent-CrateMaterialRandom-desc
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: RandomMaterialCrateTable
        rolls: !type:RangeNumberSelector
          range: 2, 4

- type: entity
  id: CrateMaterialSilo
  parent: CrateGenericSteel
  name: ent-CrateMaterialSilo
  description: ent-CrateMaterialSilo-desc
  components:
  - type: StorageFill
    contents:
    - id: MaterialSiloMachineCircuitboard
    - id: SheetSteel1
      amount: 5
    - id: MicroManipulatorStockPart
      amount: 4
    - id: CableApcStack1
      amount: 2

