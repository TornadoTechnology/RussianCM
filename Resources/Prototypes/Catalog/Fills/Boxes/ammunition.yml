# As opposed to MagazineBox these are boxes of magazines so BoxMagazine
# CaselessRifle
- type: entity
  name: ent-BoxMagazine
  parent: BoxCardboard
  id: BoxMagazine
  description: ent-BoxMagazine-desc
  components:
  - type: Sprite
    layers:
      - state: box_security
      - state: magazine

- type: entity
  name: ent-BoxMagazinePistolCaselessRifle
  parent: BoxMagazine
  id: BoxMagazinePistolCaselessRifle
  description: ent-BoxMagazinePistolCaselessRifle-desc
