#HARDSUITS
#Engineering hardsuit
- type: entity
  id: SuitStorageEngi
  parent: SuitStorageBase
  suffix: ent-SuitStorageEngi-suffix
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillEngineerHardsuit
  - type: AccessReader
    access: [["Engineering"]]

