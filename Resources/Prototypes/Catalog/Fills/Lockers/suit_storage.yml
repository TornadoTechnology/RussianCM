#SOFTSUITS
#Basic EVA
- type: entity
  id: SuitStorageEVA
  parent: SuitStorageBase
  suffix: ent-SuitStorageEVA-suffix
  components:
  - type: StorageFill
    contents:
        - id: OxygenTankFilled
        - id: ClothingOuterHardsuitEVA
        - id: ClothingHeadHelmetEVA
        - id: ClothingMaskBreath

