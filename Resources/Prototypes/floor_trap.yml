- type: entity
  id: CollideFloorTrap
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
    - type: Sprite
      sprite: Tiles/Misc/floortrap.rsi
      state: floortrap
    - type: Fixtures
      fixtures:
        floortrap:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.4,-0.4,0.4,0.4"
          hard: false
          mask:
            - ItemMask
          layer:
            - SlipLayer
    - type: Physics
    - type: Tag
      tags:
        - HideContextMenu

- type: entity
  parent: CollideFloorTrap
  id: CollideFloorTrapSpawn
  name: ent-CollideFloorTrapSpawn
  abstract: true
  components:
    - type: Sprite
      sprite: Tiles/Misc/floortrap.rsi
      state: floortrapspawn

- type: entity
  parent: CollideFloorTrap
  id: FloorTrapExplosion
  name: ent-FloorTrapExplosion
  components:
    - type: TriggerOnCollide
      fixtureID: floortrap
    - type: ExplodeOnTrigger
    - type: Explosive
      explosionType: Default
      totalIntensity: 20.0
      intensitySlope: 5
      maxIntensity: 4
    - type: DeleteOnTrigger

