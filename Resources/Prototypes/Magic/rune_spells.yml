- type: entity
  abstract: true
  parent: BaseAction
  id: BaseRuneAction
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: spell_default

- type: entity
  parent: BaseRuneAction
  id: ActionFlashRune
  name: ent-ActionFlashRune
  description: ent-ActionFlashRune-desc
  components:
  - type: Action
    useDelay: 10
  - type: InstantAction
    event: !type:InstantSpawnSpellEvent
      prototype: FlashRune

- type: entity
  parent: BaseRuneAction
  id: ActionExplosionRune
  name: ent-ActionExplosionRune
  description: ent-ActionExplosionRune-desc
  components:
  - type: Action
    useDelay: 20
  - type: InstantAction
    event: !type:InstantSpawnSpellEvent
      prototype: ExplosionRune

- type: entity
  parent: BaseRuneAction
  id: ActionIgniteRune
  name: ent-ActionIgniteRune
  description: ent-ActionIgniteRune-desc
  components:
  - type: Action
    useDelay: 15
  - type: InstantAction
    event: !type:InstantSpawnSpellEvent
      prototype: IgniteRune

- type: entity
  parent: BaseRuneAction
  id: ActionStunRune
  name: ent-ActionStunRune
  description: ent-ActionStunRune-desc
  components:
  - type: Action
    useDelay: 10
  - type: InstantAction
    event: !type:InstantSpawnSpellEvent
      prototype: StunRune
