- type: entity
  parent: CMBaseWindow
  id: AU14WindowTintedWhite
  name: ent-AU14WindowTintedWhite
  description: ent-AU14WindowTintedWhite-desc
  components:
  - type: Sprite
    sprite: _AU14/Structures/Windows/white_tinted_window.rsi
    state: white_tinted_window0
  - type: Icon
    sprite: _AU14/Structures/Windows/white_tinted_window.rsi
    state: white_tinted_window0
  - type: IconSmooth
    key: walls
    base: white_tinted_window
    mode: CardinalFlags
  - type: Repairable
  - type: MinimapColor
    color: "#0a0a0aee"
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 600 # excessive damage destroys window and frame
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:DoActsBehavior
            acts: ["Destruction"]
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:SpawnEntitiesBehavior
            spawn:
              CMShardGlass:
                min: 2
                max: 2
          - !type:ChangeConstructionNodeBehavior
            node: windowFrameWhiteTextured
  - type: RMCWallExplosionDeletable
  - type: DestroyedByExplosionType
  - type: Construction
    graph: AU14WindowTintedWhiteTextured
    node: windowTintedWhite
  - type: DestroyOnXenoPierceScissor
    spawnPrototype: AU14WindowFrameWhiteTextured
    sound:
      collection: WindowShatter

- type: entity
  parent: RMCBaseWindowFrame
  id: AU14WindowFrameWhiteTextured
  components:
  - type: Sprite
    sprite: _AU14/Structures/Windows/Frames/white_textured_frame.rsi
    state: white_textured_frame0
  - type: Icon
    sprite: _AU14/Structures/Windows/Frames/white_textured_frame.rsi
    state: white_textured_frame0
  - type: IconSmooth
    key: walls
    base: white_textured_frame
    mode: CardinalFlags
  - type: Construction
    graph: AU14WindowTintedWhiteTextured
    node: windowFrameWhiteTextured
  - type: MinimapColor
    color: "#ebe5e5ee"

- type: constructionGraph
  parent: RMC
  id: AU14WindowTintedWhiteTextured
  start: start
  graph:
  - node: start # not currently buildable
  - node: windowFrameWhiteTextured
    entity: AU14WindowFrameWhiteTextured
    edges:
    - to: start
      completed:
      - !type:SpawnPrototype
        prototype: CMSheetMetal1
        amount: 2
      - !type:DeleteEntity
      conditions:
      - !type:EntityAnchored {}
      steps:
      - tool: Anchoring
        doAfter: 2
        duplicateConditions: All
    - to: windowTintedWhite
      completed:
      - !type:SnapToGrid
        southRotation: true
      conditions:
      - !type:EntityAnchored {}
      steps:
      - material: CMGlassReinforced
        amount: 3
        doAfter: 2
  - node: windowTintedWhite
    entity: AU14WindowTintedWhite
    edges:
    - to: windowFrameWhiteTextured
      completed:
      - !type:SnapToGrid
        southRotation: true
      - !type:SpawnPrototype
        prototype: CMSheetGlassReinforced1
        amount: 3
      conditions:
      - !type:EntityAnchored {}
      steps:
      - tool: Screwing
      - tool: Prying
      - tool: Screwing

