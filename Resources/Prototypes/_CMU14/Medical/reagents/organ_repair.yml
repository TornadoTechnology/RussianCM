            Poison: 3

- type: reagent
  parent: CMReagentMedicine
  id: CMUOsteoCalc
  name: osteocalc
  desc: A calcium-rich slurry that accelerates bone integrity regeneration.
  flavor: chalk
  physicalDesc: reagent-physical-desc-crystalline
  color: "#e0e0c0"
  overdose: 25
  metabolisms:
    Medicine:
      metabolismRate: 0.1
      effects:
      - !type:CMUBoneRegenBoostEffect
        multiplier: 1.5
        durationSeconds: 15
