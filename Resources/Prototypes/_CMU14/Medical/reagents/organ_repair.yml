- type: reagent
  parent: CMReagentMedicine
  id: CMAlkysine
  name: reagent-name-cmalkysine
  desc: reagent-desc-cmalkysine
  flavor: medicine
  physicalDesc: reagent-physical-desc-fizzy
  color: "#c8a5dc"
  overdose: 30
  criticalOverdose: 50
  metabolisms:
    Medicine:
      metabolismRate: 0.05
      effects:
      - !type:HumanChemicalLedgerEffect
