- type: reagent
  parent: CMReagentMedicine
  id: CMUCardiocaine
  name: cardiocaine
  desc: A cardiac-targeting compound; attempts to restart a stopped heart.
  flavor: metallic
  physicalDesc: reagent-physical-desc-acrid
  color: "#c02020"
  overdose: 25
  metabolisms:
    Medicine:
      metabolismRate: 0.1
      effects:
      - !type:HealOrganEffect
        organComponent: Heart
        amount: 5
      - !type:CMURestartHeartEffect
