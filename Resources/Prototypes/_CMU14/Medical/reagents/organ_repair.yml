- type: reagent
  parent: CMReagentMedicine
  id: CMUHepatocytin
  name: hepatocytin
  desc: A regenerative compound for liver tissue repair.
  flavor: bitter
  physicalDesc: reagent-physical-desc-thick-and-grainy
  color: "#a87830"
  overdose: 25
  metabolisms:
    Medicine:
      metabolismRate: 0.1
      effects:
      - !type:HealOrganEffect
        organComponent: Liver
        amount: 5
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 25
        damage:
          types:
            Poison: 2

