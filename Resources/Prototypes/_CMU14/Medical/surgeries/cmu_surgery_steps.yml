# ---- Bone-setting steps ----------------------------------------------

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepSetSimpleBone
  name: ent-CMUSurgeryStepSetSimpleBone
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneSetter
    add:
    - type: CMUBoneAlignedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Simple
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepRealignCompoundBone
  name: ent-CMUSurgeryStepRealignCompoundBone
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneSetter
    add:
    - type: CMUBoneAlignedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Compound
    downgradeTo: Simple
    integrityRestore: 40
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepApplyBoneGel
  name: ent-CMUSurgeryStepApplyBoneGel
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneGel
    remove:
    - type: CMUBoneAlignedMarker
  - type: CMUFracturedSurgeryCondition
    requireAtLeast: Simple
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Simple
    downgradeTo: None
    integrityRestore: 60
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bone_gel.rsi
    state: bone-gel

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepRealignComminutedBone
  name: ent-CMUSurgeryStepRealignComminutedBone
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneSetter
    add:
    - type: CMUComminutedBoneRealignedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Comminuted
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Comminuted
    downgradeTo: Compound
    integrityRestore: 25
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepApplyComminutedBoneGel
  name: ent-CMUSurgeryStepApplyComminutedBoneGel
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneGel
    add:
    - type: CMUComminutedBoneGelAppliedMarker
    remove:
    - type: CMUComminutedBoneRealignedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bone_gel.rsi
    state: bone-gel

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepInsertBoneGraft
  name: ent-CMUSurgeryStepInsertBoneGraft
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMUBoneGraft
    add:
    - type: CMUBoneAlignedMarker
    remove:
    - type: CMUComminutedBoneGelAppliedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Compound
    downgradeTo: Simple
    integrityRestore: 40
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bone_gel.rsi
    state: bone-gel

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepFinalizeGraftedBone
  name: ent-CMUSurgeryStepFinalizeGraftedBone
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneSetter
    remove:
    - type: CMUBoneAlignedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Simple
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Simple
    downgradeTo: None
    integrityRestore: 70
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

# ---- Internal-bleed clamp step ---------------------------------------

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepCauterizeBleed
  name: ent-CMUSurgeryStepCauterizeBleed
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMHemostat
    remove:
    - type: InternalBleeding
  - type: CMUInternalBleedingSurgeryCondition
  - type: CMUSurgeryStepCauterizeBleedEffect
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat

# ---- CMU close-up step -----------------------------------------------

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepCloseIncision
  name: ent-CMUSurgeryStepCloseIncision
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMCautery
    remove:
    - type: CMSkinRetracted
    - type: CMBleedersClamped
    - type: CMIncisionOpen
    - type: CMUBoneAlignedMarker
    - type: CMUComminutedBoneRealignedMarker
    - type: CMUComminutedBoneGelAppliedMarker
    - type: CMULiverVesselsClampedMarker
    - type: CMULungsVesselsClampedMarker
    - type: CMUKidneysVesselsClampedMarker
    - type: CMUHeartVesselsClampedMarker
    - type: CMUStomachVesselsClampedMarker
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/cautery.rsi
    state: cautery
  - type: CMSurgeryStepEmoteEffect

