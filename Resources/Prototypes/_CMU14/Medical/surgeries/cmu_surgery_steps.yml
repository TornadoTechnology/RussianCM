  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMHemostat
    add:
    - type: CMUReattachPrepped
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat

