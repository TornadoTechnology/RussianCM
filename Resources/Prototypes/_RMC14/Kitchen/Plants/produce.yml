- type: entity
  name: ent-RMCFoodMango
  parent: FoodProduceBase
  id: RMCFoodMango
  description: "ent-RMCFoodMango-desc"
  components:
  - type: FlavorProfile
    flavors:
      - sweet
      - fruity
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 9
        reagents:
        - ReagentId: Nutriment
          Quantity: 4
        - ReagentId: Vitamin
          Quantity: 5
  - type: Sprite
    sprite: _RMC14/Objects/Kitchen/Plants/mango.rsi
  - type: Item
    heldPrefix: produce
  - type: Produce
    seedId: rmcmango
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: RMCJuiceMango
        Quantity: 10
  - type: Tag
    tags:
    - Fruit
  - type: FoodSequenceElement
    entries:
      Taco: RMCMango
      Burger: RMCMangoBurger
