
- type: entity
  name: ent-FoodMushroomPlump
  parent: FoodProduceBase
  id: FoodMushroomPlump
  description: "ent-FoodMushroomPlump-desc"
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
  - type: Sprite
    sprite: _RMC14/Objects/Kitchen/Plants/plump.rsi
  - type: Item
    heldPrefix: produce
  - type: Produce
    seedId: plump
  - type: Tag
    tags:
    - Vegetable

