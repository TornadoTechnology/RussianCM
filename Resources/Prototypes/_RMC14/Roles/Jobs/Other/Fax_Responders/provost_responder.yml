- type: job
  parent: CMJobBase
  id: CMProvostResponder
  whitelisted: true
  whitelistParent: RMCWhitelistHard
  name: job-cmprovostresponder-name
  description: job-cmprovostresponder-desc
  playTimeTracker: CMJobProvostResponder
  ranks:
    RMCRankProvostCommunicationsOfficer: []
  startingGear: RMCGearProvostResponder
  icon: "CMJobIconEmpty"
  joinNotifyCrew: false
  supervisors: job-cmprovostresponder-supervisors
  accessGroups:
  - ShipMasterAccess
  - RMCWeYa
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillConstruction: 2
        RMCSkillEndurance: 1
        RMCSkillEngineer: 2
        RMCSkillFirearms: 2
        RMCSkillFireman: 1
        RMCSkillIntel: 1
        RMCSkillJtac: 3
        RMCSkillMedical: 2
        RMCSkillOverwatch: 1
        RMCSkillPolice: 1
        RMCSkillPowerLoader: 1
        RMCSkillSurgery: 1
        RMCSkillVehicles: 2
  hasIcon: false
  hidden: true

- type: startingGear
  id: RMCGearProvostResponder
  equipment:
    head: RMCHeadBeretProvost
    eyes: CMGlassesSecurity # TODO: replace with sec hud
    ears: RMCHeadsetProvost
    jumpsuit: CMJumpsuitProvost
    outerClothing: RMCProvostCommandJacket
    gloves: CMHandsBlackMarine
    shoes: CMBootsBlackFilled
    id: RMCIDCardProvostResponder
    belt: CMClipboard
    back: CMSatchelSecurityFilledFaxResponder
    pocket1: RMCPouchDocument
    pocket2: RMCPouchGeneralLarge
  inhand:
    - CMStampProvost

- type: entity
  parent: CMIDCardGold
  id: RMCIDCardProvostResponder
  name: ent-RMCIDCardProvostResponder
  description: ent-RMCIDCardProvostResponder-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/CMIDs/provost.rsi
    state: provost
  - type: Clothing
    slots:
    - idcard
    sprite: _RMC14/Objects/CMIDs/provost.rsi
  - type: PresetIdCard
    job: CMProvostResponder

- type: playTimeTracker
  id: CMJobProvostResponder

