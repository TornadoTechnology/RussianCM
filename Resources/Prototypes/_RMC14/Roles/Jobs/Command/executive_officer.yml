- type: job
  parent: CMJobBase
  id: CMExecutiveOfficer
  whitelisted: true
  whitelistParent: RMCWhitelistHard
  name: job-cmexecutiveofficer-name
  description: job-cmexecutiveofficer-desc
  playTimeTracker: CMJobExecutiveOfficer
  setPreference: false
  requirements: []
  ranks:
    RMCRankCaptain: []
  weight: 5
  startingGear: CMGearExecutiveOfficer
  icon: "CMJobIconExecutiveOfficer"
  requireAdminNotify: true
  joinNotifyCrew: true
  marineAuthorityLevel: 14
  supervisors: job-cmexecutiveofficer-supervisors
  accessGroups:
  - MarineMain
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillCqc: 2
        RMCSkillConstruction: 2
        RMCSkillEndurance: 2
        RMCSkillEngineer: 2
        RMCSkillFirearms: 2
        RMCSkillFireman: 2
        RMCSkillIntel: 2
        RMCSkillJtac: 4
        RMCSkillLeadership: 3
        RMCSkillMedical: 3
        RMCSkillNavigations: 1
        RMCSkillOverwatch: 1
        RMCSkillPolice: 2
        RMCSkillPowerLoader: 2
        RMCSkillSurgery: 1
        RMCSkillVehicles: 1
    - type: MarineOrders
      moveOrderSoundMale:
        collection: AU14MaleMoveOrder
      moveOrderSoundFemale:
        collection: AU14FemaleMoveOrder
      focusOrderSoundMale:
        collection: AU14MaleFocusOrder
      focusOrderSoundFemale:
        collection: AU14FemaleFocusOrder
      holdOrderSoundMale:
        collection: AU14MaleHoldOrder
      holdOrderSoundFemale:
        collection: AU14FemaleHoldOrder
    - type: CMVendorUser
      points: 120
    - type: RMCPointing
    - type: JobPrefix
      prefix: cm-job-prefix-executive-officer
    - type: ViewIntelObjectives
    - type: CommandAccent
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: xo
      background:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: background_command
    - type: RMCTrackable
    - type: RMCAwardRecommendation
      maxRecommendations: 4
    - type: SeeNewPlayers

- type: startingGear
  id: CMGearExecutiveOfficer
  equipment:
    jumpsuit: CMJumpsuitBO
    shoes: RMCShoesLaceup
    head: CMHeadCapPeakedService
    outerClothing: RMCCoatService
    id: CMIDCardExecutiveOfficer
    ears: CMHeadsetSeniorCommand
    pocket1: RMCPouchGeneralLarge
    pocket2: RMCPouchGeneralLarge
  storage:
    pocket1:
    - RMCRangefinder

- type: entity
  parent: CMSpawnPointJobBase
  id: CMSpawnPointExecutiveOfficer
  name: ent-CMSpawnPointExecutiveOfficer
  components:
  - type: SpawnPoint
    job_id: CMExecutiveOfficer
  - type: Sprite
    state: xo_spawn

- type: playTimeTracker
  id: CMJobExecutiveOfficer
  isHumanoid: true

- type: entity
  parent: CMGuidebookRole
  id: RMCGuidebookRoleXO
  name: ent-RMCGuidebookRoleXO
  description: ent-RMCGuidebookRoleXO-desc
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: executive_officer
