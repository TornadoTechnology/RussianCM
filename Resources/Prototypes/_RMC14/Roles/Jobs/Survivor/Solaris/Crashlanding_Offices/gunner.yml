- type: job
  parent: RMCSurvivorPMCBase
  id: RMCSurvivorSolarisPMCStandard
  name: job-rmcsurvivorsolarispmcstandard-name
  description: job-rmcsurvivorsolarispmcstandard-desc
  ranks:
    RMCRankOperator: []
  supervisors: job-rmcsurvivorsolarispmcstandard-supervisors
  accessGroups:
  - ColonistPMC
  startingGear: RMCGearSurvivorPMCGunner
  icon: RMCJobIconPMCGunner
  hasIcon: true
  greeting: rmc-job-greeting-solaris-pmc
  playTimeTracker: RMCJobSurvivorMilitary
  spawnMenuRoleName: job-rmcsurvivorsolarispmcstandard-spawnmenurolename
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      preset: RMCSkillPresetSurvivorWeYaPMCStandard
    - type: RMCSurvivor
    - type: MotionDetectorTracked
    - type: RMCAllowSuitStorage
    - type: IntelRescueSurvivorObjective
    - type: EquipEntityPreset
      preset: RMCGearSurvivorPresetPMCGunner
    - type: NpcFactionMember
      factions:
      - WeYa
      - Civilian

  useLoadoutOfJob: CMSurvivor # for inheritance

- type: startingGear
  parent: RMCGearSurvivorPMCBase
  id: RMCGearSurvivorPMCGunner
  equipment:
    jumpsuit: RMCJumpsuitVeteranPMCNoWebbingPatch
    shoes: RMCBootsPMCFilled
    gloves: CMHandsBlackMarine
    mask: RMCMaskCoifPMC
    ears: RMCHeadsetHvHWeYaPMC
    back: RMCSatchelPMC
    belt: RMCM77BeltPMCFilledNearEmpty
    pocket1: RMCPouchSurvivalBlackFilled
    pocket2: RMCPouchFirstAidPMCFill
  storage:
    back:
    - CMSheetMetal20
    outerClothing:
    - RMCMREWeYa

- type: entity
  parent: CMSpawnPointJobBase
  id: RMCSpawnPointSurvivorSolarisPMCGunner
  name: ent-RMCSpawnPointSurvivorSolarisPMCGunner
  components:
  - type: SpawnPoint
    job_id: RMCSurvivorSolarisPMCStandard
  - type: Sprite
    layers:
    - sprite: _RMC14/Markers/landmarks.rsi
      state: surv_wy

- type: entity
  parent: [ RMCSurvivorPresetNoGun, RMCGearSurvivorPresetPMCGun ]
  id: RMCGearSurvivorPresetPMCGunner
  name: ent-RMCGearSurvivorPresetPMCGunner
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityPreset
    randomStartingGear:
      jumpsuit:
      - RMCJumpsuitVeteranPMCNoWebbingPatch
      - RMCJumpsuitVeteranPMCNoWebbingPatchFolded
    randomOutfits:
    - [ CMArmorM4PMCLight, ArmorHelmetPMC]
    - [ CMArmorM4PMCLight, ArmorHelmetPMC] # TODO RMC14: PMC bulletproof armor, black tactical cap
    - [ WeaponSMGM63, ArmorHelmetPMC] # TODO RMC14: PMC helmet (enclosed)
