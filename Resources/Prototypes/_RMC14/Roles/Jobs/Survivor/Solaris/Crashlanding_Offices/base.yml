- type: job
  parent: CMSurvivor
  id: RMCSurvivorPMCBase
  name: job-rmcsurvivorpmcbase-name
  description: job-rmcsurvivorpmcbase-desc
  ranks:
    RMCRankOperator: []
  supervisors: job-rmcsurvivorpmcbase-supervisors
  accessGroups:
  - ColonistPMC
  startingGear: RMCGearSurvivorPMCBase
  icon: RMCJobIconPMCGunner # TODO RMC14: minimap icons of diff factions mechanic
  hasIcon: true
  hidden: true
  joinNotifyCrew: false
  greeting: rmc-job-greeting-solaris-pmc
  playTimeTracker: RMCJobSurvivorMilitary
  spawnMenuRoleName: job-rmcsurvivorpmcbase-spawnmenurolename
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      preset: RMCSkillPresetSurvivorWeYaPMCStandard
    - type: RMCSurvivor
    - type: MotionDetectorTracked
    - type: RMCAllowSuitStorage
    - type: IntelRescueSurvivorObjective
    - type: EquipEntityPreset
      preset: RMCGearSurvivorPresetPMCBase
    - type: NpcFactionMember
      factions:
      - WeYa
      - Civilian
    - type: JobPrefix
      prefix: rmc-job-prefix-pmc-standard
  useLoadoutOfJob: CMSurvivor # for inheritance

- type: startingGear
  parent: RMCGearSurvivorBaseNoBackpack
  id: RMCGearSurvivorPMCBase
  equipment:
    id: RMCIDCardPMC

- type: entity
  id: RMCGearSurvivorPresetPMCGun
  name: ent-RMCGearSurvivorPresetPMCGun
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityPreset
    randomWeapon:
    - [ RMCWeaponRifleM54CWhiteNoLock, CMMagazineRifleM54C, CMMagazineRifleM54C]
    - [ RMCWeaponRifleSSG45NoLockStripped, RMCMagazineRifleSSG45, RMCMagazineRifleSSG45 ]
    - [ WeaponSMGM63, CMMagazineSMGM63, CMMagazineSMGM63 ]
    - [ RMCWeaponSMGFP9000PMC, RMCMagazineSMGFP9000, RMCMagazineSMGFP9000 ]
    - [ WeaponShotgunM890, CMShellShotgunBuckshot, CMShellShotgunBuckshot, CMShellShotgunBuckshot ]
    tryEquipRandomWeapon: true

- type: entity
  parent: [ RMCSurvivorPresetNoGun, RMCGearSurvivorPresetPMCGun ]
  id: RMCGearSurvivorPresetPMCBase
  name: ent-RMCGearSurvivorPresetPMCBase
  categories: [ HideSpawnMenu ]
