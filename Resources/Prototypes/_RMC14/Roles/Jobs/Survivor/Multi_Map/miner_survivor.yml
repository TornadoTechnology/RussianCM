- type: job
  parent: CMSurvivor
  id: CMSurvivorMiner
  name: job-cmsurvivorminer-name
  description: job-cmsurvivorminer-desc
  playTimeTracker: CMJobSurvivor
  startingGear: RMCGearSurvivorMiner
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      preset: RMCSkillPresetSurvivorMiner
    - type: EquipEntityPreset
      preset: RMCSurvivorPresetMiner
    - type: RMCSurvivor
    - type: MotionDetectorTracked
    - type: NpcFactionMember
      factions:
      - Civilian
    - type: IntelRescueSurvivorObjective
    - type: RMCAllowSuitStorage

- type: startingGear
  id: RMCGearSurvivorMiner
  equipment:
    head: RMCHardhatOrange
    gloves: RMCHandsBlack
    jumpsuit: CMJumpsuitLiaisonBlue
    outerClothing: RMCHazardVestYellow
    shoes: RMCShoesJackboots
    back: CMSatchelEngineerMinerSurvivorFill
    id: CMIDCardColonist
    pocket1: RMCPouchSurvivalFill
    pocket2: RMCPouchToolsFill
  inhand:
    - RMCPickaxe

- type: entity
  parent: CMSpawnPointJobBase
  id: RMCSpawnPointSurvivorMiner
  name: ent-RMCSpawnPointSurvivorMiner
  components:
  - type: SpawnPoint
    job_id: CMSurvivor
  - type: Sprite
    layers:
    - sprite: _RMC14/Markers/landmarks.rsi
      state: surv

- type: entity
  parent: [RMCSurvivorPresetCivilianRareItem, RMCSurvivorPresetCivilian]
  id: RMCSurvivorPresetMiner
  name: ent-RMCSurvivorPresetMiner
  categories: [ HideSpawnMenu ]

- type: entity
  parent: MarkerBase
  id: RMCRandomHumanoidSurvivorMiner
  name: ent-RMCRandomHumanoidSurvivorMiner
  components:
  - type: Sprite
    layers:
    - state: red
  - type: RandomHumanoidSpawner
    settings: RMCSurvivorMiner

- type: randomHumanoidSettings
  parent: RMCSettingsGhostRole
  id: RMCSurvivorMiner
  components:
  - type: RMCJobSpawner
    job: CMSurvivorMiner
