- type: job
  parent: CMSurvivorDoctor
  id: CMSurvivorMedicalTechnician
  name: job-cmsurvivormedicaltechnician-name
  description: job-cmsurvivormedicaltechnician-desc
  playTimeTracker: CMJobSurvivorDoctor
  startingGear: RMCGearSurvivorMedicalTechnician
  spawnMenuRoleName: job-cmsurvivormedicaltechnician-spawnmenurolename
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillConstruction: 1
        RMCSkillEndurance: 2
        RMCSkillFireman: 1
        RMCSkillFirearms: 2
        RMCSkillMedical: 3
        RMCSkillSurgery: 2
    - type: RMCSurvivor
    - type: MotionDetectorTracked
    - type: NpcFactionMember
      factions:
      - Civilian
    - type: IntelRescueSurvivorObjective
    - type: RMCAllowSuitStorage
    - type: EquipEntityPreset
      preset: RMCGearSurvivorPresetMedicalTechnician
  useLoadoutOfJob: CMSurvivorDoctor # for inheritance

- type: startingGear
  parent: RMCGearSurvivorDoctor
  id: RMCGearSurvivorMedicalTechnician
  equipment:
    head: RMCHeadCapFlippable
    jumpsuit: RMCJumpsuitCivilianGreen

- type: entity
  parent: CMSpawnPointJobBase
  id: RMCSpawnPointSurvivorMedicalTechnician
  name: ent-RMCSpawnPointSurvivorMedicalTechnician
  components:
  - type: SpawnPoint
    job_id: CMSurvivor
  - type: Sprite
    layers:
    - sprite: _RMC14/Markers/landmarks.rsi
      state: surv

- type: entity
  parent: RMCSurvivorPresetDoctor
  id: RMCGearSurvivorPresetMedicalTechnician
  name: ent-RMCGearSurvivorPresetMedicalTechnician
  categories: [ HideSpawnMenu ]  # TODO RMC14 random research notes
