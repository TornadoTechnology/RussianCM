  id: RMCSpawnPointSurvivorCargoTechnician
  name: ent-RMCSpawnPointSurvivorCargoTechnician
  components:
  - type: SpawnPoint
    job_id: CMSurvivor
  - type: Sprite
    layers:
    - sprite: _RMC14/Markers/landmarks.rsi
      state: surv

- type: entity
  parent: RMCSurvivorPresetEngineer
