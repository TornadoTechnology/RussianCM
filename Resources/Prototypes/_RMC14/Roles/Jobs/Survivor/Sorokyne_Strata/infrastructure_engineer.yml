- type: job
  parent: CMSurvivor
  id: CMJobSurvivorInfrastructureEngineer
  name: job-cmjobsurvivorinfrastructureengineer-name
  description: job-cmjobsurvivorinfrastructureengineer-desc
  playTimeTracker: CMJobSurvivorEngineer
  startingGear: RMCGearSurvivorInfrastructureEngineer
  accessGroups:
  - ColonistEngi
  spawnMenuRoleName: job-cmjobsurvivorinfrastructureengineer-spawnmenurolename
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillEndurance: 2
        RMCSkillFirearms: 2
        RMCSkillFireman: 1
        RMCSkillEngineer: 2
        RMCSkillConstruction: 2
        RMCSkillPowerLoader: 2
        RMCSkillVehicles: 1
    - type: EquipEntityPreset
      preset: RMCGearSurvivorPresetInfrastructureEngineer
    - type: RMCSurvivor
    - type: MotionDetectorTracked
    - type: NpcFactionMember
      factions:
      - SPP
      - Civilian
    - type: IntelRescueSurvivorObjective
