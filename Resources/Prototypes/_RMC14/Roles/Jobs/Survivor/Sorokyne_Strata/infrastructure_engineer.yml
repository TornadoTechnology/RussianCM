    back: CMSatchelEngineerSurvivorFill
    shoes: CMBootsBrownFilled
    head: RMCHardhatOrange
    outerClothing: RMCHazardVest
    gloves: CMHandsInsulated
    pocket2: RMCWelderIndustrial
  storage:
    back:
    - RMCMaskGasSPP

- type: entity
  parent: CMSpawnPointJobBase
  id: RMCSpawnPointSurvivorInfrastructureEngineer
  name: ent-RMCSpawnPointSurvivorInfrastructureEngineer
  components:
  - type: SpawnPoint
    job_id: CMSurvivor
  - type: Sprite
    layers:
    - sprite: _RMC14/Markers/landmarks.rsi
      state: surv

- type: entity
  parent: RMCSurvivorPresetEngineer
  id: RMCGearSurvivorPresetInfrastructureEngineer
  name: ent-RMCGearSurvivorPresetInfrastructureEngineer
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityPreset
    randomOutfits:
    - [ RMCJumpsuitCivilian ]
    - [ RMCJumpsuitCivilianBrown ]
