      - [ RMCTieBlack ] # TODO RMC14 - System for random uniform accessories like randomStartingGear
      - [ RMCTie ]
      - [ RMCTieGreen ]
      - [ RMCTiePurple ]
      - [ RMCTieRed ]
    -
      - [ CMSheetMetal20, RMCMaskGasSPP ]
    randomStartingGear:
