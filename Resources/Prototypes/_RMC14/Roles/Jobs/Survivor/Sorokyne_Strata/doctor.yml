  - ColonistMedical
  spawnMenuRoleName: job-cmjobsurvivormohdoctor-spawnmenurolename
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillConstruction: 1
        RMCSkillEndurance: 2
        RMCSkillFireman: 1
        RMCSkillFirearms: 2
        RMCSkillMedical: 3
        RMCSkillSurgery: 2
