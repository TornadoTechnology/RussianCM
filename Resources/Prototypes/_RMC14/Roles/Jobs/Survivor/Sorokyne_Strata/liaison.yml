- type: job
  parent: [ RMCJobRibbonBase, CMSurvivorCorporate ] # Halcyon CL shouldn't spawn with WY badges
  id: CMJobSurvivorHalcyonDynamicsLiaison
  name: job-cmjobsurvivorhalcyondynamicsliaison-name
  description: job-cmjobsurvivorhalcyondynamicsliaison-desc
  playTimeTracker: CMJobSurvivorCorporate
  startingGear: RMCGearSurvivorHalcyonDynamicsLiaison
  accessGroups:
  - ColonistCorporate
  spawnMenuRoleName: job-cmjobsurvivorhalcyondynamicsliaison-spawnmenurolename
  icon: "RMCJobIconHalcyonExec"
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillConstruction: 1
        RMCSkillEndurance: 2
        RMCSkillFireman: 1
        RMCSkillFirearms: 2
    - type: EquipEntityPreset
      preset: RMCGearSurvivorPresetHalcyonDynamicsLiaison
    - type: RMCSurvivor
    - type: MotionDetectorTracked
    - type: NpcFactionMember
      factions:
      - Halcyon
      - SPP
      - Civilian
    - type: IntelRescueSurvivorObjective
    - type: RMCAllowSuitStorage
  useLoadoutOfJob: CMSurvivorCorporate # for inheritance

- type: startingGear
  parent: RMCGearSurvivorBase
  id: RMCGearSurvivorHalcyonDynamicsLiaison
  equipment:
    id: RMCIDCardHalcyon
    jumpsuit: RMCJumpsuitLiaisonBrownTie
    back: CMSatchel # TODO RMC14 - Lockable
    shoes: RMCBootsSPP
    gloves: RMCHandsVeteran
    pocket2: CMClipboard # RMC14, replace with document pouch when fixed
  storage:
    back:
    - CMSheetMetal20
    - RMCMaskGasSPP

- type: entity
  parent: CMSpawnPointJobBase
  id: RMCSpawnPointSurvivorHalcyonDynamicsLiaison
  name: ent-RMCSpawnPointSurvivorHalcyonDynamicsLiaison
  components:
  - type: SpawnPoint
    job_id: CMSurvivor
  - type: Sprite
    layers:
    - sprite: _RMC14/Markers/landmarks.rsi
      state: surv

- type: entity
  parent: RMCSurvivorPresetCivilian
  id: RMCGearSurvivorPresetHalcyonDynamicsLiaison
  name: ent-RMCGearSurvivorPresetHalcyonDynamicsLiaison
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityPreset
    randomOutfits:
    - [ RMCCoatBureauTrenchCoatBrown ]
    - [ RMCCoatBureauTrenchCoatGrey ]
