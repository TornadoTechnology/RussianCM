- type: job
  parent: CMJobSquadBase
  id: CMFireteamLeader
  name: job-cmfireteamleader-name
  description: job-cmfireteamleader-desc
  setPreference: false
  playTimeTracker: CMJobFireteamLeader
  requirements: []
  ranks:
    RMCRankSergeant:
    - !type:RoleTimeRequirement
      role: CMJobFireteamLeader
      time: 252000 # 70 hours
    RMCRankCorporal:
    - !type:RoleTimeRequirement
      role: CMJobFireteamLeader
      time: 36000 # 10 hours
    RMCRankLanceCorporal: []
  startingGear: CMGearFireteamLeader
  dummyStartingGear: CMGearFireteamLeaderEquipped
  icon: "CMJobIconFireteamLeader"
  joinNotifyCrew: false
  marineAuthorityLevel: 1
  supervisors: job-cmfireteamleader-supervisors
  accessGroups:
  - FTL
 # overwatchSortPriority: -5
 # overwatchRoleName: Fire Team Leaders
  roleWeight: 1
  displayWeight: 5
  special:
  - !type:AddComponentSpecial
    components:
    - type: Skills
      skills:
        RMCSkillConstruction: 2
        RMCSkillEndurance: 1
        RMCSkillEngineer: 2
        RMCSkillFirearms: 2
        RMCSkillFireman: 1
        RMCSkillJtac: 3
    - type: CMVendorUser
      id: CMFireteamLeader
      points: 45
    - type: SquadArmorWearer
    - type: JobPrefix
      prefix: cm-job-prefix-fireteam-leader
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: tl
    - type: MutinyEligible
#   - type: RMCAwardRecommendation  (If FTL recommendations are required in the future, update the logic to preserve recommendation permissions when a leader is demoted, provided they had this permission before squad leader promotion.)

- type: startingGear
  id: CMGearFireteamLeader
  equipment:
    id: CMDogtagFireteamLeader

- type: startingGear
  id: CMGearFireteamLeaderEquipped
  equipment:
    jumpsuit: JumpsuitMarine
    shoes: CMBootsBlackFilled
    head: CMArmorHelmetM12
    outerClothing: CMArmorM4
    gloves: CMHandsInsulated
    id: CMDogtagFireteamLeader
    ears: CMHeadsetAlphaTeamLeader

- type: playTimeTracker
  id: CMJobFireteamLeader
  isHumanoid: true

- type: entity
  parent: CMSpawnPointJobBase
  id: CMSpawnPointFireteamLeader
  name: ent-CMSpawnPointFireteamLeader
  components:
  - type: SpawnPoint
    job_id: CMFireteamLeader
  - type: Sprite
    state: tl_spawn

- type: entity
  parent: CMSpawnPointFireteamLeader
  id: CMSpawnPointFireteamLeaderAlpha
  suffix: ent-CMSpawnPointFireteamLeaderAlpha-suffix
  components:
  - type: SquadSpawner
    squad: SquadAlpha
    role: CMFireteamLeader
  - type: Sprite
    state: tl_spawn_alpha

- type: entity
  parent: CMSpawnPointFireteamLeader
  id: CMSpawnPointFireteamLeaderBravo
  suffix: ent-CMSpawnPointFireteamLeaderBravo-suffix
  components:
  - type: SquadSpawner
    squad: SquadBravo
    role: CMFireteamLeader
  - type: Sprite
    state: tl_spawn_bravo

- type: entity
  parent: CMSpawnPointFireteamLeader
  id: CMSpawnPointFireteamLeaderCharlie
  suffix: ent-CMSpawnPointFireteamLeaderCharlie-suffix
  components:
  - type: SquadSpawner
    squad: SquadCharlie
    role: CMFireteamLeader
  - type: Sprite
    state: tl_spawn_charlie

- type: entity
  parent: CMSpawnPointFireteamLeader
  id: CMSpawnPointFireteamLeaderDelta
  suffix: ent-CMSpawnPointFireteamLeaderDelta-suffix
  components:
  - type: SquadSpawner
    squad: SquadDelta
    role: CMFireteamLeader
  - type: Sprite
    state: tl_spawn_delta

- type: randomHumanoidSettings
  parent: RMCRandomHumanoidBase
  id: RMCFireteamLeader
  components:
  - type: GhostRole
    name: cm-job-name-fireteam-leader
    description: cm-job-description-fireteam-leader
    rules: ghost-role-information-nonantagonist-rules
    reregister: false
    raffle:
      settings: default
    job: CMFireteamLeader
    requirements:
    - !type:RoleTimeRequirement
      role: CMJobFireteamLeader
      time: 1
