# SUPPLIES
# code/datums/supply_packs/misc.dm

# /datum/supply_packs/internals
- type: entity
  parent: RMCCrateSupply
  id: RMCCrateSupplyInternals
  name: ent-RMCCrateSupplyInternals
  components:
  - type: StorageFill
    contents:
    - id: CMMaskGas
      amount: 3
    - id: RMCGasTankOxygenFilled
      amount: 3

# /datum/supply_packs/evacuation
- type: entity
  parent: RMCCrateSupply
  id: RMCCrateSupplyEvacuation
  name: ent-RMCCrateSupplyEvacuation
  components:
  - type: StorageFill
    contents:
    - id: RMCToolboxEmergencyFilled
      amount: 2
    - id: RMCHazardVest
      amount: 2
    - id: RMCEmergencyOxygenTankFilled
      amount: 5
    - id: CMMaskGas
      amount: 5

# /datum/supply_packs/boxes
- type: entity
  id: RMCCrateSuppliesBoxes
  parent: RMCCrateSupply
  name: ent-RMCCrateSuppliesBoxes #empty boxes (x10)
  components:
  - type: StorageFill
    contents:
      - id: RMCSheetCardboard #CMBoxCardboard
        amount: 1 #10

# /datum/supply_packs/janitor
- type: entity
  parent: RMCCrateSupply
  id: RMCCrateSupplyJanitor
  name: ent-RMCCrateSupplyJanitor
  components:
  - type: StorageFill
    contents:
    - id: RMCBucket
      amount: 5
    - id: CMMop
      amount: 1
    - id: CMWetSign
      amount: 3
    - id: TrashBag
      amount: 1
    - id: SprayBottleSpaceCleaner
      amount: 1
    - id: RagItem
      amount: 1
    - id: CleanerGrenade
      amount: 3
    - id: CMBucketMop
      amount: 1

# /datum/supply_packs/poster
