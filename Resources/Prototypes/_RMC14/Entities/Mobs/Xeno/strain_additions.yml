- type: entity
  parent: RMCXenoCarrierBase
  id: CMXenoReaper
  name: rmc-xeno-reaper-name
  description: rmc-xeno-reaper-description
  components:
  - type: Sprite
    sprite: _CM13/Mobs/Xenos/Reaper/reaper.rsi
  - type: MobThresholds
    thresholds:
      0: Alive
      650: Critical
      750: Dead
  - type: Xeno
    role: CMXenoCarrier
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoAcidNormal
    - ActionXenoPheromones
    - ActionXenoOrderConstruction
    - ActionXenoPlantWeeds
    - ActionXenoChooseStructure
    - ActionXenoSecreteStructure
    - ActionXenoFleshHarvest
    - ActionXenoFleshBloom
    - ActionXenoCarrionMantle
    - ActionXenoRapture
    - ActionXenoReaperRedGas
    - ActionXenoDevolve
    tier: 3
    hudOffset: -0.1,0.1
    unlockAt: 900
  - type: XenoDevolve
    devolvesTo:
    - CMXenoCarrier
  - type: XenoPlasma
    plasma: 500
    maxPlasma: 500
    plasmaRegenOnWeeds: 4
  - type: XenoPheromones
    pheromonesMultiplier: 3
    pheroSuffix: strong
  - type: CMArmor
    xenoArmor: 0
    explosionArmor: 20
  - type: RMCXenoDamageVisuals
    prefix: reaper
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 35
  - type: XenoTailStab
    tailDamage:
      groups:
        Brute: 30
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.8
    baseSprintSpeed: 3.25
  - type: RemoveComponents
    components:
    - type: XenoEggRetriever
  - type: XenoConstruction
    buildDelay: 2
    canBuild:
    - WallXenoResin
    - WallXenoMembrane
    - DoorXenoResin
    - XenoStickyResin
    - XenoFastResin
    canOrderConstruction:
    - HiveCoreXenoConstructionNode
    - HiveEggMorpherXenoConstructionNode
    - HiveClusterXenoConstructionNode
    - HiveRecoveryNodeXenoConstructionNode
    - HivePlasmaTreeXenoConstructionNode
  - type: XenoReaper
  - type: RMCActionOrder
    id: CMXenoReaper
