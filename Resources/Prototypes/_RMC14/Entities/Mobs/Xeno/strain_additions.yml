  id: CMXenoWarriorBulwark
  suffix: Bulwark
  components:
  - type: Sprite
    sprite: _CM13/Mobs/Xenos/Warrior/bulwark_warrior.rsi
    layers:
    - map: [ "enum.XenoVisualLayers.Base" ]
      state: alive
    - map: [ "enum.RMCDamageVisualLayers.Base" ]
      visible: false
    - map: [ "enum.XenoInhandVisualLayers.Left" ]
      visible: false
    - map: [ "enum.XenoInhandVisualLayers.Right" ]
      visible: false
