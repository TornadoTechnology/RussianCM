- type: entity
  parent: BaseItem
  name: ent-RMCAtmosScanner
  id: RMCAtmosScanner
  description: ent-RMCAtmosScanner-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/atmos_scanner.rsi
    layers:
    - state: icon
  - type: GasAnalyzer
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-atmospheric-composition-scanner
  - type: ActivatableUI
    inHandsOnly: true
    singleUser: true
    requireActiveHand: false
    key: enum.GasAnalyzerUiKey.Key
  - type: UserInterface
    interfaces:
      enum.GasAnalyzerUiKey.Key:
        type: GasAnalyzerBoundUserInterface
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.GasAnalyzerVisuals.Enabled:
        enabled:
          True: { state: working }
          False: { state: icon }
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 30
      CMGlass: 20
