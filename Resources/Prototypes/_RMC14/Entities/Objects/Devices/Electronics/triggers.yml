- type: entity
  parent: TimerTrigger
  id: RMCTimerTrigger
  name: ent-RMCTimerTrigger
  description: ent-RMCTimerTrigger-desc
  suffix: ent-RMCTimerTrigger-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/timer.rsi
    state: timer
  - type: PayloadTrigger
    components:
    - type: OnUseTimerTrigger
      delay: 3
      delayOptions: [3, 5, 10]
      initialBeepDelay: 0
      beepInterval: 10
      beepSound:
        path: /Audio/_RMC14/Explosion/armbomb.ogg
        params:
          volume: -5
      doPopup: false
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 500
      CMGlass: 50
      # 10 waste?
