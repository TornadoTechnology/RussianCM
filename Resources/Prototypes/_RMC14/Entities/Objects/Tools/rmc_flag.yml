- type: entity
  abstract: true
  parent: BaseItem
  id: RMCFlagCarriableBase
  name: ent-RMCFlagCarriableBase
  components:
  - type: Sprite
    layers:
    - state: icon
      map: [ "base" ]
  - type: Item
    size: Large
  - type: Corrodible
    isCorrodible: false
  - type: Appearance
  - type: PlantableFlag
  - type: GenericVisualizer
    visuals:
      enum.PlantableFlagVisuals.Planted:
        base:
          True: { state: deploy }
          False: { state: icon }

- type: entity
  parent: RMCFlagCarriableBase
  id: RMCFlagCarriableUN
  name: ent-RMCFlagCarriableUN
  description: "ent-RMCFlagCarriableUN-desc" # This one looks ready to be planted into the ground."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Flags/un_flag.rsi
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-un-flag
    factions:
    - UNMC

- type: entity
  parent: RMCFlagCarriableBase
  id: RMCFlagCarriableUNMC
  name: ent-RMCFlagCarriableUNMC
  description: "ent-RMCFlagCarriableUNMC-desc" # This one looks ready to be planted into the ground."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Flags/unmc_flag.rsi
