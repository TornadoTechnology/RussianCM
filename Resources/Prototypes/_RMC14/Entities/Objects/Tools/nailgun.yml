- type: entity
  parent: BaseItem
  name: ent-RMCNailgunCompact
  id: RMCNailgunCompact
  description: ent-RMCNailgunCompact-desc
  suffix: ent-RMCNailgunCompact-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/SMGs/nailgun_compact.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-4
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/SMGs/nailgun_compact.rsi
    slots:
    - suitStorage
    - Back
    quickEquip: false
  - type: AmmoCounter
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Item
    size: Small
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: RMCMagazineSMGNailgun
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazineSMGNailgun
  - type: Nailgun
  - type: MagazineAmmoProvider
    autoEject: true
  - type: RMCAmmoEject
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: AltFireMelee
  - type: MeleeWeapon
    resetOnHandSelected: false
    attackRate: 1
    damage:
      types:
        Blunt: 5
    soundHit:
      collection: GenericHit
  - type: EmitSoundOnPickup
    sound:
      collection: RMCEquipGun
      params:
        volume: -6
  - type: EmitSoundOnDrop
    sound:
      collection: RMCRustleGun
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      collection: RMCRustleGun
      params:
        volume: -4
  - type: UsableWhileDevoured
    canUnequip: true
  - type: Tag
    tags:
    - RMCNailgunCompact

- type: entity
  parent: RMCNailgunCompact
  name: ent-RMCNailgunTactical
  id: RMCNailgunTactical
  description: ent-RMCNailgunTactical-desc
  suffix: ent-RMCNailgunTactical-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/SMGs/nailgun_tactical.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/SMGs/nailgun_tactical.rsi
  - type: Nailgun
    materialPerRepair: 2
  - type: Tag
    tags:
    - RMCNailgunTactical

- type: Tag
  id: RMCNailgunCompact

- type: Tag
  id: RMCNailgunTactical
