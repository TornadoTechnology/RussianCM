- type: entity
  parent: Screwdriver
  id: CMScrewdriver
  components:
  - type: RandomSprite
    available:
    - enum.DamageStateVisualLayers.Base:
        screwdriver: Rainbow
  - type: Sprite
    sprite: _RMC14/Objects/Tools/screwdriver.rsi
    layers:
    - state: screwdriver
      map: [ "enum.DamageStateVisualLayers.Base" ]
    - state: screwdriver-screwybits
  - type: Item
    size: Tiny
    sprite: _RMC14/Objects/Tools/screwdriver.rsi
    storedRotation: 0
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_RMC14/Handling/screwdriver_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/screwdriver_drop.ogg
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/screwdriver_drop.ogg
      params:
        volume: -4
  - type: Clothing
    quickEquip: false
    slots:
    - Ears
    - Suitstorage
    - Mask
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 75

