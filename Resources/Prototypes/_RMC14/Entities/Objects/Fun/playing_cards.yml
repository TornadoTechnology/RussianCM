- type: entity
  abstract: true
  parent: BaseItem
  id: RMCPlayingCardBase
  categories: [ HideSpawnMenu ]
  name: ent-RMCPlayingCardBase
  description: ent-RMCPlayingCardBase-desc
  components:
  - type: PlayingCard
  - type: Sprite
    sprite: _RMC14/Objects/Fun/playing_cards.rsi
    state: spades_ace
  - type: Item
    size: Tiny

# Individual card (spawned from deck)
- type: entity
  parent: RMCPlayingCardBase
  id: RMCPlayingCard
  categories: [ HideSpawnMenu ]

# Hand of cards
- type: entity
  parent: BaseItem
  id: RMCPlayingCardHand
  name: ent-RMCPlayingCardHand
  description: ent-RMCPlayingCardHand-desc
  categories: [ HideSpawnMenu ]
  components:
  - type: PlayingCardHand
  - type: Sprite
    sprite: _RMC14/Objects/Fun/playing_cards.rsi
    state: back_deck
  - type: Item
  - type: UseDelay
    delay: 0.1
  - type: UserInterface
    interfaces:
      enum.PlayingCardHandUi.Key:
        type: PlayingCardHandBui

# Deck of cards
- type: entity
  parent: BaseItem
  id: RMCPlayingCardDeck
  name: ent-RMCPlayingCardDeck
  suffix: ent-RMCPlayingCardDeck-suffix
  description: ent-RMCPlayingCardDeck-desc
  components:
  - type: PlayingCardDeck
    cardPrototype: RMCPlayingCard
  - type: Sprite
    sprite: _RMC14/Objects/Fun/playing_cards.rsi
    state: deck
  - type: Item
  - type: UseDelay
    delay: 0.1
