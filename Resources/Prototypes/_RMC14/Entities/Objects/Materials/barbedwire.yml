- type: entity
  abstract: true
  id: BarbedWireBase
  parent: BaseItem
  name: ent-BarbedWireBase
  suffix: ent-BarbedWireBase-suffix
  description: ent-BarbedWireBase-desc
  components:
  - type: Tag
    tags:
    - Metal
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Stack
    stackType: BarbedWire
    baseLayer: base
    layerStates:
    - barbed_wire
    - barbed_wire_2
    - barbed_wire_3
  - type: Sprite
    sprite: _RMC14/Objects/barbed_wire.rsi
    state: barbed_wire_3
    layers:
    - state: barbed_wire_3
      map: ["base"]
  - type: Item
    size: Small
  - type: Appearance
  - type: BarbedWire
  - type: RMCConstructionItem
    buildable:
    - RMCRazorwireBuild
  - type: UserInterface
    interfaces:
      enum.RMCConstructionUiKey.Key:
        type: RMCConstructionBui

- type: entity
  parent: BarbedWireBase
  id: BarbedWire10
  suffix: "ent-BarbedWire10-suffix"
  components:
  - type: Sprite
    state: barbed_wire
  - type: Stack
    stackType: BarbedWire
    count: 10

- type: entity
  parent: BarbedWireBase
  id: BarbedWire15
  suffix: "ent-BarbedWire15-suffix"
  components:
  - type: Sprite
    state: barbed_wire
  - type: Stack
    stackType: BarbedWire
    count: 15

- type: entity
  parent: BarbedWireBase
  id: BarbedWire1
  suffix: ent-BarbedWire1-suffix
  components:
  - type: Sprite
    state: barbed_wire
  - type: Stack
    stackType: BarbedWire
    count: 1
  - type: Construction
    graph: BarbedWireGraph
    node: nodeBarbedWire
