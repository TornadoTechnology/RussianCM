# TODO RMC14 - Implement missing chemicals then make these ores extactable.

- type: entity
  abstract: true
  parent: BaseItem
  id: RMCOreBase
  description: "ent-RMCOreBase-desc"
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Materials/ore.rsi
  - type: Item
    sprite: _RMC14/Objects/Materials/ore.rsi
    size: Normal
  - type: Tag
    tags:
    - Ore
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 20
        mask:
          - ItemMask
        restitution: 0.3
        friction: 0.2

- type: entity
  parent: RMCOreBase
  id: RMCCoal
  name: ent-RMCCoal
  suffix: ent-RMCCoal-suffix
  components:
  - type: Stack
    stackType: Coal
  - type: Sprite
    state: coal
  - type: Material
  - type: SolutionContainerManager
    solutions:
      coal:
        reagents:
        - ReagentId: RMCCarbon
          Quantity: 8.4
        - ReagentId: Ammonia # TODO RMC14
          Quantity: 0.8
        - ReagentId: RMCHydrogen
          Quantity: 0.5
        - ReagentId: RMCSulfur
          Quantity: 0.2
        - ReagentId: RMCMercury
          Quantity: 0.1
  - type: Item
    heldPrefix: coal

- type: entity
  parent: RMCCoal
  id: RMCCoal1
  suffix: ent-RMCCoal1-suffix
  components:
  - type: Stack
    count: 1

