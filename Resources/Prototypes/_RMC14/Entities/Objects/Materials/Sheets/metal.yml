  color: "#696969"
  price: 0.00746

- type: stack
  id: CMPlasteel
  name: stack-cmplasteel-name
  icon: { sprite: /Textures/_RMC14/Objects/Materials/Sheets/plasteel.rsi, state: plasteel }
  spawn: CMSheetPlasteel
  maxCount: 50

- type: entity
