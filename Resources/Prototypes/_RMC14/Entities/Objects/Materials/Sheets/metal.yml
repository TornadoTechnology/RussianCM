# Metal

- type: material
  id: CMSteel
  stackEntity: CMSheetMetal
  name: material-cmsteel-name
  icon: { sprite: _RMC14/Objects/Materials/Sheets/metal.rsi, state: metal }
  price: 0.00133
  

- type: stack
  id: CMSteel
  name: stack-cmsteel-name
  icon: { sprite: /Textures/_RMC14/Objects/Materials/Sheets/metal.rsi, state: metal }
  spawn: CMSheetMetal
  maxCount: 50

- type: entity
  abstract: true
  parent: SheetMetalBase
  id: CMSheetMetalBase
  components:
    - type: Stack
      count: 50
    - type: Sprite
      sprite: _RMC14/Objects/Materials/Sheets/metal.rsi
    - type: Item
      size: Normal
      sprite: _RMC14/Objects/Materials/Sheets/metal.rsi
      inhandVisuals:
        left:
        - state: inhand-left
        right:
        - state: inhand-right
    - type: Appearance

- type: entity
  parent: CMSheetMetalBase
  id: CMSheetMetal
  name: ent-CMSheetMetal
  description: ent-CMSheetMetal-desc
  suffix: ent-CMSheetMetal-suffix
  components:
    - type: RMCConstructionItem
      buildable:
      - RMCBarbedWireBuild
      - RMCMetalBarricadeBuild
      - RMCMetalBarricadeFoldableBuild
      - RMCHandrailBuild
      # - RMCDividerConstruction
      # APC frame
      # Fire alarm frame
      - RMCDividerConstruction
      - RMCFloorTileBuild
      - RMCMetalRodBuild
      - RMCWallGirderBuild
      - RMCWindowFrameBuild
      # Airlock assembly
      # large airlock assembly
      - RMCDividerConstruction
      - RMCBedBuild
      - RMCChairBuild
      - RMCComfyChairList
      - RMCSquadChairList
      - RMCOfficeChairList
      # stool
      - RMCDividerConstruction
      # computer frame
      - RMCMachineFrameBuild
      - RMCDividerConstruction
      # metal baseball bat
      - RMCDividerConstruction
    - type: RMCConstructionUpgradeItem
      whitelist:
        tags:
        - RMCMetalBarricade
        - RMCPlasteelBarricade
    - type: Material
    - type: PhysicalComposition
      materialComposition:
        CMSteel: 3750
    - type: Stack
      count: 50
      stackType: CMSteel
      baseLayer: base
      layerStates:
        - metal
        - metal_2
        - metal_3
        - metal_4
    - type: Sprite
      layers:
        - state: metal_4
          map: ["base"]
    - type: UserInterface
      interfaces:
        enum.RMCConstructionUiKey.Key:
          type: RMCConstructionBui
    - type: CraftIntoPipeBomb # Wow.. Its amazing..
      Spawn: CMUPipeBombCasing
      Time: 5
      NeedBlowtorch: true
      DestroyReq: false
    - type: Tag
      tags:
      - RMCSheetMetal
      - Sheet
      - Metal

- type: entity
  parent: CMSheetMetal
  id: CMSheetMetal10
  suffix: "ent-CMSheetMetal10-suffix"
  components:
    - type: Sprite
      state: metal_2
    - type: Stack
      stackType: CMSteel
      count: 10

