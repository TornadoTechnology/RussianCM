# Wood
- type: material
  id: RMCWood
  stackEntity: RMCPlankWood
  name: material-rmcwood-name
  icon: { sprite: _RMC14/Objects/Materials/Sheets/wood.rsi, state: wood }
  color: "#966F33"
  price: 0.00133

- type: stack
  id: RMCWood
  name: stack-rmcwood-name
  icon: { sprite: _RMC14/Objects/Materials/Sheets/wood.rsi, state: wood }
  spawn: RMCPlankWood
  maxCount: 50

- type: entity
  parent: SheetOtherBase
  id: RMCPlankWood
  name: ent-RMCPlankWood
  description: ent-RMCPlankWood-desc
  suffix: ent-RMCPlankWood-suffix
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      RMCWood: 3750
  - type: Stack
    stackType: RMCWood
    count: 50
    baseLayer: base
    layerStates:
      - wood
      - wood_2
      - wood_3
      - wood_4
  - type: Sprite
    sprite: _RMC14/Objects/Materials/Sheets/wood.rsi
    state: wood_4
    layers:
    - state: wood_4
      map: ["base"]
  - type: Item
    sprite: _RMC14/Objects/Materials/Sheets/wood.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
    heldPrefix: wood
    size: Normal
  - type: Appearance
  - type: Tag
    tags:
    - Sheet
  - type: RMCConstructionItem
    buildable:
    - RMCFloorTileWoodBuild
    - RMCCampfireBuild
    - AU14TorchBuild
    - AU14BaseballBatBuild
    - AU14FishingRodBuild
    - AU14WoodenChairBuild
    - RMCWoodenBarricadeBuild
    - RMCWoodenCrateBuild
    - AU14WoodenCrossBuild
    - AU14WoodenSandalsBuild
    # wooden door
    # coffin
    # wooden pole
  - type: UserInterface
    interfaces:
      enum.RMCConstructionUiKey.Key:
        type: RMCConstructionBui
  - type: CampfireFuel
    fuelAmount: 1

- type: entity
  parent: RMCPlankWood
  id: RMCPlankWood10
  suffix: ent-RMCPlankWood10-suffix
  components:
  - type: Stack
    count: 10

- type: entity
  parent: RMCPlankWood
  id: RMCPlankWood25
  suffix: ent-RMCPlankWood25-suffix
  components:
  - type: Stack
    count: 25

- type: entity
  parent: RMCPlankWood
  id: RMCPlankWood50
  suffix: ent-RMCPlankWood50-suffix
  components:
  - type: Stack
    count: 50

- type: entity
  parent: RMCPlankWood
  id: RMCPlankWood1
  suffix: ent-RMCPlankWood1-suffix
  components:
  - type: Stack
    count: 1

- type: entity
  parent: RMCPlankWood
  id: RMCPlankWood2
  suffix: ent-RMCPlankWood2-suffix
  components:
  - type: Stack
    count: 2

