# Phoron
- type: material
  id: CMPhoron
  stackEntity: CMSheetPhoron
  name: material-cmphoron-name
  icon: { sprite: _RMC14/Objects/Materials/Sheets/phoron.rsi, state: phoron }
  color: "#7e009e"
  price: 0.01

- type: stack
  id: CMPhoron
  name: stack-cmphoron-name
  icon: { sprite: _RMC14/Objects/Materials/Sheets/phoron.rsi, state: phoron }
  spawn: CMSheetPhoron
  maxCount: 50

- type: entity
  parent: SheetOtherBase
  id: CMSheetPhoron
  name: ent-CMSheetPhoron
  description: ent-CMSheetPhoron-desc
  suffix: ent-CMSheetPhoron-suffix
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      CMPhoron: 2000
  - type: Stack
    stackType: CMPhoron
    count: 50
  - type: Sprite
    state: phoron
    sprite: _RMC14/Objects/Materials/Sheets/phoron.rsi
  - type: Item
    heldPrefix: phoron
    size: Normal
    sprite: _RMC14/Objects/Materials/Sheets/phoron.rsi
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: Appearance
  - type: Extractable
    grindableSolutionName: phoron
  - type: SolutionContainerManager
    solutions:
      phoron:
        reagents:
        - ReagentId: RMCPhoron
          Quantity: 20
  - type: Tag
    tags:
    - Sheet

