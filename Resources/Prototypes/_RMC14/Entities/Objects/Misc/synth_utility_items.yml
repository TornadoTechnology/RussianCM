- type: entity
  parent: DoorElectronics
  id: CMAirlockCircuitBoard
  name: ent-CMAirlockCircuitBoard
  description: ent-CMAirlockCircuitBoard-desc
- type: entity
  parent: CMMiniTank
  id: RMCES11MobileFuelCanister
  name: ent-RMCES11MobileFuelCanister
  description: ent-RMCES11MobileFuelCanister-desc
- type: entity
  parent: BaseStorageItem
  id: RMCSynthRepairKit
  name: ent-RMCSynthRepairKit
  description: ent-RMCSynthRepairKit-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/engineer_kit.rsi
    layers:
    - state: toolkit
    - state: toolkit_empty
      map: [ "openLayer" ]
      visible: false
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,11,1
    whitelist:
      tags:
      - Crowbar
      - Screwdriver
      - Wirecutter
      - Wrench
      - CableCoil
      - Multitool
      - PowerCell
      components:
      - Welder
      - PowerCell
      - TrayScanner
  - type: FixedItemSizeStorage
  - type: Item
    size: Normal
  - type: GenericVisualizer
    visuals:
      enum.SharedBagOpenVisuals.BagState:
        openLayer:
          Open: { visible: true }
          Closed: { visible: false }
  - type: Appearance

- type: entity
  parent: RMCSynthRepairKit
  id: RMCSynthRepairKitFilled
  suffix: ent-RMCSynthRepairKitFilled-suffix
  components:
  - type: StorageFill
    contents:
    - id: CMWelder
    - id: RMCCableCoil30
    - id: CMWirecutter
    - id: CMMultitool

- type: entity
  parent: RMCSynthRepairKit
  id: RMCSynthRepairKitEliteFilled
  name: ent-RMCSynthRepairKitEliteFilled
  suffix: ent-RMCSynthRepairKitEliteFilled-suffix
  components:
  - type: StorageFill
    contents:
    - id: RMCCableCoil30
      amount: 2
    - id: CMWirecutter
    - id: CMMultitool
    - id: CMTRayScanner
