- type: entity
  parent: BaseStructure
  id: RMCPlanterBox
  name: ent-RMCPlanterBox
  description: ent-RMCPlanterBox-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    noRot: true
    sprite: _RMC14/Structures/Furniture/planter_box.rsi
    drawdepth: FloorTiles
    state: planter_box
  - type: Appearance
  - type: Damageable
    damageModifierSet: null
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: BarricadeBlock
    bidirectional: true
    blocking: 65

- type: entity
  parent: RMCPlanterBox
  id: RMCSoilNet
  name: ent-RMCSoilNet
  description: ent-RMCSoilNet-desc
  components:
  - type: Sprite
    state: soil_grid
  - type: SpriteFade
