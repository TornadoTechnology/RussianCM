    sprite: _RMC14/Objects/Misc/Books/Tomes/hefa.rsi
    state: icon
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,5,1 # 3 HEFA nades
    whitelist:
      tags:
      - RMCGrenadeHEFA
  - type: StorageFill
    contents:
    - id: CMGrenadeFrag
      amount: 3
