- type: entity
  name: ent-RMCBible
  description: ent-RMCBible-desc
  parent: BaseStorageItem
  id: RMCBible
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Books/Bibles/bible.rsi
    state: icon
  - type: UseDelay
    delay: 10.0
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    damage:
      types:
        Holy: 25
        Blunt: 1
  - type: Clothing
