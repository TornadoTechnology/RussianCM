- type: entity
  name: ent-RMCTargetHuman
  id: RMCTargetHuman
  parent: BaseStructureDynamic
  description: ent-RMCTargetHuman-desc
  suffix: ent-RMCTargetHuman-suffix
  components:
  - type: Sprite
    sprite: Objects/Specific/Security/target.rsi
    state: target_h
    noRot: true
  - type: Appearance
  - type: Spottable
  - type: Repairable
  - type: DamagePopup
    allowTypeChange: true
    damagePopupType: Combined
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 200
        mask:
        - FullTileMask
        layer:
        - MobLayer
  - type: InteractionOutline
  - type: Physics
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 9999998
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 9999999
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 5
            max: 5
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: RMCAdjustableArmorValue
  - type: UserInterface
    interfaces:
      enum.AdjustableArmorUiKey.Key:
        type: ArmorAdjustBoundUserInterface
  - type: ActivatableUI
    key: enum.AdjustableArmorUiKey.Key
    verbOnly: true
  - type: Flammable
    fireSpread: false
    damage:
      types:
        Heat: 1
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
  - type: FireVisuals
    sprite: _RMC14/Mobs/Effects/on_fire_xeno.rsi
    normalState: simple_onfire
    lightEnergyPerStack: 0.2
    lightRadiusPerStack: 0.1
    maxLightRadius: 2
    maxLightEnergy: 8
  - type: RMCFireColor
  - type: CanBeFirePatted

- type: entity
  name: ent-RMCTargetXeno
  id: RMCTargetXeno
  parent: RMCTargetHuman
  description: ent-RMCTargetXeno-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/target.rsi
    state: target_q

