- type: entity
  parent: BaseItem
  id: CMPamphlet
  name: ent-CMPamphlet
  description: ent-CMPamphlet-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/pamphlets.rsi
    state: pamphlet_written
  - type: Item
    size: Tiny
  - type: SkillPamphlet
    whitelists:
    - popup: rmc-pamphlets-cant-use
      restrictions:
        components:
        - Marine
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_RMC14/Handling/paper_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_RMC14/Handling/paper_drop.ogg
      params:
        volume: -5
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_RMC14/Handling/paper_drop.ogg
      params:
        volume: -5
  - type: Tag
    tags:
    - RMCSkillPamphlet

# SKILLS


# gives medical skill
- type: entity
  parent: CMPamphlet
  id: CMPamphletMedical
  name: ent-CMPamphletMedical
  description: ent-CMPamphletMedical-desc
  components:
  - type: Sprite
    state: pamphlet_medical
  - type: SkillPamphlet
    addSkills:
      RMCSkillMedical: 1

# gives miniengie skill
- type: entity
  parent: CMPamphlet
  id: CMPamphletEngineer
  name: ent-CMPamphletEngineer
  description: ent-CMPamphletEngineer-desc
  components:
  - type: Sprite
    state: pamphlet_construction
  - type: SkillPamphlet
    addSkills:
      RMCSkillEngineer: 1
      RMCSkillConstruction: 1

# gives jtac skill
- type: entity
  parent: CMPamphlet
  id: CMPamphletJTAC
  name: ent-CMPamphletJTAC
  description: ent-CMPamphletJTAC-desc
  components:
  - type: Sprite
    state: pamphlet_jtac
  - type: SkillPamphlet
    addSkills:
      RMCSkillJtac: 1

# gives spotter skill / bypasses limit
- type: entity
  parent: CMPamphlet
  id: CMPamphletSpotter
  name: ent-CMPamphletSpotter
  description: ent-CMPamphletSpotter-desc
  components:
  - type: Sprite
    state: pamphlet_spotter
  - type: SkillPamphlet
    addComps:
    - type: SpotterWhitelist
    addSkills:
      RMCSkillJtac: 1
    giveJobTitle: rmc-job-name-spotter
    givePrefix: rmc-job-prefix-spotter
    isAppendPrefix: false
    giveIcon:
      sprite: _RMC14/Interface/cm_job_icons.rsi
      state: hudsquad_ass
    giveMapBlip:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: spotter
    jobWhitelists:
    - popup: rmc-pamphlets-rifleman-warning
      jobProto: CMRifleman
    - popup: rmc-pamphlets-rifleman-warning
      jobProto: CMPVERifleman

# gives powerloader skill / bypasses limit
