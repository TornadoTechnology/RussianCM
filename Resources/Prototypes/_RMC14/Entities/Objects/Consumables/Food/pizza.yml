# Pizza Box Base
- type: entity
  parent: BaseStorageItem
  id: RMCBoxPizza
  name: ent-RMCBoxPizza
  description: ent-RMCBoxPizza-desc
  suffix: ent-RMCBoxPizza-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Storage/pizza_box.rsi
    state: pizzabox1
    layers:
    - state: pizzabox1
      map: ["enum.StorageVisualLayers.Base"]
    - state: pizzabox_open
      map: ["enum.StorageVisualLayers.Door"]
  - type: Item
    size: Normal
  - type: EntityStorageVisuals
    stateDoorOpen: pizzabox_open
    stateDoorClosed: pizzabox1
  - type: Appearance
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,1,1
    whitelist:
      tags:
      - Pizza
  - type: RMCStorageEjectHand
  - type: Tag
    tags:
    - BoxCardboard
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCBoxPizza
  id: RMCBoxPizzaGalaxy
  name: ent-RMCBoxPizzaGalaxy
  description: ent-RMCBoxPizzaGalaxy-desc
  suffix: ent-RMCBoxPizzaGalaxy-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Storage/pizza_galaxy_box.rsi

