# Food Pizza Base
- type: entity
  abstract: true
  parent: FoodInjectableBase
  id: RMCFoodPizzaBase
  components:
  - type: FlavorProfile
    flavors:
    - oily
    - bread
  - type: Food
  - type: Tag
    tags:
    - Pizza

- type: entity
  abstract: true
  parent: RMCFoodPizzaBase
  id: RMCFoodPizzaFullBase
  components:
  - type: Sprite
    state: pizza
  - type: Item
    heldPrefix: pizza
  - type: SliceableFood
    count: 6
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40
        reagents:
        - ReagentId: Nutriment
          Quantity: 30
        - ReagentId: Vitamin
          Quantity: 5

- type: entity
  abstract: true
  parent: RMCFoodPizzaBase
  id: RMCFoodPizzaSliceBase
  components:
  - type: Sprite
    state: slice
  - type: Item
    heldPrefix: slice
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 6
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Vitamin
          Quantity: 0.8

