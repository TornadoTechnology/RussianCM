# Components
- type: entity
  abstract: true
  parent: CMMREComponentBase
  id: CMMRESideComponentBase
  description: ent-CMMRESideComponentBase-desc
  components:
  - type: Sprite
    state: side

- type: entity
  parent: CMMRESideComponentBase
  id: CMMREComponentCracker
  name: ent-CMMREComponentCracker
  description: ent-CMMREComponentCracker-desc
  components:
  - type: SpawnItemsOnUse
    items:
    - id: CMMREFoodCracker

- type: entity
  parent: CMMRESideComponentBase
  id: CMMREComponentRiceOnigiri
  name: ent-CMMREComponentRiceOnigiri
  description: ent-CMMREComponentRiceOnigiri-desc
  components:
  - type: SpawnItemsOnUse
    items:
    - id: CMMREFoodRiceOnigiri

- type: entity
  parent: CMMRESideComponentBase
  id: CMMREComponentMashedPotatoes
  name: ent-CMMREComponentMashedPotatoes
  description: ent-CMMREComponentMashedPotatoes-desc
  components:
  - type: SpawnItemsOnUse
    items:
    - id: CMMREFoodMashedPotatoes

- type: entity
  parent: CMMRESideComponentBase
  id: CMMREComponentRisotto
  name: ent-CMMREComponentRisotto
  description: ent-CMMREComponentRisotto-desc
  components:
  - type: SpawnItemsOnUse
    items:
    - id: CMMREFoodRisotto

# Foods
- type: entity
  abstract: true
  parent: CMMREFoodBase
  id: CMMREFoodSide
  components:
  - type: Food
    transferAmount: 1.6
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 8
        reagents:
        - ReagentId: Nutriment
          Quantity: 6
        - ReagentId: TableSalt
          Quantity: 2
  - type: Extractable
    grindableSolutionName: food
  - type: InjectableSolution
    solution: food

- type: entity
  parent: CMMREFoodSide
  id: CMMREFoodCracker
  name: ent-CMMREFoodCracker
  description: ent-CMMREFoodCracker-desc
  components:
  - type: Sprite
    state: cracker
  - type: FlavorProfile
    flavors:
    - Cracker

- type: entity
  parent: CMMREFoodSide
  id: CMMREFoodRiceOnigiri
  name: ent-CMMREFoodRiceOnigiri
  description: ent-CMMREFoodRiceOnigiri-desc
  components:
  - type: Sprite
    state: rice_onigiri
  - type: FlavorProfile
    flavors:
    - RiceOnigiri

- type: entity
  parent: CMMREFoodSide
  id: CMMREFoodMashedPotatoes
  name: ent-CMMREFoodMashedPotatoes
  description: ent-CMMREFoodMashedPotatoes-desc
  components:
  - type: Sprite
    state: mashed_potatoes
  - type: FlavorProfile
    flavors:
    - Potato

- type: entity
  parent: CMMREFoodSide
  id: CMMREFoodRisotto
  name: ent-CMMREFoodRisotto
  description: ent-CMMREFoodRisotto-desc
  components:
  - type: Sprite
    state: risotto
  - type: FlavorProfile
    flavors:
    - Risotto

# Flavors
- type: flavor
  id: Cracker
  flavorType: Complex
  description: like crackers

- type: flavor
  id: RiceOnigiri
  flavorType: Complex
  description: like rice

- type: flavor
  id: Potato
  flavorType: Complex
  description: like potatoes

- type: flavor
  id: Risotto
  flavorType: Complex
  description: like risotto
