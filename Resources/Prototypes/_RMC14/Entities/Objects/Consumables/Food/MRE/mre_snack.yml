# Flavors
- type: flavor
  id: Biscuit
  flavorType: Complex
  description: like biscuits

- type: flavor
  id: Meatballs
  flavorType: Complex
  description: like meatballs

- type: flavor
  id: Pretzels
  flavorType: Complex
