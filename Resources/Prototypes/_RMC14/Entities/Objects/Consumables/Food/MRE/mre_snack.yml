# Foods
- type: entity
  abstract: true
  parent: CMMREFoodBase
  id: CMMREFoodSnack
  components:
  - type: Food
    transferAmount: 1.2
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 3
        reagents:
        - ReagentId: Nutriment
          Quantity: 4
        - ReagentId: TableSalt
          Quantity: 2

- type: entity
  parent: CMMREFoodSnack
  id: CMMREFoodBiscuit
  name: ent-CMMREFoodBiscuit
  description: ent-CMMREFoodBiscuit-desc
  components:
  - type: Sprite
    state: biscuit
  - type: FlavorProfile
    flavors:
    - Biscuit

- type: entity
  parent: CMMREFoodSnack
  id: CMMREFoodMeatballs
  name: ent-CMMREFoodMeatballs
  description: ent-CMMREFoodMeatballs-desc
  components:
  - type: Sprite
    state: meatballs
  - type: FlavorProfile
    flavors:
    - Meatballs

