# Components
- type: entity
  abstract: true
  parent: CMMREComponentBase
  id: CMMRESnackComponentBase
  description: ent-CMMRESnackComponentBase-desc
  components:
  - type: Sprite
    state: snack

- type: entity
  parent: CMMRESnackComponentBase
  id: CMMREComponentBiscuit
  name: ent-CMMREComponentBiscuit
  description: ent-CMMREComponentBiscuit-desc
  components:
  - type: SpawnItemsOnUse
    items:
    - id: CMMREFoodBiscuit

- type: entity
  parent: CMMRESnackComponentBase
  id: CMMREComponentMeatballs
  name: ent-CMMREComponentMeatballs
