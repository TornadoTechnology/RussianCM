# Flavors
- type: flavor
  id: SpicedApples
  flavorType: Complex
  description: like spiced apples

- type: flavor
  id: ChocolateBrownie
  flavorType: Complex
  description: like chocolate brownies

- type: flavor
  id: SugarCookie
  flavorType: Complex
  description: like sugar cookie

- type: flavor
  id: CocoBar
  flavorType: Complex
  description: like chocolate

- type: flavor
  id: Flan
  flavorType: Complex
  description: like flan

- type: flavor
  id: HoneyFlan
  flavorType: Complex
  description: like honey flan
