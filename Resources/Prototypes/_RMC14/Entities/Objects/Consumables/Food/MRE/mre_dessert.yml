# Foods
- type: entity
  abstract: true
  parent: CMMREFoodBase
  id: CMMREFoodDessert
  components:
  - type: Food
    transferAmount: 1
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 3
        reagents:
        - ReagentId: Nutriment
          Quantity: 2
        - ReagentId: RMCSugar
          Quantity: 2
        - ReagentId: Theobromine
          Quantity: 1

- type: entity
  parent: CMMREFoodDessert
  id: CMMREFoodSpicedApples
  name: ent-CMMREFoodSpicedApples
  description: ent-CMMREFoodSpicedApples-desc
  components:
  - type: Sprite
    state: spiced_apples
  - type: FlavorProfile
    flavors:
    - SpicedApples

- type: entity
  parent: CMMREFoodDessert
  id: CMMREFoodChocolateBrownie
  name: ent-CMMREFoodChocolateBrownie
  description: ent-CMMREFoodChocolateBrownie-desc
  components:
  - type: Sprite
    state: chocolate_brownie
  - type: FlavorProfile
    flavors:
    - ChocolateBrownie

- type: entity
  parent: CMMREFoodDessert
  id: CMMREFoodSugarCookie
  name: ent-CMMREFoodSugarCookie
  description: ent-CMMREFoodSugarCookie-desc
  components:
  - type: Sprite
    state: sugar_cookie
