# Ketchup
- type: reagent
  id: RMCKetchup
  name: reagent-rmcketchup-name
  group: Foods
  desc: reagent-rmcketchup-desc
  physicalDesc: reagent-rmcketchup-physicaldesc
  flavor: tomato
  color: "#731008"
  recognizable: true
  metabolisms:
    Food:
      metabolismRate: 0.1
      effects:
      - !type:Nutritious
        potency: 2
        nutFactor: 5
        nutMetabolism: 0.1

