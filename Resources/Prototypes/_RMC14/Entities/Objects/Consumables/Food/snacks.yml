- type: entity
  parent: RMCFoodSnackBase
  id: RMCFoodSnackCHUNK
  name: ent-RMCFoodSnackCHUNK
  description: ent-RMCFoodSnackCHUNK-desc
  components:
  - type: Sprite
    state: chunk
  - type: Item
    size: Tiny
  - type: SpawnItemsOnUse
    items:
      - id: RMCFoodPacketCHUNKTrash
