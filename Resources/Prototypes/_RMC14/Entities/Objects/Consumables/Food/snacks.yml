- type: entity
  parent: CMFoodBase
  id: RMCFoodSnackBase
  abstract: true
  components:
  - type: Food
  - type: Tag
    tags:
      - FoodSnack
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Food/packaged.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 25 # Room for extra condiments
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
  - type: Item
    sprite: _RMC14/Objects/Consumable/Food/packaged.rsi
    heldPrefix: packet
    size: Tiny
  - type: Extractable
    grindableSolutionName: food
  - type: InjectableSolution
    solution: food
  - type: DrawableSolution
    solution: food

- type: entity
  parent: RMCFoodSnackBase
  id: RMCFoodSnackBarcaridine
  name: ent-RMCFoodSnackBarcaridine
  description: ent-RMCFoodSnackBarcaridine-desc
  components:
  - type: Sprite
    state: barcardine
  - type: Item
    size: Tiny
  - type: SpawnItemsOnUse
    items:
      - id: RMCFoodPacketBarcaridineTrash
      - id: RMCFoodSnackBarcaridineBar
    sound:
      path: /Audio/Effects/unwrap.ogg

- type: entity
  parent: RMCFoodSnackBase
  id: RMCFoodSnackBarcaridineBar
  name: ent-RMCFoodSnackBarcaridineBar
  description: ent-RMCFoodSnackBarcaridineBar-desc
  components:
  - type: FlavorProfile
    flavors:
      - chocolate
      - medicine
  - type: Sprite
    state: barcardine-o
  - type: Item
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 4
        - ReagentId: CocoaPowder
          Quantity: 3
        - ReagentId: CMBicaridine
          Quantity: 2 # Given that the overdose rate is a lot higher, I doubt this will cause issues, you'd need to eat more than 15 bars.

