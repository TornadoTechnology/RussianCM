- type: entity
  parent: RMCFoodSnackBase
  id: RMCFoodSnackCHUNKBar
  name: ent-RMCFoodSnackCHUNKBar
  description: ent-RMCFoodSnackCHUNKBar-desc
  components:
  - type: FlavorProfile
    flavors:
      - chocolate
  - type: Sprite
    state: chunk-o
  - type: Item
    size: Normal
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20 # It's going to take a bit to eat this goddamn thing.
        reagents:
        - ReagentId: Nutriment
          Quantity: 7
        - ReagentId: CocoaPowder
          Quantity: 10
  - type: MeleeWeapon # True horror comes from improvisation.
    damage:
      types:
        Blunt: 5
    soundHit:
      collection: MetalThud

- type: entity
  parent: RMCFoodSnackBase
  id: RMCFoodSnackHUNK
  name: ent-RMCFoodSnackHUNK
  description: ent-RMCFoodSnackHUNK-desc
  components:
  - type: Sprite
    state: hunk
  - type: Item
    size: Large
  - type: SpawnItemsOnUse
    items:
      - id: RMCFoodPacketHUNKTrash
      - id: RMCFoodSnackHUNKBar
    sound:
      path: /Audio/Effects/unwrap.ogg

- type: entity
  parent: RMCFoodSnackBase
  id: RMCFoodSnackHUNKBar
  name: ent-RMCFoodSnackHUNKBar
  description: ent-RMCFoodSnackHUNKBar-desc
  components:
  - type: FlavorProfile
    flavors:
      - metallic
      - chocolate
  - type: Sprite
    state: hunk-o
  - type: Item
    size: Large
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40 # Remember what I said before? It's worse now.
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Iron # IT CONTAINS 30 UNITS OF WHAT???
          Quantity: 30
        - ReagentId: CocoaPowder
          Quantity: 5
  - type: MeleeWeapon # You could legitimately use this as a strong melee weapon. That horrifies me.
    damage:
      types:
        Blunt: 35
    soundHit:
      collection: MetalThud

