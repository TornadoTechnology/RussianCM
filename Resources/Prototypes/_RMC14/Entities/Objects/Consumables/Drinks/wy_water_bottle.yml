- type: entity
  parent: DrinkBottlePlasticBaseFull
  id: CMDrinkWEYAWaterBottle30
  name: ent-CMDrinkWEYAWaterBottle30
  description: ent-CMDrinkWEYAWaterBottle30-desc
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 50
        reagents:
        - ReagentId: Water
          Quantity: 30
  - type: Drink
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/WEYADrinks/weya_water_bottle.rsi
    layers:
    - state: icon
      map: ["enum.OpenableVisuals.Layer"]
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        enum.OpenableVisuals.Layer:
          True: {state: "icon_open"}
          False: {state: "icon"}
  - type: Item
    size: Small
  - type: DamageOnLand
    damage: {}
  - type: DamageOtherOnHit
    damage: {}
  - type: Appearance
  - type: Sealable
  - type: MREItem
  - type: Destructible
    thresholds: [] # TODO RMC14 destroy on explosion unless inside a container
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: PhysicalComposition
    materialComposition:
      RMCPlastic: 5

