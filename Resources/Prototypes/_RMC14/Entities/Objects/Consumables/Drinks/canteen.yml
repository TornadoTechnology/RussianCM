- type: entity
  abstract: true
  parent: DrinkBase
  id: CMCanteenBase
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/canteen.rsi
  - type: Item
    size: Small
  - type: Drink
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 60
        reagents:
        - ReagentId: Water
          Quantity: 60
  - type: Tag
    tags:
    - DrinkGlass
  - type: SolutionTransfer
    transferAmount: 60
    maxTransferAmount: 60
    canChangeTransferAmount: true
    transferAmounts:
    - 5
    - 10
    - 15
    - 25
    - 30
    - 40
    - 60
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior { }
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: RMCFlask

- type: entity
  parent: CMCanteenBase
  id: CMCanteen
  name: ent-CMCanteen
  description: ent-CMCanteen-desc
  components:
  - type: Sprite
    state: canteen

- type: entity
  parent: CMCanteenBase
  id: CMMetalFlask
  name: ent-CMMetalFlask
  description: ent-CMMetalFlask-desc
  suffix: ent-CMMetalFlask-suffix
  components:
  - type: Sprite
    state: flask
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 60

- type: entity
  parent: CMCanteenBase
  id: CMMarineFlask
  name: ent-CMMarineFlask
  description: ent-CMMarineFlask-desc
  components:
  - type: Sprite
    state: flask_marine

- type: entity
  parent: CMCanteenBase
  id: CMWEYAFlask
  name: ent-CMWEYAFlask
  description: ent-CMWEYAFlask-desc
  components:
  - type: Sprite
    state: flask_we_ya

- type: entity
  parent: [CMCanteenBase, DrinkFlaskVisualsOpenable]
  id: RMCWeYaThermos
  name: ent-RMCWeYaThermos
  description: ent-RMCWeYaThermos-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/weya_thermos.rsi
