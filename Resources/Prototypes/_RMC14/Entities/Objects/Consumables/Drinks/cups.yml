- type: entity
  parent: DrinkBaseMug
  id: RMCCoffeeCup
  name: ent-RMCCoffeeCup
  description: ent-RMCCoffeeCup-desc
  suffix: ent-RMCCoffeeCup-suffix
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
  - type: Drink
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Drinks/coffee_cup.rsi
    layers:
      - state: icon-0
      - map: ["enum.SolutionContainerLayers.Fill"]
        state: icon-3
        visible: false
  - type: Item
    size: Small
  - type: DamageOnLand
    damage: {}
  - type: DamageOtherOnHit
    damage: {}
  - type: Appearance
  - type: Destructible
    thresholds: [] # TODO RMC14 destroy on explosion unless inside a container
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: Tag
    tags:
    - DrinkGlass
  - type: PhysicalComposition
    materialComposition: {}

