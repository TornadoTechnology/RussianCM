- type: entity
  id: CMTarbackCigar
  parent: Cigar
  name: ent-CMTarbackCigar
  description: "ent-CMTarbackCigar-desc"
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Smokeables/Cigars/tarback.rsi
    state: unlit-icon
  - type: Tag
    tags:
      - Cigar
      - Trash
  - type: Clothing
    sprite: _RMC14/Objects/Consumable/Smokeables/Cigars/tarback.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
    sprite: Objects/Consumable/Smokeables/Cigars/cigar.rsi
    heldPrefix: unlit
  - type: HelmetAccessory
    rsi:
      sprite: _RMC14/Objects/Clothing/HelmetGarb/Smoking/cigar.rsi
      state: helmet

- type: entity
  id: CMTarbackCigarSpent
  parent: CMTarbackCigar
  suffix: ent-CMTarbackCigarSpent-suffix
  components:
  - type: Sprite
    state: burnt-icon
  - type: Smokable
    state: Burnt
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 20
  - type: Tag
    tags:
      - Cigar
      - Trash
      - Burnt

- type: entity
  id: RMCTarbackTube
  parent: BaseStorageItem
  name: ent-RMCTarbackTube
  description: ent-RMCTarbackTube-desc
  components:
  - type: Item
    size: Small
  - type: Clothing
    slots:
    - belt
  - type: Sprite
    sprite: _RMC14/Objects/Consumable/Smokeables/Cigars/tarback_tube.rsi
    state: tarbacktube_empty
    layers:
    - state: tarbacktube_empty
      map: ["openLayer", "emptyLayer"]
    - state:  tarbacktube
      map: ["closedLayer"]
      visible: false
  - type: Storage
    grid:
    - 0,0,0,1
    whitelist:
      tags:
      -  Cigar
      -  Trash
  - type: StorageFill
    contents:
    - id: CMTarbackCigar
  - type: CMStorageVisualizer
    storageClosed: closedLayer
    storageOpen: openLayer
    storageEmpty: emptyLayer
  - type: Appearance
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

# Shio Royals
