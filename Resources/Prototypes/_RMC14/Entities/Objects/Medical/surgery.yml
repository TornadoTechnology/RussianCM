# Scalpel
- type: entity
  parent: CMBaseToolSurgery
  id: CMScalpel
  name: ent-CMScalpel
  description: ent-CMScalpel-desc
  components:
  - type: CMSurgeryTool
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel2.ogg
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: Item
    size: Tiny
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
  - type: Sharp
    butcherDelayModifier: 1.5
  - type: Utensil
    types:
    - Knife
  - type: MeleeWeapon
    wideAnimationRotation: 90
    swingLeft: true
    attackRate: 1.5
    damage:
      types:
        Slash: 8
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: CMScalpel
  - type: CMUBurnDebridementTool
  - type: Tag
    tags:
    - RMCScalpel
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 10000
      CMGlass: 5000

# - Predator
- type: entity
  parent: CMScalpel
  id: CMScalpelPredator
  name: ent-CMScalpelPredator
  components:
  - type: Sprite
    state: predator_scalpel

# - Laser
- type: entity
  parent: CMScalpel
  id: CMScalpelLaser
  name: ent-CMScalpelLaser
  description: ent-CMScalpelLaser-desc
  components:
  - type: Sprite
    layers:
    - state: scalpel_laser
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: MeleeWeapon
    damage:
      types:
        Slash: 0
  - type: ItemToggle
    predictable: false
  - type: ItemToggleHot
  - type: CMCautery
  - type: Tag
    tags:
    - CMCautery
  - type: UseDelay
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Slash: 14
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: scalpel_laser_on }
          False: { state: scalpel_laser }

# - - Improved
- type: entity
  parent: CMScalpelLaser
  id: CMScalpelLaserImproved
  name: ent-CMScalpelLaserImproved
  description: ent-CMScalpelLaserImproved-desc
  components:
  - type: Sprite
    layers:
    - state: scalpel_laser_2
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: scalpel_laser_2_on }
          False: { state: scalpel_laser_2 }

# - - Advanced
- type: entity
  parent: CMScalpelLaser
  id: CMScalpelLaserAdvanced
  name: ent-CMScalpelLaserAdvanced
  description: ent-CMScalpelLaserAdvanced-desc
  components:
  - type: Sprite
    layers:
    - state: scalpel_laser_3
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: scalpel_laser_3_on }
          False: { state: scalpel_laser_3 }

