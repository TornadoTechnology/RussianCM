# Base
- type: entity
  parent: BaseToolSurgery
  id: CMBaseToolSurgery
  abstract: true
  name: ent-CMBaseToolSurgery
  description: ent-CMBaseToolSurgery-desc
  components:
  - type: Item
    size: Small
  - type: CMSurgeryTool
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage
  - type: StaticPrice
    price: 24

# Retractor
- type: entity
  parent: CMBaseToolSurgery
  id: CMRetractor
  name: ent-CMRetractor
  description: ent-CMRetractor-desc
  components:
  - type: CMSurgeryTool
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor2.ogg
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
    state: retractor
  - type: Item
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
  - type: CMRetractor
  - type: Tag
    tags:
    - CMRetractor
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 10000
      CMGlass: 5000

# - Predator
- type: entity
  parent: CMRetractor
  id: CMRetractorPredator
  name: ent-CMRetractorPredator
  components:
  - type: Sprite
    state: predator_retractor



