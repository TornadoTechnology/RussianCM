- type: entity
  parent: BaseStorageItem
  id: CMSurgicalCase
  name: ent-CMSurgicalCase
  description: ent-CMSurgicalCase-desc # TODO RMC14 extended description with instructions for treating internal bleeds once those are added
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Storage/surgical_case.rsi
    layers:
    - state: surgical_case_base
    - state: surgical_case_open
      map: [ "openLayer" ]
      visible: false
    - state: surgical_case_closed
      map: [ "closedLayer" ]
      visible: false
  - type: Item
    size: Small
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,11,1
    whitelist:
      components:
      - CMScalpel
      - CMHemostat
      - CMRetractor
      - CMCautery
      tags:
      - CMSurgicalLine
      - CMSynthGraft
      #TODO FixoVein
  - type: FixedItemSizeStorage
  - type: Tag
    tags:
      - CMSurgicalCase
  - type: GenericVisualizer
    visuals:
      enum.SharedBagOpenVisuals.BagState:
        openLayer:
          Open: { visible: true }
          Closed: { visible: false }
        closedLayer:
          Open: { visible: false }
          Closed: { visible: true }
  - type: Appearance
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: PhysicalComposition
    materialComposition:
      RMCPlastic: 1000

- type: entity
  parent: CMSurgicalCase
  id: CMSurgicalCaseFilled
  suffix: ent-CMSurgicalCaseFilled-suffix
  components:
  - type: StorageFill
    contents:
    - id: CMScalpel
    - id: CMHemostat
    - id: CMRetractor
    - id: CMCautery
    - id: CMSurgicalLine
    - id: CMSynthGraft

- type: entity
  parent: CMSurgicalCase
  id: RMCSurgicalCaseRCM
  name: ent-RMCSurgicalCaseRCM
  description: ent-RMCSurgicalCaseRCM-desc
  suffix: ent-RMCSurgicalCaseRCM-suffix
  components:
  - type: Storage
    grid:
    - 0,0,9,1 # 5 slots

- type: entity
  parent: RMCSurgicalCaseRCM
  id: RMCSurgicalCaseRCMFilled # TODO RMC14 unique sprite
  suffix: ent-RMCSurgicalCaseRCMFilled-suffix
  components:
  - type: StorageFill
    contents:
    - id: CMScalpel
    - id: CMHemostat
    - id: CMRetractor
    - id: CMSurgicalLine
    - id: CMSynthGraft
