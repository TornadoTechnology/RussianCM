- type: entity
  abstract: true
  parent: ChemicalMedipen
  id: CMAutoInjectorBase
  name: ent-CMAutoInjectorBase
  description: ent-CMAutoInjectorBase-desc
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/auto_injectors.rsi
    layers:
    - state: autoinjector
    - state: autoinjector1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Item
    size: Small
    sprite: null
    inhandVisuals: { }
  - type: Hypospray
    solutionName: pen
    injectSound: /Audio/_RMC14/Medical/hypospray.ogg
    transferAmount: 15
    injectOnly: true
    onlyAffectsMobs: true
    canContainerDraw: false
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 45
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: autoinjector
    emptySpriteName: autoinjector
    changeColor: true
  - type: Tag
    tags:
    - CMAutoInjector
  - type: UseDelay
    delay: 0.333
  - type: IconLabel
    textColor: White
    storedOffset: -12, 12
  - type: RMCSmartFridgeInsertable
  - type: PhysicalComposition
    materialComposition:
      RMCPlastic: 300

- type: entity
  parent: CMAutoInjectorBase
  id: CMAutoInjector
  abstract: true
  components:
  - type: MedicallyUnskilledDoAfter
  - type: CMRefillableSolution
    solution: pen
    reagents: {}

- type: entity
  parent: CMAutoInjector
  id: CMEmergencyAutoInjector
  name: ent-CMEmergencyAutoInjector
  description: ent-CMEmergencyAutoInjector-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/emergency_auto_injector.rsi
    layers:
    - state: autoinjector
    - state: autoinjector1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Item
    sprite: null
  - type: Hypospray
    transferAmount: 58 # TODO RMC14 77
    injectSound: /Audio/_RMC14/Medical/air_release.ogg
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 58 # TODO RMC14 77
        reagents:
        - ReagentId: CMBicaridine
          Quantity: 29
        - ReagentId: CMKelotane
          Quantity: 29
#        - ReagentId: CMOxycodone # TODO RMC14 oxycodone
#          Quantity: 19
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
  - type: MedicallyUnskilledDoAfter
    min: 0
    doAfter: 0
  - type: IconLabel
    labelTextLocId: rmc-emergency-medicine-container-label-text

