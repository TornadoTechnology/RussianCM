- type: entity
  abstract: true
  parent: BaseStorageItem
  id: CMPacketPills
  name: ent-CMPacketPills
  description: ent-CMPacketPills-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/pill_packets.rsi
  - type: Item
    size: Small
  - type: Storage # TODO RMC14 quick-eject
    maxItemSize: Small
    grid:
    - 0,0,7,1 # 4 slots
    whitelist:
      components:
      - Pill
  - type: FixedItemSizeStorage
  - type: Tag
    tags:
    - PillPacket
  - type: IconLabel
    textColor: White
    storedOffset: -12, 12
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage

- type: Tag
  id: PillPacket

- type: entity
  parent: CMPacketPills
  id: CMPacketPillsTricordrazine
  name: ent-CMPacketPillsTricordrazine
  description: ent-CMPacketPillsTricordrazine-desc
  components:
  - type: Sprite
    state: tricordrazine_packet
  - type: StorageFill
    contents:
    - id: CMPillTricordrazine
      amount: 4
  - type: IconLabel
    labelTextLocId: rmc-tricordazine-container-label-text

- type: entity
  parent: CMPacketPills
  id: CMPacketPillsBicaridine
  name: ent-CMPacketPillsBicaridine
  description: ent-CMPacketPillsBicaridine-desc
  components:
  - type: Sprite
    state: bicaridine_packet
  - type: StorageFill
    contents:
    - id: CMPillBicaridine
      amount: 4
  - type: IconLabel
    labelTextLocId: rmc-bicaridine-container-label-text

- type: entity
  parent: CMPacketPills
  id: CMPacketPillsKelotane
  name: ent-CMPacketPillsKelotane
  description: ent-CMPacketPillsKelotane-desc
  components:
  - type: Sprite
    state: kelotane_packet
  - type: StorageFill
    contents:
    - id: CMPillKelotane
      amount: 4
  - type: IconLabel
    labelTextLocId: rmc-kelotane-container-label-text

