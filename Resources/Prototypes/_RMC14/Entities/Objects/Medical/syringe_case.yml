  description: ent-RMCSyringeCase-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/syringe_case.rsi
    state: syringe_case
  - type: Item
    size: Small
    sprite: _RMC14/Objects/Medical/syringe_case.rsi
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,5,1 # 3 slots
    whitelist:
      components:
      - Pill
      tags:
      - Bottle
      - Pill
      - Syringe
      - CMAutoInjector
      - Paper
