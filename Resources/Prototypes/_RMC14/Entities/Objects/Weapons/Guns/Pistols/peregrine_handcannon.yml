- type: entity
  parent: [RMCBaseSlideMagazineVisuals, CMWeaponPistolBase]
  id: RMCWeaponPistolHandcannon
  name: ent-RMCWeaponPistolHandcannon
  description: ent-RMCWeaponPistolHandcannon-desc
  components:
  - type: Gun
    shotsPerBurst: 2
    availableModes:
    - SemiAuto
    - Burst
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_DE50.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    scatterWielded: 5
    scatterUnwielded: 5
    baseFireRate: 1.43
    burstScatterMult: 5
    modifiers:
      Burst:
        fireDelay: 0.2
        maxScatterModifier: 5
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/handcannon.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/handcannon.rsi
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1
    accuracyMultiplierUnwielded: 0.75
  - type: GunDamageModifier
    multiplier: 1.4
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazinePistolHandcannon
        startingItem: RMCMagazinePistolHandcannon
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentRecoilCompensator
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS5MicroRedDotSight
          - RMCAttachmentS6ReflexSight
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentLaserSight
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.75, 0.070
      rmc-aslot-rail: 0.090, 0.125
      rmc-aslot-underbarrel: 0.312, -0.25
  - type: Tag
    tags:
    - Sidearm
    - RMCWeaponPistolHandcannon

- type: entity
  parent: RMCWeaponPistolHandcannon
  id: RMCWeaponPistolHandcannonGold
  name: ent-RMCWeaponPistolHandcannonGold
  description: ent-RMCWeaponPistolHandcannonGold-desc
  components:
  - type: Corrodible
    isCorrodible: false
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    scatterWielded: 5
    scatterUnwielded: 8
    baseFireRate: 1.43
    burstScatterMult: 5
    modifiers:
      Burst:
        fireDelay: 0.2
        maxScatterModifier: 7
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/handcannon_gold.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/handcannon_gold.rsi
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazinePistolHandcannon
          - RMCMagazinePistolHandcannonHI
          - RMCMagazinePistolHandcannonHIAP
        startingItem: RMCMagazinePistolHandcannonHI
  - type: Tag
    tags:
    - Sidearm
    - RMCWeaponPistolHandcannonGold
  - type: RMCBattleExecute
  - type: RMCAirShot
    preparationTime: 1.5
    requiresCombat: true
    doAfterBreakOnMove: false
    ignoreRoof: true
    shakeAmount: 5
    requiredSkills:
      RMCSkillLeadership: 3

- type: entity
  parent: RMCWeaponPistolHandcannonGold
