- type: entity
  abstract: true
  parent: BaseStorageItem
  id: RMCBoxShotgunBase
  name: ent-RMCBoxShotgunBase
  components:
  - type: Item
    size: Large
  - type: Storage
    grid:
    - 0,0,9,1 # 5 slots
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Boxes/modular_boxes.rsi
    layers:
    - state: smallshell_box
      color: "#ff0000"
    - state: smallshell_box_12g
      color: "#00ff00"
    - state: smallshell_ammo_full_12g_base
      color: "#ffffff"
    - state: smallshell_ammo_full_12g_color
      color: "#0000ff"
      map: [ "full" ]
    - state: smallshell_empty
      map: [ "empty" ]
      color: "#ff0000"
  - type: Appearance
  - type: Tag
    tags:
    - RMCBoxShotgunShells
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: CMStorageVisualizer
    storageEmpty: empty
  - type: RMCStorageEjectHand
    state: Last

- type: Tag
  id: RMCBoxShotgunShells

- type: entity
  parent: RMCBoxShotgunBase
  id: RMCBoxShotgunBuckshot
  name: ent-RMCBoxShotgunBuckshot
  description: ent-RMCBoxShotgunBuckshot-desc
  components:
  - type: Storage
    whitelist:
      tags:
      - RMCShellShotgunBuckshot
  - type: StorageFill
    contents:
    - id: CMShellShotgunBuckshot
      amount: 5
  - type: Sprite
    layers:
    - state: smallshell_box
      color: "#944444"
    - state: shell_box_buckshot
      color: "#e0d5c2"
    - state: smallshell_ammo_full_12g_base
      color: "#ffffff"
    - state: smallshell_ammo_full_12g_color
      color: "#944444"
      map: [ "full" ]
    - state: smallshell_empty
      map: [ "empty" ]
      color: "#944444"

