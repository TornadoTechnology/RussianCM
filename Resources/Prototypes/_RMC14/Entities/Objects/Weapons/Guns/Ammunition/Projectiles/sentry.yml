- type: entity
  parent: RMCBaseBullet
  id: CMBulletSentry10x50mm
  name: ent-CMBulletSentry10x50mm
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/bullet_projectiles.rsi
    drawdepth: Effects
    layers:
    - state: bullet
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 20
  - type: CMArmorPiercing
    amount: 100
  - type: DeleteXenoResinOnHit
  - type: RMCProjectileAccuracy
    accuracy: 110
    thresholds:
    - range: 22
      falloff: 10

- type: entity
  parent: RMCBaseBullet
  id: RMCBulletSentry
  name: ent-RMCBulletSentry
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/bullet_projectiles.rsi
    layers:
    - state: bullet
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 30
  - type: CMArmorPiercing
    amount: 35
  - type: RMCProjectileAccuracy
    accuracy: 110
    thresholds:
    - range: 22
      falloff: 10

- type: entity
  abstract: true
  parent: RMCBaseBullet
  id: RMCBaseBulletSentryFireProjectile
  name: ent-RMCBaseBulletSentryFireProjectile
  description: ent-RMCBaseBulletSentryFireProjectile-desc
  categories: [ HideSpawnMenu ]
  components:
  - type: IgniteOnProjectileHit
  - type: IgnorePredictionHide
  - type: RMCFireProjectile
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/firesentry_projectile.rsi
    layers:
    - state: pulse0
      shader: unshaded
  - type: Projectile
    deleteOnCollide: false
    impactEffect: BulletImpactEffect
    damage:
      types:
        Heat: 35
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: RMCProjectileAccuracy
    accuracy: 100
    thresholds:
    - range: 5
      falloff: 10
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.45,0.15,0.15"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
  - type: TriggerOnCollide
    fixtureID: projectile

- type: entity
  parent: RMCBaseBulletSentryFireProjectile
  id: RMCBulletSentryFireProjectile
  components:
  - type: DirectionalTileFireOnTrigger
    spawn: RMCTileFire
    range: 1
    duration: 5
    offsetForward: true

- type: entity
  parent: RMCBaseBulletSentryFireProjectile
  id: RMCBulletSentryFireProjectileBlue
  name: ent-RMCBulletSentryFireProjectileBlue
  description: ent-RMCBulletSentryFireProjectileBlue-desc
  categories: [ HideSpawnMenu ]
  components:
  - type: IgniteOnProjectileHit
    burnColor: "#00b8ff"
    intensity: 40
    duration: 40
  - type: DirectionalTileFireOnTrigger
    spawn: RMCTileFireBlue
    range: 1
    offsetForward: true

- type: entity
  parent: RMCBaseBulletSentryFireProjectile
  id: RMCBulletSentryFireProjectileSmoke
  name: ent-RMCBulletSentryFireProjectileSmoke
  description: ent-RMCBulletSentryFireProjectileSmoke-desc
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    deleteOnCollide: true
    impactEffect: BulletImpactEffect
    damage:
      types:
        Heat: 35
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: SpawnOnTerminate
    spawn: RMCSmokeFireSentry

- type: Tag
  id: RMCBulletSentryFireProjectile

- type: Tag
  id: RMCBulletSentryFireProjectileBlue

- type: Tag
  id: RMCBulletSentryFireProjectileSmoke
