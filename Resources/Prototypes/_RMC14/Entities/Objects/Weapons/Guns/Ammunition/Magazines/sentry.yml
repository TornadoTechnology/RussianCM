- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineSentry
  name: "ent-RMCMagazineSentry"
  description: "ent-RMCMagazineSentry-desc"
  components:
  - type: Item
    size: Normal
  - type: Tag
    tags:
    - RMCMagazineSentry
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgeSentry
    proto: RMCCartridgeSentry
    capacity: 500
    cycleable: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/un571c.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
    zeroOnlyOnEmpty: true
  - type: Appearance

- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineSentryShotgun
  name: "ent-RMCMagazineSentryShotgun"
  description: "ent-RMCMagazineSentryShotgun-desc"
  components:
  - type: Tag
    tags:
    - RMCMagazineSentryShotgun
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCShellShotgunBuckshot
    proto: CMShellShotgunBuckshot
    capacity: 50
    cycleable: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/un12g.rsi


- type: entity
  parent: BaseMagazineRifle
  id: RMCMagazineSentryFire
  name: ent-RMCMagazineSentryFire
  description: ent-RMCMagazineSentryFire-desc
  components:
  - type: Tag
    tags:
    - RMCMagazineSentryFire
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCBulletSentryFireProjectile
    proto: RMCBulletSentryFireProjectile
    capacity: 100
    cycleable: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/sentry_flametank.rsi
    layers:
    - state: flametank
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: flametank_strip
      color: "#EE6515"

