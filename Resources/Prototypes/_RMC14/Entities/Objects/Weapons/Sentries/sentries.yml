- type: entity
  parent: RMCSentry
  id: RMCSentryMini
  name: ent-RMCSentryMini
  description: ent-RMCSentryMini-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Sentries/sentry.rsi
    drawdepth: Mobs
    noRot: true
    layers:
    - map: [ "sentry" ]
      state: mini_uac_sentry_handheld
  - type: Icon
    sprite: _RMC14/Objects/Weapons/Sentries/sentry.rsi
    state: mini_uac_sentry_handheld
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.SentryLayers.Layer:
        sentry:
          Item: { state: mini_uac_sentry_handheld }
          Off: { state: mini_uac_sentry_noammo }
          On: { state: mini_uac_sentry_on }
  - type: Gun
    fireRate: 6.66
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: GunDamageModifier
    multiplier: 0.4
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.25
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
      sentry:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 20
        layer:
        - BulletImpassable
        hard: false
  - type: Sentry
    deployDelay: 0.75
    undeployDelay: 0.75
    upgrades: null

