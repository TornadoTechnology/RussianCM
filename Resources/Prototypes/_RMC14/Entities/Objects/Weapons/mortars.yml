- type: entity
  parent: BaseItem
  id: RMCMortarKit
  name: ent-RMCMortarKit
  suffix: ent-RMCMortarKit-suffix
  description: ent-RMCMortarKit-desc
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleMortar
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/mortar/classic.rsi
    layers:
    - map: [ "mortar" ]
      state: mortar_m402_carry
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
      mortar:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 20
        layer:
        - Impassable
        mask:
        - Impassable
        hard: false
  - type: CollisionWake
    enabled: false
  - type: Anchorable
    flags:
    - Unanchorable
  - type: Item
    size: Huge
  - type: Corrodible
    isCorrodible: false
  - type: Mortar
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: UserInterface
    interfaces:
      enum.MortarUiKey.Key:
        type: MortarBui
      enum.RMCCameraUiKey.Key:
        type: RMCCameraBui
  - type: ActivatableUI
    key: enum.MortarUiKey.Key
  - type: RMCCameraComputer
    protoIds:
    - RMCMortarKit
    title: rmc-mortar-camera-title
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.MortarVisualLayers.State:
        mortar:
          Item: { state: mortar_m402_carry }
          Deployed: { state: mortar_m402 }
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno
  - type: RequireProjectileTarget
  - type: ImmuneToMelee
    whitelist:
      components:
      - Marine
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Weapons/mortar/jungle.rsi
      Desert: _RMC14/Objects/Weapons/mortar/desert.rsi
      Snow: _RMC14/Objects/Weapons/mortar/snow.rsi
      Classic: _RMC14/Objects/Weapons/mortar/classic.rsi
      Urban: _RMC14/Objects/Weapons/mortar/urban.rsi
  - type: ReceiverXenoClaws
    maxHealth: 100
    hitsToDestroy: 1
    minimumClawStrength: Normal
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/_RMC14/Structures/metalhit.ogg"

- type: entity
  abstract: true
  parent: BaseItem
  id: RMCMortarShellBase
  name: ent-RMCMortarShellBase
  description: ent-RMCMortarShellBase-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/mortar.rsi
    state: mortar_ammo_cas
  - type: Item
    size: Huge
  - type: MortarShell

- type: entity
  parent: RMCMortarShellBase
  id: RMCMortarShellHE
  name: ent-RMCMortarShellHE
  description: ent-RMCMortarShellHE-desc
  components:
  - type: Item
    heldPrefix: he
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/mortar.rsi
    state: mortar_ammo_he
  - type: Explosive
    explosionType: RMCMortar
    maxIntensity: 30.1 # max 150 brute, 150 burn
    intensitySlope: 2
    totalIntensity: 1000
    canCreateVacuum: false
  - type: CMExplosionEffect
  - type: RMCScorchEffect
  - type: MortarShell

- type: entity
  parent: RMCMortarShellBase
  id: AU14MortarShellHEATMP
  name: ent-AU14MortarShellHEATMP
  description: ent-AU14MortarShellHEATMP-desc
  components:
  - type: Item
    heldPrefix: heat
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/mortar.rsi
    state: mortar_ammo_heat
  - type: Explosive
    explosionType: RMCMortar
    maxIntensity: 300
    intensitySlope: 35
    totalIntensity: 1000
    canCreateVacuum: false
  - type: CMExplosionEffect
  - type: RMCScorchEffect
  - type: MortarShell

- type: entity
  parent: RMCMortarShellBase
  id: RMCMortarShellIncendiary
  name: ent-RMCMortarShellIncendiary
  description: ent-RMCMortarShellIncendiary-desc
  components:
  - type: Item
    heldPrefix: inc
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/mortar.rsi
    state: mortar_ammo_inc
  - type: Explosive
    explosionType: RMCMortar
    maxIntensity: 30.1
    intensitySlope: 2
    totalIntensity: 100
    canCreateVacuum: false
  - type: CMExplosionEffect
  - type: RMCScorchEffect
  - type: MortarShell
  - type: TileFireOnTrigger
    spawn: RMCTileFire
    range: 5

- type: entity
  parent: RMCMortarShellBase
  id: RMCMortarShellFlare
  name: ent-RMCMortarShellFlare
  description: ent-RMCMortarShellFlare-desc
  components:
  - type: Item
    heldPrefix: flr
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/mortar.rsi
    state: mortar_ammo_flr
  - type: MortarShell
  - type: MortarCameraShell

- type: entity
  id: RMCMortarFlare
  name: ent-RMCMortarFlare
  description: ent-RMCMortarFlare-desc
  components:
  - type: ExpendableLight
    startsActivated: true
    glowDuration: 150
    fadeOutDuration: 30
    turnOnBehaviourID: turn_on
    fadeOutBehaviourID: fade_out
    iconStateSpent: overlay
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        id: turn_on
        maxDuration: 5.0
        startValue: 2.5
        endValue: 20.0
      - !type:FadeBehaviour
        id: fade_out
        maxDuration: 30
        startValue: 20.0
        endValue: 3.0
  - type: Appearance
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: PointLight
    color: "#E3DAC9"
    enabled: false
    netsync: false
    radius: 30
  - type: TimedDespawn
    lifetime: 180

