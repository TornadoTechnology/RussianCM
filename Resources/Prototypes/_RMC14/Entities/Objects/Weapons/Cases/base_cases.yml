- type: entity
  abstract: true
  parent: BaseStorageItem
  id: RMCCaseBase
  name: ent-RMCCaseBase
  components:
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/Storage/guncase.rsi
    layers:
    - state: closed
      map: [ base ]
  - type: Icon
    sprite: _RMC14/Objects/Storage/guncase.rsi
    state: closed
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: open }
          False: { state: closed }
  - type: Item
    size: Huge
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,27,1
  - type: FixedItemSizeStorage
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCCaseBase
  id: RMCGunCaseBase
  abstract: true
  name: ent-RMCGunCaseBase
  description: ent-RMCGunCaseBase-desc
  components:
  - type: RMCUnfoldCardboard
    spawns:
    - id: RMCSheetPlastic1

- type: entity
  parent: RMCCaseBase
  id: RMCBaseEquipmentCase
  abstract: true
  name: ent-RMCBaseEquipmentCase
  description: ent-RMCBaseEquipmentCase-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/loadout_kits.rsi
    layers:
    - state: closed
      map: [ base ]
    - state: sniper
      map: [ label ]
  - type: Icon
    sprite: _RMC14/Objects/loadout_kits.rsi
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: open }
          False: { state: closed }
        label:
          True: { visible: false }
          False: { visible: true }
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,27,1
  - type: RemoveOnlyStorage
  - type: FixedItemSizeStorage
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
