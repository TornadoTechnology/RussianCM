- type: entity
  parent: CMSniperEquipmentCase
  id: RMCScoutSniperSniperEquipmentCase
  name: ent-RMCScoutSniperSniperEquipmentCase
  description: "ent-RMCScoutSniperSniperEquipmentCase-desc"
  suffix: ent-RMCScoutSniperSniperEquipmentCase-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Objects/loadout_kits.rsi
    layers:
    - state: closed
      map: [ base ]
    - state: sniper
      map: [ label ]
  - type: Icon
    sprite: _RMC14/Objects/loadout_kits.rsi
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: open }
          False: { state: closed }
        label:
          True: { visible: false }
          False: { visible: true }
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,17,1
  - type: StorageFill
    contents:
    - id: CMGlassesM42ScoutSight
    - id: CMMagazineSniperM96S
      amount: 6
    - id: RMCM96SBSniperRifle
    - id: RMCAttachmentBipod
  - type: CMChangeUserOnVend
    addComponents:
    - type: SniperWhitelist

