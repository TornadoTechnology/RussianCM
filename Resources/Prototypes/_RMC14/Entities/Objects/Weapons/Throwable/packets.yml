- type: entity
  abstract: true
  parent: BaseStorageItem
  id: CMPacketBase
  name: ent-CMPacketBase
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Storage/packets.rsi
    state: general_packet
  - type: Item
    size: Normal
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,5,1 # 3 slots
    whitelist:
      tags:
      - Grenade
  - type: UseDelay
    delay: 0.5
  - type: FixedItemSizeStorage
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: Appearance
  - type: CMStorageVisualizer
    storageClosed: closedLayer
    storageOpen: openLayer
    storageEmpty: emptyLayer
  - type: Tag
    tags:
    - RMCPacketGrenade

- type: entity
  parent: CMPacketBase
  id: CMPacketGrenadeHighExplosive
