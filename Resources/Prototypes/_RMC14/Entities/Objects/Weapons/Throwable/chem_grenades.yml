- type: entity
  parent: ModularGrenade
  id: RMCCustomGrenade
  name: ent-RMCCustomGrenade
  description: ent-RMCCustomGrenade-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Grenades/custom_grenade.rsi
    layers:
    - state: unfinished
      map: [ "enum.ConstructionVisuals.Layer" ]
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: IgnorePredictionHide
  - type: Clothing
    slots:
    - suitStorage
  - type: Destructible
    thresholds: []
  - type: ChangeItemSizeOnTimerTrigger
  - type: CancelUseWithCloak
  - type: CMVocalizeTrigger
  - type: Ammo # TODO being able to lock the grenade
  - type: GenericVisualizer
    visuals:
      enum.ConstructionVisuals.Key:
        enum.ConstructionVisuals.Layer:
          start: { state: unfinished }
          caseWithTrigger: { state: unfinished }
          caseWithPayload: { state: unfinished }
          grenade: { state: icon }
      enum.Trigger.TriggerVisuals.VisualState:
        enum.ConstructionVisuals.Layer:
          Primed: { state: primed }
          # Unprimed: <Use state determined by enum.ConstructionVisuals.Layer>
  - type: Construction
    graph: RMCCustomGrenadeGraph
    node: start
  - type: ContainerContainer
    containers:
      payload: !type:Container
      payloadTrigger: !type:Container
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 4250 # large custom grenade = 7000

# Metal Foam Grenade
- type: entity
  parent: RMCCustomGrenade
  id: RMCGrenadeCustomMetalFoam
  name: ent-RMCGrenadeCustomMetalFoam
  description: ent-RMCGrenadeCustomMetalFoam-desc
  suffix: ent-RMCGrenadeCustomMetalFoam-suffix
  components:
  - type: Tag
    tags:
    - Grenade
    - LauncherCompatibleGrenade
    - RMCGrenadeM40
    - RMCGrenadeMetalFoam
  - type: ContainerFill
    containers:
      payload:
      - RMCChemicalPayloadMetalFoam
      payloadTrigger:
      - RMCTimerTrigger
  - type: Construction
    graph: RMCCustomGrenadeGraph
    node: grenade
  - type: DeleteOnTrigger
  - type: SoundOnTrigger
    sound:
        path: /Audio/Effects/Chemistry/bubbles.ogg
        params:
            variation: 0.2

- type: entity
  parent: ChemicalPayload
  id: RMCChemicalPayloadMetalFoam
  name: ent-RMCChemicalPayloadMetalFoam
  description: ent-RMCChemicalPayloadMetalFoam-desc
  suffix: ent-RMCChemicalPayloadMetalFoam-suffix
  components:
  - type: ContainerContainer
    containers:
      BeakerSlotA: !type:ContainerSlot
      BeakerSlotB: !type:ContainerSlot
  - type: ContainerFill
    containers:
      BeakerSlotA:
      - RMCBeakerMetalFoamAluminum
      BeakerSlotB:
      - RMCBeakerMetalFoamingAgent

- type: entity
  parent: CMBeaker
  id: RMCBeakerMetalFoamAluminum
  categories: [ HideSpawnMenu ]
  components:
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 60
        reagents:
          - ReagentId: RMCAluminum
            Quantity: 30

- type: entity
  parent: CMBeaker
  id: RMCBeakerMetalFoamingAgent
  categories: [ HideSpawnMenu ]
  components:
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 60
        reagents:
          - ReagentId: FoamingAgent
            Quantity: 10
          - ReagentId: PolytrinicAcid
            Quantity: 10

