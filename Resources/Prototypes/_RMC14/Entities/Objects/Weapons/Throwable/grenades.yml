- type: entity
  abstract: true
  parent: GrenadeBase
  id: CMGrenadeBase
  name: ent-CMGrenadeBase
  description: ent-CMGrenadeBase-desc
  components:
  - type: Explosive
    explosionType: RMC
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: OnUseTimerTrigger
    delay: 4
    beepSound:
      path: "/Audio/_RMC14/Explosion/armbomb.ogg"
      params:
        volume: -5
    initialBeepDelay: 0
    beepInterval: 10
    doPopup: false
  - type: IgnorePredictionHide
  - type: Clothing
    slots:
    - suitStorage
  - type: Destructible
    thresholds: []
  - type: ChangeItemSizeOnTimerTrigger
  - type: CancelUseWithCloak

- type: entity
  abstract: true
  id: RMCM40DPTags
  components:
  - type: Tag
    tags:
    - Grenade
    - LauncherCompatibleGrenade
    - RMCGrenadeM40

- type: entity
  name: ent-RMCGrenadeFlashBang
  description: ent-RMCGrenadeFlashBang-desc
  parent: CMGrenadeBase
  id: RMCGrenadeFlashBang
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Grenades/flashbang.rsi
  - type: SoundOnTrigger
    sound:
      path: "/Audio/Effects/flash_bang.ogg"
  - type: DeleteOnTrigger
  - type: SpawnOnTrigger
    proto: GrenadeFlashEffect
  - type: Appearance
  - type: TimerTriggerVisuals
    primingSound:
      path: /Audio/Effects/countdown.ogg
  - type: Tag
    tags:
    - RMCGrenadeRiot
    - Grenade
    - RMCGrenadeFlashBang
  - type: RequiresSkill
    skills:
      RMCSkillPolice: 1

