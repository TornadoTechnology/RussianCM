    anchored: true
  - type: Occluder
  - type: Sprite
    sprite: _RMC14/Effects/smoke.rsi
    state: smoke2
  - type: TimedDespawn
    lifetime: 5
  - type: Tag
    tags:
    - HideContextMenu
  - type: Appearance
  - type: DeleteOnExplosion
