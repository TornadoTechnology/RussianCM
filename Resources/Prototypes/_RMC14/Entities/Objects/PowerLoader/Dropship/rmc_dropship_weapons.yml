- type: entity
  abstract: true
  parent: RMCDropshipAttachmentBase
  id: RMCDropshipAttachmentWeapon
  components:
  - type: DropshipFabricatorPrintable
    category: Equipment
    cost: 400
  - type: PowerLoaderGrabbable
    delay: 1
  - type: DropshipWeapon
    skills:
      all:
        RMCSkillPilot: 2
  - type: PowerLoaderAttachable
    attachDelay: 7
    attachableTypes:
    - RMCDropshipWeaponPoint
  - type: PowerLoaderDetachable
    detachDelay: 7

- type: entity
  parent: RMCDropshipAttachmentWeapon
  id: RMCDropshipAttachmentGau21Cannon
  name: ent-RMCDropshipAttachmentGau21Cannon
  description: ent-RMCDropshipAttachmentGau21Cannon-desc
  components:
  - type: Sprite
    layers:
    - state: 30mm_cannon
      offset: 0.5, 0.5
  - type: DropshipFabricatorPrintable
    cost: 400
  - type: DropshipWeapon
    abbreviation: GAU
    fireDelay: 2
    fireInTransport: true
    skills:
      all:
        RMCSkillPilot: 1
    weaponAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: 30mm_cannon_installed
    ammoEmptyAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: 30mm_cannon_loaded0
    ammoAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: 30mm_cannon_loaded1

- type: entity
  parent: RMCDropshipAttachmentWeapon
  id: RMCDropshipAttachmentGuidedMissileLauncher
  name: ent-RMCDropshipAttachmentGuidedMissileLauncher
  description: ent-RMCDropshipAttachmentGuidedMissileLauncher-desc
  components:
  - type: Sprite
    layers:
    - state: rocket_pod
      offset: 0.5, 0.5
  - type: DropshipFabricatorPrintable
    cost: 600
  - type: DropshipWeapon
    abbreviation: MSL
    fireDelay: 5
    weaponAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: rocket_pod_installed
    ammoEmptyAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: rocket_pod_installed
    ammoAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: rocket_pod_loaded

- type: entity
  parent: RMCDropshipAttachmentWeapon
  id: RMCDropshipAttachmentRocketPod
  name: ent-RMCDropshipAttachmentRocketPod
  description: ent-RMCDropshipAttachmentRocketPod-desc
  components:
  - type: Sprite
    layers:
    - state: minirocket_pod
      offset: 0.5, 0.5
  - type: DropshipFabricatorPrintable
    cost: 600
  - type: DropshipWeapon
    abbreviation: RKT
    fireDelay: 1
    weaponAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: minirocket_pod_installed
    ammoEmptyAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: minirocket_pod_installed
    ammoAttachedSprite:
      sprite: _RMC14/Objects/dropship_attachments.rsi
      state: minirocket_pod_loaded
    ammoSpriteThresholds: [5, 4, 3, 2, 1]
