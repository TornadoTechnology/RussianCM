# these dont get spawned by patron figurine spawner since no PatronFigurineComponent
# map in "xeno figurine spawner" or spawn them midround :)

- type: entity
  abstract: true
  parent: RMCBaseFigurinePatron
  id: RMCBaseFigurineXeno
  components:
  - type: Sprite
    sprite: _RMC14/Objects/xeno_figurines.rsi

- type: entity
  parent: MarkerBase
  id: RMCSpawnerFigurineXeno
  name: ent-RMCSpawnerFigurineXeno
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _RMC14/Objects/xeno_figurines.rsi
      state: drone
  - type: RandomSpawner
    prototypes:
    - RMCFigurineXenoXippy
    - RMCFigurineXenoWarrior616

- type: entity
  parent: RMCBaseFigurineXeno
  id: RMCFigurineXenoXippy
  name: ent-RMCFigurineXenoXippy
  description: ent-RMCFigurineXenoXippy-desc
  components:
  - type: Sprite
    state: drone

- type: entity
  parent: RMCBaseFigurineXeno
  id: RMCFigurineXenoWarrior616
  name: ent-RMCFigurineXenoWarrior616
  description: ent-RMCFigurineXenoWarrior616-desc
  components:
  - type: Sprite
    state: warrior
