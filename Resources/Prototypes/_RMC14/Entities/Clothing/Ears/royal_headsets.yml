- type: entity
  parent: RMCHeadsetIconsTSE
  id: RMCHeadsetRoyalMarine
  name: ent-RMCHeadsetRoyalMarine
  description: ent-RMCHeadsetRoyalMarine-desc
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: RCMTeamLead
    trackerModes:
    - RCMTeamLead
    - RCMLieutenant
  - type: Sprite
    state: vai_headset
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyRoyalMarine
  - type: RMCHeadset
    channels:
    - TWESOF


- type: entity
  parent: RMCHeadsetRoyalMarine
  id: RMCHeadsetRoyalMarineLeader
  name: ent-RMCHeadsetRoyalMarineLeader
  description: ent-RMCHeadsetRoyalMarineLeader-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyRoyalMarineCommand
  - type: RMCHeadset
    radioTextIncrease: 2


- type: entity
  parent: RMCHeadsetRoyalMarine
  id: RMCHeadsetRoyalMarineOfficer
  name: ent-RMCHeadsetRoyalMarineOfficer
  description: ent-RMCHeadsetRoyalMarineOfficer-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyRoyalMarineCommand
  - type: RMCHeadset
    radioTextIncrease: 3


- type: entity
  parent: RMCHeadsetRoyalMarine
  id: RMCHeadsetRoyalMarinePVE
  name: ent-RMCHeadsetRoyalMarinePVE
  suffix: ent-RMCHeadsetRoyalMarinePVE-suffix
  description: ent-RMCHeadsetRoyalMarinePVE-desc
