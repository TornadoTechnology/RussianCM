- type: Tag
  id: RMCHeadset

- type: entity
  parent: Clothing
  id: CMHeadset
  name: ent-CMHeadset
  description: ent-CMHeadset-desc
  components:
  - type: ContainerContainer
    containers:
      key_slots: !type:Container
  - type: Headset
  - type: EncryptionKeyHolder
    keySlots: 4 # TODO RMC14 3 when intrinsic channels are all done
  - type: Clothing
    slots:
    - ears
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/headsets.rsi
    state: generic_headset
  - type: Item
    size: Small
  - type: ClothingLimit
    id: CMHeadset
  - type: RMCRadioFilter
  - type: UserInterface
    interfaces:
      enum.RMCRadioFilterUI.Key:
        type: RMCRadioFilterBui
  - type: HeadsetMultiBroadcast
  - type: Tag
    tags:
    - RMCHeadset
  - type: RMCHeadset
  - type: GuideHelp
    guides:
    - RMCGuideMarineCommunications
    - RMCGuideCommunicationsTowers
    - RMCGuideRoleCombatTechnician
    - RMCGuideRoleMaintenanceTechnician

- type: entity
