  id: RMCHeadsetHvHWeYaPMC
  name: ent-RMCHeadsetHvHWeYaPMC
  description: ent-RMCHeadsetHvHWeYaPMC-desc
  suffix: ent-RMCHeadsetHvHWeYaPMC-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/headsets.rsi
    state: pmc_headset
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyWEYAColony

  - type: GrantSquadLeaderTracker
    defaultMode: LeaderPmc
    trackerModes:
    - SupervisorWeYaExecutive
    - SupervisorWeYaSpecialist
