# Tactical Medical
- type: entity
  parent: RMCPouchMedical
  id: RMCPouchMedicalSoc
  name: ent-RMCPouchMedicalSoc
  description: ent-RMCPouchMedicalSoc-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Pouches/socmed.rsi
  - type: Storage
    grid:
    - 0,0,25,1 #13 slots
    whitelist:
      tags:
      - CMTraumaKit
      - CMBurnKit
      - CMOintment
      - Brutepack
      - CMBloodPack
      #      - TODO RMC14 splint
      - PillCanister
      - DiscreteHealthAnalyzer
      - CMFireExtinguisherPortable
      - CMSurgicalLine
      - CMSynthGraft
      - Hypospray
      - PillPacket
      components:
      - Hypospray

- type: entity
  parent: RMCPouchMedicalSoc
  id: RMCPouchMedicalSocFill
  suffix: ent-RMCPouchMedicalSocFill-suffix
  components:
  - type: StorageFill # todo rmc14 autoinjectors oxycodone
    contents:
    - id: CMHealthAnalyzer
      # splint
    - id: CMTraumaKit10
    - id: CMBurnKit10
    - id: CMKelotaneAutoInjector
    - id: CMBicaridineAutoInjector
    #- id: CMOxycodoneAutoInjector
    - id: CMEmergencyAutoInjector
    - id: CMEmergencyAutoInjector


