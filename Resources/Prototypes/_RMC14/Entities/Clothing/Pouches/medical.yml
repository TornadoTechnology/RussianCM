# Pouch First Responder
- type: entity
  parent: [RMCPouchOpenClosed, RMCPouchStorage]
  id: RMCPouchFirstResponder
  name: ent-RMCPouchFirstResponder
  description: ent-RMCPouchFirstResponder-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Pouches/frt_med.rsi
  - type: Storage
    maxItemSize: Large
    grid:
    - 0,0,9,1 #4 slots
    whitelist:
      tags:
      - DiscreteHealthAnalyzer
      - Pill
      - Syringe
      - PillCanister
      - CMTraumaKit
      - CMBurnKit
      - CMOintment
      - Brutepack
      - CMBloodPack
      #      - TODO RMC14 splint
      - CMAutoInjector
      - CMFireExtinguisherPortable
      - CMRollerItem
      - BodyBag
      - PillPacket
      - Hypospray
      components:
      - Hypospray
  - type: FixedItemSizeStorage

- type: entity
  parent: RMCPouchFirstResponder
  id: RMCPouchFirstResponderFill
  suffix: ent-RMCPouchFirstResponderFill-suffix
  components:
  - type: StorageFill
    contents:
    - id: CMHealthAnalyzer
    - id: CMRollerBedSpawnFolded
    - id: CMFireExtinguisherPortable
    - id: CMStasisBagFolded


