      - CMBurnKit
      - CMAutoInjector
      - CMRollerItem
      - BodyBag
      - RMCGlovesLatex
      - SterileMask
      - Hypospray
      - CigPack
      - RMCPenlight
      - Flare
      # New Med
      - CMBoneSaw
      - CMSurgicalDrill
      - CMCautery
      - RMCScalpel
      - CMBoneSetter
      - CMRetractor
      - CMUCastItem
      - CMUOrganClamp
      - CMHemostat
      - CMUSplintItem
      - CMUBoneGraft
      - CMBoneGel
      components:
      - Hypospray
      - Defibrillator
      - Pill
      - RMCLighter
  - type: FixedItemSizeStorage
