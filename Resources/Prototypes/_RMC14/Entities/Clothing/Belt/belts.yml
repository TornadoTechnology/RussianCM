- type: entity
  parent: RMCBeltBaseStorageNoVisuals
  id: RMCM276ShotgunShellLoadingRig
  name: ent-RMCM276ShotgunShellLoadingRig
  description: ent-RMCM276ShotgunShellLoadingRig-desc # or individual bullets. TODO RMC14
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Belt/shotgun/jungle-classic.rsi
    layers:
    - state: icon
    - state: sixth
      visible: false
    - state: third
      visible: false
    - state: half
      visible: false
    - state: twothirds
      visible: false
    - state: fivesixths
      visible: false
    - state: full
      visible: false
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Belt/shotgun/jungle-classic.rsi
  - type: Item
    size: Large
  - type: Storage
    maxItemSize: Large
    grid:
    - 0,0,13,3 # 14 slots
    whitelist:
      tags:
      - RMCShellShotgun
      - RMCCartridge458SOCOM
  - type: IgnoreContentsSize
    items:
      tags:
      - CMMagazineRifle
      - RMCMagazineShotgun
      - CMMagazineSmg
  - type: FixedItemSizeStorage
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/Belt/shotgun/jungle-classic.rsi
      Snow: _RMC14/Objects/Clothing/Belt/shotgun/snow-urban.rsi
      Desert: _RMC14/Objects/Clothing/Belt/shotgun/desert.rsi
      Urban: _RMC14/Objects/Clothing/Belt/shotgun/snow-urban.rsi
      Classic: _RMC14/Objects/Clothing/Belt/shotgun/jungle-classic.rsi
  - type: ItemMapper
    mapLayers:
      sixth:
        minCount: 1
        whitelist:
          tags:
          - RMCShellShotgun
          - RMCCartridge458SOCOM
      third:
        minCount: 3
        whitelist:
          tags:
          - RMCShellShotgun
          - RMCCartridge458SOCOM
      half:
        minCount: 6
        whitelist:
          tags:
          - RMCShellShotgun
          - RMCCartridge458SOCOM
      twothirds:
        minCount: 9
        whitelist:
          tags:
          - RMCShellShotgun
          - RMCCartridge458SOCOM
      fivesixths:
        minCount: 12
        whitelist:
          tags:
          - RMCShellShotgun
          - RMCCartridge458SOCOM
      full:
        minCount: 14
        whitelist:
          tags:
          - RMCShellShotgun
          - RMCCartridge458SOCOM

