    size: Large
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,9,1 # 5 slots
    whitelist:
      tags:
      - Flare
      - RMCShellShotgun
      - CMMagazinePistol
      - RMCMagazineRevolver
      - CMMagazineRifle
