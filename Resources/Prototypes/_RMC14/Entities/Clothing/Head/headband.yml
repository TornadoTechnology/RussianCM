# Headbands
- type: entity
  parent: CMHeadCap
  id: CMHeadBandGreen
  name: ent-CMHeadBandGreen
  description: ent-CMHeadBandGreen-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Hats/headband/green.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Hats/headband/green.rsi
  - type: HelmetAccessory
    rsi:
      sprite: _RMC14/Objects/Clothing/Head/Hats/headband/green.rsi
      state: helmet
    hatRsi:
      sprite: _RMC14/Objects/Clothing/Head/Hats/headband/green.rsi
      state: hat
  - type: CMSurgeryTool
  - type: CMUOrganClamp
  - type: CMUImprovisedSurgeryTool
    delayMultiplier: 2.5
    mishapChance: 0.14
    mishapDamageType: Blunt
    mishapDamageAmount: 2

