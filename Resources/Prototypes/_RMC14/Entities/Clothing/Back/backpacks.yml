  name: ent-RMCBackpackAmmo
  description: ent-RMCBackpackAmmo-desc
  components:
  - type: Item
    size: Huge
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/standard.rsi
  - type: FixedItemSizeStorage
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Backpacks/Marines/ammo_rack.rsi
    layers:
    - state: ammo_pack-0
      map: ["enum.StorageFillLayers.Fill"]
  - type: ClothingSpeedModifier
    walkModifier: 0.910
    sprintModifier: 0.850
  - type: HeldSpeedModifier
  - type: StorageFillVisualizer
    fillBaseName: ammo_pack
    maxFillLevels: 4
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,5,1 #3 slots
    whitelist:
      tags:
      - RMCAmmoBox
      components:
      - EmptySandbag
      - FullSandbag
  - type: CMStorageVisualizer
    storageClosed: null
    storageOpen: null

- type: entity
