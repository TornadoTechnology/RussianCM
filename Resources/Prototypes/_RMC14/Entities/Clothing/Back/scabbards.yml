    sprite: _RMC14/Objects/Clothing/Back/Scabbards/machete_h5.rsi
    state: sheath
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Back/Scabbards/machete_h5.rsi
    quickEquip: false
    slots:
    - back
    - belt
    - suitstorage
  - type: Tag
    tags:
    - Scabbard
    - RMCMacheteScabbard

- type: entity
