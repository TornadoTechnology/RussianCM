#Base
- type: entity
  parent: [ Clothing, ClothingSlotBase ]
  id: RMCScabbardBase
  name: ent-RMCScabbardBase
  description: ent-RMCScabbardBase-desc
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Scabbards/machete_h5.rsi
    state: sheath
  - type: Item
    size: Large
  - type: ItemSlots
    slots:
      item:
        name: Machete
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/_RMC14/Weapons/Guns/gun_rifle_draw.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/gun_rifle_draw.ogg
        whitelist:
          tags:
          - Machete
  - type: ItemMapper
    mapLayers:
      sheath-machete:
        whitelist:
          tags:
          - Machete
  - type: Tag
    tags:
    - Scabbard
  - type: Appearance
  - type: UsableWhileDevoured
  - type: CMHolster
  - type: CMItemSlots
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCScabbardBase
  id: RMCScabbardMachete
  name: ent-RMCScabbardMachete
  description: ent-RMCScabbardMachete-desc
  components:
