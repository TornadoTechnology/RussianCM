# High Command

- type: entity
  parent: RMCCoatBureauDeputy
  id: RMCCoatJacketGeneral
  name: ent-RMCCoatJacketGeneral
  description: ent-RMCCoatJacketGeneral-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/jacket_general.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/jacket_general.rsi
  - type: CMArmor
    melee: 35
    bullet: 35
    bio: 10
    explosionArmor: 40
  - type: ExplosionResistance
    damageCoefficient: 0
    worn: false
  - type: Storage
    grid:
    - 0,0,7,1 # 4 slots
  - type: Foldable
    canFoldInsideContainer: true
    unfoldVerbText: rmc-buttons-verb-fold
    foldVerbText: rmc-buttons-verb-fold
  - type: FoldableClothing
    foldedEquippedPrefix: jacket

- type: entity
  parent: RMCCoatJacketGeneral
  id: RMCCoatJacketGeneralFilled
  suffix: ent-RMCCoatJacketGeneralFilled-suffix
  components:
  - type: StorageFill
    contents:
    - id: CMFlash
      amount: 1
    - id: RMCTelescopicBaton
      amount: 1
    - id: RMCHandcuffs
      amount: 1

