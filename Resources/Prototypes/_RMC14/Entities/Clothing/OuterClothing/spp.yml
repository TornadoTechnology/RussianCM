# SPP armors
- type: entity
  parent: CMArmorM3Medium
  id: RMCArmorSPP
  name: ent-RMCArmorSPP
  description: ent-RMCArmorSPP-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/spp.rsi
  - type: CMArmor
    bullet: 30 # CLOTHING_ARMOR_HIGH
    bio: 15 # CLOTHING_ARMOR_MEDIUMLOW
    explosionArmor: 20 # CLOTHING_ARMOR_MEDIUM
  - type: RMCArmorSpeedTier
    speedTier: medium
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_MEDIUM
    walkModifier: 0.666
    sprintModifier: 0.666
  - type: Storage
    grid:
    - 0,0,1,1 # 1 slot
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: ClothingRequireEquipped
    autoUnequip: true
    denyReason: rmc-armor-not-spp-jumpsuit
    whitelist:
      tags:
      - RMCUniformSPP

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPRifleman
  suffix: ent-RMCArmorSPPRifleman-suffix
  components:
  - type: StorageFill
    contents:
    - id: RMCBinoculars

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPSupport
  name: ent-RMCArmorSPPSupport
  description: ent-RMCArmorSPPSupport-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/support.rsi
  - type: CMArmor
    melee: 30 # CLOTHING_ARMOR_HIGH
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

- type: entity
  parent: RMCArmorSPPSupport
  id: RMCArmorSPPSupportSynth
  name: ent-RMCArmorSPPSupportSynth
  description: ent-RMCArmorSPPSupportSynth-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/support.rsi
  - type: Clothing
    equipDelay: 1
    unequipDelay: 0.5
  - type: CMArmor
    melee: 0 # CLOTHING_ARMOR_NONE
    bullet: 0
    bio: 0
    explosionArmor: 0
  - type: RMCArmorSpeedTier
    speedTier: very light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_VERY_LIGHT
    walkModifier: 0.897
    sprintModifier: 0.897

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPCommando
  name: ent-RMCArmorSPPCommando
  description: ent-RMCArmorSPPCommando-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/commando.rsi
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: Tag
    tags:
      - RMCScoutArmor
  - type: Storage
    grid:
    - 0,0,3,1 # 2 slots

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPHeavy
  name: ent-RMCArmorSPPHeavy
  description: ent-RMCArmorSPPHeavy-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/heavy.rsi
  - type: RMCArmorSpeedTier
    speedTier: heavy
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_HEAVY
    walkModifier: 0.62
    sprintModifier: 0.62
  - type: CMArmor
    melee: 25 # CLOTHING_ARMOR_MEDIUMHIGH (melee)
    bullet: 35 # CLOTHING_ARMOR_HIGHPLUS (bullets)
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 30 # CLOTHING_ARMOR_HIGH
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

- type: entity
  parent: RMCArmorSPPHeavy
  id: RMCArmorSPPHeavySpecialist
  suffix: ent-RMCArmorSPPHeavySpecialist-suffix
  components:
  - type: IgnoreContentsSize
    items:
      tags:
      - RMCMagazineLMGQYJ72
  - type: StorageFill
    contents:
    - id: RMCMagazineLMGQYJ72
      amount: 3

- type: entity
  parent: CMArmorM3Medium
  id: RMCArmorSPPArmy
  name: ent-RMCArmorSPPArmy
  description: ent-RMCArmorSPPArmy-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/army.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/army.rsi
  - type: RMCArmorSpeedTier
