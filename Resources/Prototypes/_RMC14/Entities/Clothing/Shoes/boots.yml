# Dress Shoes
- type: entity
  parent: RMCShoesLaceupDress
  id: CMShoesLaceupCommander
  name: ent-CMShoesLaceupCommander
  description: ent-CMShoesLaceupCommander-desc
- type: entity
  abstract: true
  id: RMCItemSlotM5Bayonet
  suffix: ent-RMCItemSlotM5Bayonet-suffix
  components:
  - type: ContainerContainer
    containers:
      item: !type:ContainerSlot
  - type: ItemSlots
    slots:
      item:
        name: cm-knife
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        whitelist:
          tags:
          - Knife
          - Holdout
          - Screwdriver
          - RMCScalpel
          - ThrowingKnife
        startingItem: RMCM5Bayonet
  - type: CMItemSlots
    startingItem: RMCM5Bayonet
  - type: Appearance

# Black Boots
- type: entity
  parent: ClothingShoesMilitaryBase
  id: CMBootsBlack
  name: ent-CMBootsBlack
  description: ent-CMBootsBlack-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/black.rsi
    layers:
    - state: icon
    - state: filled
      map: [ "enum.CMItemSlotsLayers.Fill" ]
  - type: EmitSoundOnDrop
    sound:
      collection: RMCEquipArmor
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      collection: RMCEquipArmor
      params:
        volume: -4
  - type: Clothing
    unequipSound:
      collection: RMCEquipArmor
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/black.rsi
  - type: ContainerContainer
    containers:
      item: !type:ContainerSlot
  - type: ItemSlots
    slots:
      item:
        name: cm-knife
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m42a2.ogg
        whitelist:
          tags:
          - Knife
          - Holdout
          - Screwdriver
          - RMCScalpel
  - type: Matchbox
  - type: CMHolster
  - type: CMItemSlots
  - type: UsableWhileDevoured

- type: entity
  parent: [RMCItemSlotM5Bayonet, CMBootsBlack]
  id: CMBootsBlackFilled
  suffix: ent-CMBootsBlackFilled-suffix

- type: entity
  parent: CMBootsBlackFilled
  id: RMCScoutShoes
  name: ent-RMCScoutShoes # Could probably use it's own sprite
  description: ent-RMCScoutShoes-desc
  components:
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepCatwalk #I dunno what a better sound effect would be, catwalk stands out so it's there to alert xenos if scout moves while they are close
      params:
        volume: -14
        maxDistance: 0

- type: entity
  parent: CMBootsBlack
  id: RMCShoesCombat
  name: ent-RMCShoesCombat
  description: ent-RMCShoesCombat-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/swat.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Shoes/Boots/swat.rsi

