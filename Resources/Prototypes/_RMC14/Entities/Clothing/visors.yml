- type: entity
  parent: BaseItem
  id: RMCVisorBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/helmet_visors.rsi
  - type: Item
    size: Tiny
  - type: ToggleVisor

- type: entity
  parent: [ RMCVisorBase, RMCPowerCellSlotUnremovableSuper ]
  id: RMCVisorNightVision
  name: ent-RMCVisorNightVision
  description: ent-RMCVisorNightVision-desc
  components:
  - type: Sprite
    state: nvg_sight
  - type: PowerCellDraw
    enabled: false
    drawRate: 76
  - type: Visor
    toggledSprite:
      sprite: _RMC14/Objects/Clothing/Head/Helmets/huds.rsi
      state: nvg_sight_right
    onIcon:
      sprite: _RMC14/Objects/Clothing/helmet_visors.rsi
      state: nvg_sight_down
  - type: NightVisionVisor
  - type: ToggleVisor
    ignoreRedundancy: true
  - type: ComponentToggler
    components:
    - type: PointLight
      enabled: true
      radius: 1.7
      softness: 1
      color: "#008000"

- type: entity
  parent: RMCVisorBase
  id: RMCVisorMedical
  name: ent-RMCVisorMedical
  description: ent-RMCVisorMedical-desc
  components:
  - type: Sprite
    state: med_sight
  - type: Visor
    toggledSprite:
      sprite: _RMC14/Objects/Clothing/Head/Helmets/huds.rsi
      state: med_sight_right
    onIcon:
      sprite: _RMC14/Objects/Clothing/helmet_visors.rsi
      state: med_sight_down
  - type: ComponentToggler
    components:
    - type: ShowHealthBars
      damageContainers:
      - Biological
    - type: HolocardScanner
    - type: ShowHealthIcons
      damageContainers:
      - Biological

- type: entity
  parent: RMCVisorMedical
  id: RMCVisorMedicalAdvanced
  name: ent-RMCVisorMedicalAdvanced
  description: ent-RMCVisorMedicalAdvanced-desc
  components:
  - type: Sprite
    state: med_adv_sight
  - type: Visor
    onIcon:
      sprite: _RMC14/Objects/Clothing/helmet_visors.rsi
      state: med_adv_sight_down
    skillsRequired:
      all:
        RMCSkillMedical: 2
# TODO RMC14 view publications action

- type: entity
  parent: RMCVisorMedicalAdvanced
  id: RMCVisorMedicalAdvancedIntegrated
  suffix: ent-RMCVisorMedicalAdvancedIntegrated-suffix
  components:
  - type: UnremovableVisor
  - type: Visor
    toggledSprite:
      sprite: _RMC14/Objects/Clothing/Head/Helmets/huds.rsi
      state: med_sight_left

- type: entity
  parent: RMCVisorBase
  id: RMCVisorWelding
  name: ent-RMCVisorWelding
  description: ent-RMCVisorWelding-desc
  components:
  - type: Sprite
    state: sight_empty
  - type: Visor
    toggledSprite:
      sprite: _RMC14/Objects/Clothing/Head/Helmets/huds.rsi
      state: weld_visor
    onIcon:
      sprite: _RMC14/Objects/Clothing/helmet_visors.rsi
      state: blank_hud_sight_down
  - type: ComponentToggler
    components:
    - type: EyeProtection

- type: entity
  parent: RMCVisorWelding
  id: RMCVisorWeldingIntegrated
  suffix: ent-RMCVisorWeldingIntegrated-suffix
  components:
  - type: UnremovableVisor

- type: entity
  parent: RMCVisorBase
  id: RMCVisorSquad
  name: ent-RMCVisorSquad
  description: ent-RMCVisorSquad-desc
  components:
