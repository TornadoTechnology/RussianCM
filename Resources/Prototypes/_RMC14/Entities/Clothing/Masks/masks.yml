- type: entity
  parent: ClothingMaskPullableBase
  id: CMBaseMask
  abstract: true
  components:
  - type: HideLayerClothing
    layers:
      Snout: Mask
    hideOnToggle: true
  - type: IdentityBlocker
  - type: Appearance

- type: entity
  parent: [CMBaseMask, CMUBaseGasMaskFilterSlot]
  id: CMMaskGas
  name: ent-CMMaskGas
  description: ent-CMMaskGas-desc
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Mask/gas.rsi
    layers:
    - state: base
    - state: camo
      map: [ "enum.ItemCamouflageLayers.Layer" ]
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Mask/gas.rsi
    slots:
    - Mask
    - Suitstorage
  - type: ItemCamouflage
    colors:
      Jungle: "#ccd08d"
      Desert: "#ffd2a6"
      Snow: "#ddcbc9"
      Classic: "#c7e7d9"
      Urban: "#acb8c7"
  - type: Item
    size: Small
  - type: Tag
    tags:
    - GasMask

- type: entity
  parent: [CMBaseMask, CMUBaseGasMaskFilterSlot]
  id: RMCMaskGasSPP
  name: ent-RMCMaskGasSPP
