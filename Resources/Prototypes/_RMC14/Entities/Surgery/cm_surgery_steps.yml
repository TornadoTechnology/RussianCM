- type: entity
  id: CMSurgeryStepBase
  categories: [ HideSpawnMenu ]
  components:
  - type: CMSurgeryStep

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepOpenIncisionScalpel
  name: ent-CMSurgeryStepOpenIncisionScalpel
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMScalpel
    add:
    - type: CMIncisionOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: CMSurgeryStepBleedEffect
    damage: 10
  - type: CMSurgeryStepEmoteEffect

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepClampBleeders
  name: ent-CMSurgeryStepClampBleeders
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMHemostat
    add:
    - type: CMBleedersClamped
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat
  - type: CMSurgeryClampBleedEffect

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepRetractSkin
  name: ent-CMSurgeryStepRetractSkin
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMRetractor
    add:
    - type: CMSkinRetracted
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
    state: retractor

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepSawBones
  name: ent-CMSurgeryStepSawBones
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMBoneSaw
    add:
    - type: CMRibcageSawed
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/saw.rsi
    state: saw
  - type: CMSurgeryStepEmoteEffect

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepPriseOpenBones
  name: ent-CMSurgeryStepPriseOpenBones
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMRetractor
    add:
    - type: CMRibcageOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
    state: retractor

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepCutLarvaRoots
  name: ent-CMSurgeryStepCutLarvaRoots
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMScalpel
  - type: CMSurgeryCutLarvaRootsStep
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: CMSurgeryOperatingTableCondition

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepRemoveLarva
  name: ent-CMSurgeryStepRemoveLarva
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMHemostat
    bodyRemove:
    - type: VictimInfected
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat
  - type: CMSurgeryOperatingTableCondition
  - type: RMCSurgeryStepLarvaEffect

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepCloseBones
  name: ent-CMSurgeryStepCloseBones
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMRetractor
    remove:
    - type: CMRibcageOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
    state: retractor

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepMendRibcage
  name: ent-CMSurgeryStepMendRibcage
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMBoneGel
    remove:
    - type: CMRibcageSawed
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bone_gel.rsi
    state: bone-gel

- type: entity
  parent: CMSurgeryStepBase
  id: CMSurgeryStepCloseIncision
  name: ent-CMSurgeryStepCloseIncision
  components:
  - type: CMSurgeryStep
    tool:
    - type: CMCautery
    remove:
    - type: CMSkinRetracted
    - type: CMBleedersClamped
    - type: CMIncisionOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/cautery.rsi
    state: cautery
  - type: CMSurgeryStepEmoteEffect

- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgeryCutExoskeleton
  name: ent-RMCSurgeryCutExoskeleton
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMBoneSaw
    add:
    - type: RMCXenoOpen
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/saw.rsi
    state: saw

- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgeryOpenExoskeleton
  name: ent-RMCSurgeryOpenExoskeleton
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMRetractor
    add:
    - type: RMCXenoPryed
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
    state: retractor

- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgerySevereXenoConnections
  name: ent-RMCSurgerySevereXenoConnections
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMScalpel
    add:
    - type: RMCXenoCut
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel

- type: entity
  parent: CMSurgeryStepBase
  id: RMCSurgeryRemoveXenoOrgan
  name: ent-RMCSurgeryRemoveXenoOrgan
  components:
  - type: CMSurgeryStep
    skill: 2
    tool:
    - type: CMHemostat
    add:
    - type: RMCXenoRemoved
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat
  - type: RMCSurgeryStepXenoHeartEffect
