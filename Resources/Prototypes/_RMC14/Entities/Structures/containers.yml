- type: entity
  abstract: true
  id: RMCContainerBase
  name: ent-RMCContainerBase
  description: ent-RMCContainerBase-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,1.5"
        density: 190
        layer:
        - MobMask
  - type: Sprite
    sprite: _RMC14/Structures/containers.rsi
    offset: 0, 0.5
  - type: Clickable
  - type: Occluder
    boundingBox: "-0.5,-0.5,0.5,1.5"
  - type: XenoToggleChargingDamage
    stageLoss: 4
    destroy: true
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: ImmuneToUnarmed
  - type: ExplosionResistance
    damageCoefficient: 2 # takes 2x explosion damage
  - type: ProjectileDamageReceived
    multiplier: 0.2 # takes 80% less projectile damage
  - type: RMCWallExplosionDeletable

# Large
  - type: RMCMesonsNonviewable

