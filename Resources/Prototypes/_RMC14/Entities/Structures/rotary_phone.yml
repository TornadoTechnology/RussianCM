- type: entity
  id: RMCRotaryPhone
  name: ent-RMCRotaryPhone
  description: ent-RMCRotaryPhone-desc
  components:
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    sprite: _RMC14/Structures/rotary_phone.rsi
    drawdepth: WallMountedItems
    layers:
    - state: rotary_phone
      map: [ "base" ]
  - type: InteractionOutline
  - type: Clickable
  - type: RotaryPhone
  - type: ContainerContainer
    containers:
      rmc_rotary_phone_telephone: !type:ContainerSlot
  - type: ActivatableUI
    key: enum.RMCTelephoneUiKey.Key
  - type: UserInterface
    interfaces:
      enum.RMCTelephoneUiKey.Key:
        type: RMCTelephoneBui
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.RotaryPhoneLayers.Layer:
        base:
          Base: { state: rotary_phone }
          Ring: { state: rotary_phone_ring }
          Ear: { state: rotary_phone_ear }
  - type: WallMount
    arc: 360
  - type: GuideHelp
    guides:
    - RMCGuideMarineCommunications
    - RMCGuideCommunicationsTowers
    - RMCGuideRoleCombatTechnician
    - RMCGuideRoleMaintenanceTechnician
  - type: RMCMesonsNonviewable

- type: entity
  parent: RMCRotaryPhone
  id: RMCRotaryPhoneWallmount
  name: ent-RMCRotaryPhoneWallmount
  description: "ent-RMCRotaryPhoneWallmount-desc"
  components:
  - type: Sprite
    sprite: _RMC14/Structures/wallmount_phone.rsi
    layers:
      - state: wall_phone
        map: [ "base" ]
  - type: GenericVisualizer
    visuals:
      enum.RotaryPhoneLayers.Layer:
        base:
          Base: { state: wall_phone }
          Ring: { state: wall_phone_ring }
          Ear: { state: wall_phone_ear }

- type: entity
  parent: BaseItem
  id: RMCTelephone
  name: ent-RMCTelephone
  components:
  - type: Sprite
    sprite: _RMC14/Objects/phone.rsi
    state: rpb_phone
  - type: Item
    size: Invalid
  - type: RMCTelephone
  - type: Corrodible
    isCorrodible: false
  - type: BlockEntityStorage
  - type: Undisposable
  - type: GuideHelp
    guides:
    - RMCGuideMarineCommunications
    - RMCGuideCommunicationsTowers
    - RMCGuideRoleCombatTechnician
    - RMCGuideRoleMaintenanceTechnician


# Misc
- type: entity
  parent: RMCRotaryPhone
  id: RMCRotaryPhoneCommandTent
  name: ent-RMCRotaryPhoneCommandTent

- type: entity
  parent: RMCRotaryPhone
  id: RMCRotaryPhoneReqTent
  name: ent-RMCRotaryPhoneReqTent

- type: entity
  parent: RMCRotaryPhone
  id: RMCRotaryPhoneMessTent
  name: ent-RMCRotaryPhoneMessTent

- type: entity
  parent: RMCRotaryPhone
  id: RMCRotaryPhoneMPTent
  name: ent-RMCRotaryPhoneMPTent

# Admin
- type: entity
  parent: RMCRotaryPhone
  id: RMCRotaryPhoneAdmin
  suffix: ent-RMCRotaryPhoneAdmin-suffix
  components:
  - type: RotaryPhone
    canDnd: true
    category: Comms Relay
    notifyAdmins: true

- type: entity
  parent: RMCRotaryPhoneWallmount
  id: RMCRotaryPhoneWallmountAdmin
  suffix: ent-RMCRotaryPhoneWallmountAdmin-suffix
  components:
  - type: RotaryPhone
    canDnd: true
    category: Comms Relay
    notifyAdmins: true
