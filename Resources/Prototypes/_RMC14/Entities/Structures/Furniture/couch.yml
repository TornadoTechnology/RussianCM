# Couch
- type: entity
  parent: SeatBase
  id: RMCCouchMid
  name: ent-RMCCouchMid
  description: ent-RMCCouchMid-desc
  suffix: ent-RMCCouchMid-suffix
  placement:
    mode: SnapgridCenter
  components:
  - type: VehicleSmashable
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/couch.rsi
    state: couch_mid
  - type: RMCMesonsNonviewable
  - type: BlockXenoConstruction
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: MeleeReceivedMultiplier
    xenoDamage:
      types:
        Slash: 51
    otherMultiplier: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: RMCCouchMid
  id: RMCCouchEnd
  suffix: ent-RMCCouchEnd-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/couch.rsi
    state: couch_end

