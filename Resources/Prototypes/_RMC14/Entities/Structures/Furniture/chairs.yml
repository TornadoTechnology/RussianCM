# Wooden chair
- type: entity
  parent: CMSeatBase
  id: CMChairWood
  name: ent-CMChairWood
  description: ent-CMChairWood-desc
  components:
  - type: Sprite
    state: wooden_chair
  - type: Damageable
    damageModifierSet: Wood
  - type: Tag
    tags:
    - Wooden
  - type: StaticPrice
    price: 75
  - type: MeleeReceivedMultiplier
    xenoDamage:
      types:
        Slash: 51
    otherMultiplier: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          RMCPlankWood1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: CMChairWood
  id: CMChairWoodWings
  description: ent-CMChairWoodWings-desc
  components:
  - type: Sprite
    state: wooden_chair_wings
