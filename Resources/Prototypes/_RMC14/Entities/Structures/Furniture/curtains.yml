    snapCardinals: true
    sprite: _RMC14/Structures/Furniture/Curtains/green.rsi
    layers:
    - state: closed
      color: "#B8F5E3"
      map: ["enum.DoorVisualLayers.Base"]

- type: entity
  parent: RMCCurtainMedical
  id: RMCCurtainMedicalOpen
  suffix: ent-RMCCurtainMedicalOpen-suffix
  components:
  - type: Physics
    canCollide: false
  - type: Occluder
    enabled: false
  - type: Door
    state: Open

