- type: entity
  parent: BaseCurtains
  id: RMCCurtainBase
  name: ent-RMCCurtainBase
  abstract: true
  components:
  - type: InteractionOutline
  - type: Clickable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
#      - !type:SpawnEntitiesBehavior
#        spawn:
#          MaterialCloth1: # TODO RMC cloth
#            min: 1
#            max: 2

- type: entity
  parent: RMCCurtainBase
  id: RMCCurtainGreen
  suffix: ent-RMCCurtainGreen-suffix
  components:
  - type: Sprite
    snapCardinals: true
    sprite: _RMC14/Structures/Furniture/Curtains/green.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]

- type: entity
  parent: RMCCurtainGreen
  id: RMCCurtainBlack
  suffix: ent-RMCCurtainBlack-suffix
  components:
  - type: Sprite
    color: "#222222"

- type: entity
  parent: RMCCurtainBase
  id: RMCCurtainMedical
  name: ent-RMCCurtainMedical
  components:
