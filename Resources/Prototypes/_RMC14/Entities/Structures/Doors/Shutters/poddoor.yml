- type: entity
  parent: RMCShutterBaseIndestructible
  id: RMCPodDoorIndestructible
  name: ent-RMCPodDoorIndestructible
  description: ent-RMCPodDoorIndestructible-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Doors/Shutters/poddoor.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49" # don't want this colliding with walls or they won't close
        density: 100
        mask:
        - FullTileMask
        layer:
        - FullTileLayer
  - type: AccessReader
  - type: Door
    canPry: false
    crushDamage:
      types:
        Blunt: 25 # yowch
    performCollisionCheck: false
    canCrush: false
  - type: Occluder
  - type: Appearance
  - type: RadiationBlocker
    resistance: 8
  - type: ContainerFill
    containers:
      board: [ DoorElectronics ]
  #- type: Construction
  #  graph: BlastDoor
  #  node: blastdoor
  #  containers:
  #  - board
  - type: StaticPrice
    price: 280
  - type: RMCPodDoor
  - type: RMCMesonsNonviewable

