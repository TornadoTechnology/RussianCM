- type: entity
  parent: BaseStructureDynamic
  id: RMCCanisterBase
  name: ent-RMCCanisterBase
  description: ent-RMCCanisterBase-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/atmos.rsi
    state: yellow
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.3
        density: 155
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: null
  - type: InteractionOutline
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/spray.ogg
      - !type:SpawnEntitiesBehavior
        offset: 0
        spawn:
          RMCCanisterBrokenBase:
            min: 1
            max: 1

- type: entity
  parent: RMCCanisterBase
  id: RMCCanisterGrey
  name: ent-RMCCanisterGrey
  description: ent-RMCCanisterGrey-desc
  components:
  - type: Sprite
    state: grey 

