# Broken
- type: entity
  parent: RMCCanisterBase
  id: RMCCanisterBrokenBase
  name: ent-RMCCanisterBrokenBase
  description: ent-RMCCanisterBrokenBase-desc
  components:  
  - type: Sprite
    sprite: _RMC14/Structures/atmos.rsi
    state: yellow-1
    noRot: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Anchorable
    flags:
    - Unanchorable
