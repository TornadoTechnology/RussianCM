- type: entity
  abstract: true
  parent: CMBaseStructure
  id: RMCCommunicationsConsoleBase
  components:
  - type: Tag
    tags:
    - VehicleHeavyDriveOver
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _RMC14/Structures/Machines/rmc_groundside_communications_console.rsi
    state: on
    layers: [ ]
  - type: Clickable
  - type: InteractionOutline
  - type: Corrodible
    isCorrodible: false
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false # TODO RMC14
  - type: WallMount
    arc: 360
  - type: EmitSoundOnUIOpen
    sound:
      collection: RMCKeyboardTyping
      params:
        volume: -1
- type: entity
  parent: RMCOverwatchConsole
  id: RMCOverwatchConsoleRotating
  suffix: ent-RMCOverwatchConsoleRotating-suffix
  components:
  - type: Sprite
    overrideDir: South
    enableOverrideDir: false

- type: entity
  parent: RMCOverwatchConsoleRotating
  id: RMCOverwatchConsoleRotatingPowered
  suffix: ent-RMCOverwatchConsoleRotatingPowered-suffix
  components:
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false # intentionally!
- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCGroundsideOperationsConsole
  name: ent-RMCGroundsideOperationsConsole
  description: ent-RMCGroundsideOperationsConsole-desc
  components:
  - type: ActivatableUI
    key: enum.MarineCommunicationsComputerUI.Key
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [ [ "AU14AccessGovforCommand" ] ]
  - type: UserInterface
    interfaces:
      enum.MarineCommunicationsComputerUI.Key:
        type: MarineCommunicationsComputerBui
      enum.OverwatchConsoleUI.Key:
        type: OverwatchConsoleBui
      enum.TacticalMapComputerUi.Key:
        type: TacticalMapComputerBui
      enum.DialogUiKey.Key:
        type: DialogBui
  - type: MarineCommunicationsComputer
  - type: OverwatchConsole
    canMessageSquad: false
  - type: TacticalMapComputer

- type: entity
  parent: RMCGroundsideOperationsConsole
  id: RMCGroundsideOperationsConsoleGovfor
  suffix: ent-RMCGroundsideOperationsConsoleGovfor-suffix
  components:
  - type: OverwatchConsole
    canMessageSquad: false
    group: GOVFOR
  - type: TacticalMapComputer
    faction: govfor

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCWarshipControlConsole
  name: ent-RMCWarshipControlConsole
  description: ent-RMCWarshipControlConsole-desc
  components:
  - type: ActivatableUI
    key: enum.MarineControlComputerUi.Key
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [ [ "AU14AccessGovforCommand" ] ]
  - type: UserInterface
    interfaces:
      enum.MarineControlComputerUi.Key:
        type: MarineControlComputerBui
      enum.MarineControlComputerUi.MedalsPanel:
        type: MedalsPanelBui
      enum.DialogUiKey.Key:
        type: DialogBui
  - type: MarineControlComputer

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCOverwatchConsole
  name: ent-RMCOverwatchConsole
  description: ent-RMCOverwatchConsole-desc
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: overwatch
    overrideDir: West
    enableOverrideDir: true
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.OverwatchConsoleUI.Key
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.OverwatchConsoleUI.Key:
        type: OverwatchConsoleBui
      enum.TacticalMapComputerUi.Key:
        type: TacticalMapComputerBui
      enum.DialogUiKey.Key:
        type: DialogBui
  - type: RequiresSkill
    skills:
      RMCSkillOverwatch: 1
  - type: OverwatchConsole
  - type: SupplyDropComputer


- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCTacticalMapTable
  name: ent-RMCTacticalMapTable
  description: ent-RMCTacticalMapTable-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/map_table.rsi
    state: maptable
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.TacticalMapComputerUi.Key
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [ [ "AU14AccessGovforCommand" ] ]
  - type: UserInterface
    interfaces:
      enum.TacticalMapComputerUi.Key:
        type: TacticalMapComputerBui
  - type: TacticalMapComputer
  - type: EmitSoundOnUIOpen
    sound: null

- type: entity
  parent: RMCTacticalMapTable
  id: RMCTacticalMapTableLarge
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/large_map_table.rsi
    offset: 1, 0.5
    drawdepth: Objects
    layers:
    - state: maptable
    - state: maptable-on
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      shader: unshaded
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.TacticalMapComputerUi.Key
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [ [ "AU14AccessGovforCommand" ] ]
  - type: UserInterface
    interfaces:
      enum.TacticalMapComputerUi.Key:
        type: TacticalMapComputerBui
  - type: TacticalMapComputer
  - type: EmitSoundOnUIOpen
    sound: null
  - type: ApcPowerReceiver
    powerLoad: 250
    needsPower: true
  - type: RMCPowerReceiver
    idleLoad: 5
    activeLoad: 10
    channel: Equipment
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.5,2.4,1.4"
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: PlaceableSurface

- type: entity
  parent: RMCTacticalMapTable
  id: RMCTacticalMapTableGovfor
  suffix: ent-RMCTacticalMapTableGovfor-suffix
  components:
  - type: TacticalMapComputer
    faction: govfor

- type: entity
  parent: RMCTacticalMapTableLarge
  id: RMCTacticalMapTableLargeGovfor
  suffix: ent-RMCTacticalMapTableLargeGovfor-suffix
  components:
  - type: TacticalMapComputer
    faction: govfor

- type: entity
  parent: RMCTacticalMapTableLarge
  id: RMCTacticalMapTableLargeSquare
  suffix: ent-RMCTacticalMapTableLargeSquare-suffix

- type: entity
  parent: RMCTacticalMapTableLarge
  id: RMCTacticalMapTableLargeRotated
  suffix: ent-RMCTacticalMapTableLargeRotated-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/large_map_table_rotated.rsi
    offset: 0.5, 1
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.4,1.4,2.4"
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCEscapePodController
  name: ent-RMCEscapePodController
  description: ent-RMCEscapePodController-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/escape_pod_panel.rsi
    state: airlock_control_standby
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.EvacuationComputerUi.Key
  - type: UserInterface
    interfaces:
      enum.EvacuationComputerUi.Key:
        type: EvacuationComputerBui
  - type: EvacuationComputer
    maxMobs: 3
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCEscapePodController
  id: RMCEscapePodControllerLiaison
  components:
  - type: EvacuationComputer
    earlyCrashChance: 0
  - type: AccessReader
    access: [ [ "AU14AccessCorporateWEYU" ] ]

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCLifeboatConsole
  name: ent-RMCLifeboatConsole
  description: ent-RMCLifeboatConsole-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.LifeboatComputerUi.Key
  - type: UserInterface
    interfaces:
      enum.LifeboatComputerUi.Key:
        type: LifeboatComputerBui
  - type: LifeboatComputer
  - type: AccessReader
    access: [ [ "AU14AccessGovforPilot" ], [ "AU14AccessGovforCommand" ], [ "AU14AccessColonyAdministrator" ] ] # replace Command with Senior access
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno
