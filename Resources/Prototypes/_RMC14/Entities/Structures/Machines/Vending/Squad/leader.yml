- type: entity
  parent: ColMarTechBase
  id: ColMarTechSLEquipment
  name: ent-ColMarTechSLEquipment
  description: ent-ColMarTechSLEquipment-desc
  components:
  - type: AccessReader
    access:
    - [ "CMAccessSquadLeaderPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMSquadLeader
    sections:
    - name: Standard Equipment
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleSquadLeaderApparel
      - id: RMCBackpackRTO
        replaceSlot: back
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Armor
      choices: { CMArmour: 1 }
      entries:
      - id: RMCArmorB12Zipties
        name: leader B12 pattern marine armor (zipties)
        recommended: true
      - id: RMCArmorM4Zipties
        name: leader M4 pattern marine armor (zipties)
      - id: RMCArmorVestSquadLeader
        name: leader M3-XL pattern armor vest (zipties)
    - name: Backpack
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpackMarine
      - id: RMCScabbardMacheteFilled
      - id: CMSatchelMarine
        recommended: true
    - name: Belt
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: CMBeltMarine
        recommended: true
      - id: CMBeltMedicBag
      - id: CMBeltMedical
      - id: RMCBeltHolsterPistol
      - id: RMCBeltHolsterM13
      - id: RMCBeltHolsterRevolver
      - id: RMCBeltHolsterSMG
      - id: RMCBeltHolsterSMGPouch
      - id: RMCM82FHolster
      - id: RMCM276ShotgunShellLoadingRig
      - id: CMBeltUtilityFilled
        name: M276 pattern toolbelt rig (Full)
      - id: RMCBeltGrenade
    - name: Pouches
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchAutoinjectorFill
        recommended: true
      - id: RMCPouchFirstAidInjectors
        name: first-aid pouch (refillable injectors)
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: first-aid pouch (gauze, ointment) # TODO RMC14 splints comma
      - id: RMCPouchFirstAidPills
        name: first-aid pouch (pills)
        recommended: true
      - id: RMCPouchFlareFilled
        name: Flare pouch (Full)
      - id: RMCPouchFuelTank
      - id: RMCPouchGeneralLarge
        recommended: true
      - id: RMCPouchSling
      - id: RMCPouchMagazineLarge
      - id: RMCPouchShotgunLarge
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchPistol
    - name: Accessories
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBlack
      - id: CMWebbingBrown
        recommended: true
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
    - name: Mask
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather

