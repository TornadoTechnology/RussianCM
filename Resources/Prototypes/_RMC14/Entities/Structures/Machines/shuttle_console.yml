- type: entity
  parent: CMBaseStructure
  abstract: true
  id: CMComputerDropship
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/shuttle_console.rsi
    drawdepth: SmallObjects
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipNavigation
  name: ent-CMComputerDropshipNavigation
  description: ent-CMComputerDropshipNavigation-desc
  components:
  - type: Sprite
    state: console
  - type: DropshipNavigationComputer
  - type: ActivatableUI
    key: enum.DropshipNavigationUiKey.Key
  - type: AccessReader
    access: [ [ "AU14AccessGovforFTL" ], [ "AU14AccessGovforPilot" ] ]
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipNavigationUiKey.Key:
        type: DropshipNavigationBui
      enum.DropshipHijackerUiKey.Key:
        type: DropshipHijackerBui

- type: entity
  parent: CMComputerDropshipNavigation
  id: CMComputerDropshipNavigationOpfor
  name: ent-CMComputerDropshipNavigationOpfor
  suffix: ent-CMComputerDropshipNavigationOpfor-suffix
  components:
  - type: AccessReader
    access: [ ]
  - type: WhitelistedShuttle
    faction: opfor
    ShuttleType: Dropship

- type: entity
  parent: CMComputerDropshipNavigation
  id: CMComputerDropshipNavigationERT
  name: ent-CMComputerDropshipNavigationERT
  description: ent-CMComputerDropshipNavigationERT-desc
  components:
  - type: Sprite
    state: syndishuttle
  - type: DropshipNavigationComputer
    hijackable: false

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipNavigationPlanetside
  name: ent-CMComputerDropshipNavigationPlanetside
  description: ent-CMComputerDropshipNavigationPlanetside-desc
  suffix: ent-CMComputerDropshipNavigationPlanetside-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/dropship_nav_computer.rsi
    state: on
  - type: ActivatableUI
    key: enum.DropshipTerminalUiKey.Key
  - type: AccessReader
    access: [["CMAccessDropship"], ["CMAccessSquadLeaderPrep"], ["CMAccessXeno"]] # Xeno have access as to not cause the "Access denied!" popup.
  - type: ActivatableUIRequiresAccess
  - type: DropshipTerminal
  - type: UserInterface
    interfaces:
      enum.DropshipTerminalUiKey.Key:
        type: DropshipTerminalBui

- type: entity
  parent: CMBaseStructure
  id: RMCComputerDropshipNavigationSmall
  name: ent-RMCComputerDropshipNavigationSmall
  description: ent-RMCComputerDropshipNavigationSmall-desc
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    drawdepth: Objects
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: security_cam
    layers: [ ]
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline
  - type: WallMount
    arc: 360
  - type: DropshipNavigationComputer
  - type: ActivatableUI
    key: enum.DropshipNavigationUiKey.Key
  - type: AccessReader
    access: [ [ "AU14AccessGovforFTL" ], [ "AU14AccessGovforPilot" ] ]
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipNavigationUiKey.Key:
        type: DropshipNavigationBui
      enum.DropshipHijackerUiKey.Key:
        type: DropshipHijackerBui
  - type: PointLight
    enabled: true
    radius: 1.5
    netsync: true
    energy: 1
    offset: "0,0"
    color: "#FFEFD2"
    mask: /Textures/_RMC14/Effects/LightMasks/quad_cone.png

