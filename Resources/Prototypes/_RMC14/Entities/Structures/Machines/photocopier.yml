- type: entity
  parent: BaseMachinePowered
  abstract: true
  id: RMCBasePhotocopier
  name: ent-RMCBasePhotocopier
  description: ent-RMCBasePhotocopier-desc
  components:
  - type: Transform
    anchored: false
    noRot: true
  - type: Physics
    bodyType: Static
  - type: ApcPowerReceiver
    needsPower: false # TODO RMC14
    powerLoad: 0
  - type: LitOnPowered
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.45,0.25,0.45"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCBasePhotocopier
  id: RMCPhotocopier
  name: ent-RMCPhotocopier
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    drawdepth: Objects
    state: bigscanner
  - type: Icon
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    state: bigscanner

- type: entity
  parent: RMCPhotocopier
  id: RMCPhotocopierSmallHitbox
  suffix: ent-RMCPhotocopierSmallHitbox-suffix
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.05,0.4,0.05"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200

- type: entity
  parent: RMCBasePhotocopier
  id: RMCPhotocopierPro
  name: ent-RMCPhotocopierPro
  description: ent-RMCPhotocopierPro-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    drawdepth: Objects
    state: bigscannerpro
  - type: Icon
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    state: bigscannerpro
