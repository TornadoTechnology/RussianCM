- type: entity
  id: VehicleLift
  name: vehicle lift
  suffix: Lowered, Vehicle Supply
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Effects/elevator.rsi
    drawdepth: LowFloors
    layers:
    - state: supply_elevator_lowered
      map: [ "rmc-vehicle-supply-lift-base" ]
  - type: Physics
    bodyType: static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-2.3,-2.3,2.3,2.3"
        layer:
        - MidImpassable
        mask:
        - ItemMask
        density: 1000
        hard: false
  - type: StepTrigger
    requiredTriggeredSpeed: 0
    intersectRatio: 1
    blacklist:
      tags:
      - Catwalk
  - type: VehicleSupplyLift
