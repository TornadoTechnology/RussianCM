- type: entity
  abstract: true
  id: RMCGunRackBase
  name: ent-RMCGunRackBase
  description: ent-RMCGunRackBase-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    noRot: true
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 200
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Tag
    tags:
    - Structure
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/GunRacks/m54c_rack.rsi
    state: empty
  - type: WallMount
    arc: 360
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: Pullable
  - type: Damageable
    damageContainer: StructuralMarine
  - type: Destructible # TODO RMC14 some of these should just be knocked over with a do after by xenos
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: ItemSlots
  - type: CMItemSlots
  - type: Appearance
