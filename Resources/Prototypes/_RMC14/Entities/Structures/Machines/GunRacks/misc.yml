# M34 Incinerator

- type: entity
  parent: RMCGunRackBase
  id: RMCGunRackM34IncineratorEmpty
  name: ent-RMCGunRackM34IncineratorEmpty
  suffix: ent-RMCGunRackM34IncineratorEmpty-suffix
  description: ent-RMCGunRackM34IncineratorEmpty-desc
  components:
  - type: ContainerContainer
    containers:
      item_1: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
      item_2: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/GunRacks/m34_rack.rsi
  - type: ItemSlots
    slots:
      item_1:
        name: M34 Incinerator
        whitelist:
          tags:
          - RMCWeaponIncineratorM34
      item_2:
        name: M34 Incinerator
        whitelist:
          tags:
          - RMCWeaponIncineratorM34
  - type: ItemMapper
    mapLayers:
      fill_1:
        minCount: 1
        whitelist:
          tags:
          - RMCWeaponIncineratorM34
      fill_2:
        minCount: 2
        whitelist:
          tags:
          - RMCWeaponIncineratorM34

- type: entity
  parent: RMCGunRackM34IncineratorEmpty
  id: RMCGunRackM34IncineratorFilled
  suffix: ent-RMCGunRackM34IncineratorFilled-suffix
  components:
  - type: ContainerFill
    containers:
      item_1:
      - RMCWeaponFlamerPVE
      item_2:
      - RMCWeaponFlamerPVE

