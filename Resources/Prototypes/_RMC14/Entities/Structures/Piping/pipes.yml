- type: entity
  id: RMCBasePipe
  abstract: true
  components:
  - type: Item
    size: Small
    shape: null
  - type: VentExit
  - type: RMCContainerEmptyOnDestruction
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        showEnts: False
        occludes: True
        ents: []
      rmc_vent_container: !type:Container
        showEnts: False
        occludes: True
        ents: []

- type: entity
  parent: [RMCBasePipe, GasPipeHalf]
  id: RMCGasPipeHalf
  suffix: ent-RMCGasPipeHalf-suffix
  placement:
    mode: SnapgridCenter
  components:
  - type: VentCrawlable
    travelDirection: South

- type: entity
  parent: [RMCBasePipe, GasPipeStraight]
  id: RMCGasPipeStraight
  suffix: ent-RMCGasPipeStraight-suffix
  placement:
    mode: SnapgridCenter
  components:
  - type: VentCrawlable
    travelDirection: Longitudinal

- type: entity
  parent: [RMCBasePipe, GasPipeBend]
  id: RMCGasPipeBend
  suffix: ent-RMCGasPipeBend-suffix
  placement:
    mode: SnapgridCenter
  components:
  - type: VentCrawlable
    travelDirection: SWBend

- type: entity
  parent: [RMCBasePipe, GasPipeTJunction]
  id: RMCGasPipeTJunction
  suffix: ent-RMCGasPipeTJunction-suffix
  placement:
    mode: SnapgridCenter
  components:
  - type: VentCrawlable
    travelDirection: TSouth

- type: entity
  parent: [RMCBasePipe, GasPipeFourway]
  id: RMCGasPipeFourway
  suffix: ent-RMCGasPipeFourway-suffix
  placement:
    mode: SnapgridCenter
  components:
  - type: VentCrawlable
    travelDirection: Fourway
