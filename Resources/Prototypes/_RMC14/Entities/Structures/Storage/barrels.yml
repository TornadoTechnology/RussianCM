- type: entity
  abstract: true
  id: RMCBarrelPileBase
  name: ent-RMCBarrelPileBase
  description: ent-RMCBarrelPileBase-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,2.4,2.5"
        density: 190
        layer:
        - MobMask
  - type: Sprite
    sprite: _RMC14/Structures/barrel_yard.rsi
    offset: 1, 1
  - type: Clickable
  - type: DeleteOnExplosion
  - type: RMCMesonsNonviewable

- type: entity
  parent: RMCBarrelPileBase
  id: RMCBarrelPileYard
  components:
  - type: Sprite
    state: pile_0

- type: entity
  parent: BaseStructureDynamic
  id: RMCBarrelBase
  name: ent-RMCBarrelBase
  categories: [ HideSpawnMenu ]
  description: ent-RMCBarrelBase-desc
  components:
  - type: VehicleSmashable
  - type: Sprite
    sprite: _RMC14/Structures/barrels.rsi
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.18,-0.48,0.18,0.48"
        density: 200
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: null
  - type: InteractionOutline
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: CrateOpenable
  - type: RMCMesonsNonviewable
  - type: SpawnOnTerminate
    spawn: RMCSpawnerRandomCrateLoot

- type: entity
  parent: RMCBarrelBase
  id: RMCBarrelBlue
  name: ent-RMCBarrelBlue
  description: ent-RMCBarrelBlue-desc
  components:
  - type: Sprite
    state: barrel_blue

- type: entity
  parent: RMCBarrelBase
  id: RMCBarrelGreen
  name: ent-RMCBarrelGreen
  description: ent-RMCBarrelGreen-desc
  components:
  - type: Sprite
    state: barrel_green

- type: entity
  parent: RMCBarrelBase
  id: RMCBarrelRed
  name: ent-RMCBarrelRed
  description: ent-RMCBarrelRed-desc
  components:
  - type: Sprite
    state: barrel_red

- type: entity
  parent: RMCBarrelBase
  id: RMCBarrelWhite
  name: ent-RMCBarrelWhite
  description: ent-RMCBarrelWhite-desc
  components:
  - type: Sprite
    state: barrel_white

- type: entity
  parent: RMCBarrelBase
  id: RMCBarrelYellow
  name: ent-RMCBarrelYellow
  description: ent-RMCBarrelYellow-desc
  components:
  - type: Sprite
    state: barrel_yellow
