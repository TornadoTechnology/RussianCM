# Base
- type: entity
  parent: ClosetBase
  id: CMClosetBaseUnanchored
  name: ent-CMClosetBaseUnanchored
  description: ent-CMClosetBaseUnanchored-desc
  suffix: ent-CMClosetBaseUnanchored-suffix
  components:
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Storage/Closets/standard.rsi
    layers:
    - state: base
      map: ["enum.StorageVisualLayers.Base"]
    - state: closed
      map: ["enum.StorageVisualLayers.Door"]
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: paper
      visible: false
      sprite: Structures/Storage/closet_labels.rsi
      map: [ "enum.PaperLabelVisuals.Layer" ]
  - type: Appearance
  - type: EntityStorageVisuals
    stateBaseClosed: base
    stateDoorOpen: open
    stateDoorClosed: closed
  - type: InsertBlacklist
    blacklist:
      components:
      - Xeno
  - type: Corrodible
    timeToApply: 4
    structure: true
  - type: RMCContainerEmptyOnDestruction
  - type: Anchorable
    flags:
    - None
  - type: Damageable
    damageContainer: StructuralMarine
    damageModifierSet: StructuralMarine
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
  - type: EntityStorageCloseOnMapInit
  - type: XenoToggleChargingDamage
    stageLoss: 2
    damage:
      types:
        Blunt: 40

- type: entity
  parent: CMClosetBaseUnanchored
  id: CMClosetBase
  suffix: ent-CMClosetBase-suffix
  components:
  - type: Transform
    anchored: true
  - type: RMCMesonsNonviewable

- type: entity
  parent: CMClosetBase
  id: RMCCabinetBase
  name: ent-RMCCabinetBase
  description: ent-RMCCabinetBase-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Storage/Lockers/cabinet.rsi
  - type: EntityStorage
    closeSound:
      path: /Audio/Effects/woodenclosetclose.ogg
    openSound:
      path: /Audio/Effects/woodenclosetopen.ogg

- type: entity
  parent: RMCCabinetBase
  id: RMCCabinetBaseUnanchored
  suffix: ent-RMCCabinetBaseUnanchored-suffix
  components:
  - type: Anchorable
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Dynamic

