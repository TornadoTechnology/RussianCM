- type: entity
  parent: [StorageTank, StructureWheeled]
  id: RMCTankReagentEmpty
  name: ent-RMCTankReagentEmpty
  description: ent-RMCTankReagentEmpty-desc
  suffix: ent-RMCTankReagentEmpty-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Storage/reagent_tank.rsi
    layers:
    - state: tank_normal
    - state: tn_color-1
    - state: tn_color-1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: t_inactive
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 155
        mask:
        - MachineMask
        - HighImpassable
        layer:
        - HighImpassable
        - BulletImpassable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: tn_color-
  - type: DetailedExaminableSolution
    solution: tank
  - type: RMCToggleableSolutionTransfer
    solution: tank
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 1000
  - type: Corrodible
    timeToApply: 4
    structure: true
  - type: Tag
    tags:
    - RMCTankReagent
    - Structure
  - type: XenoCrusherChargable
    setDamage:
      types:
        Blunt: 750
        ## workaround since it doesnt accept Structural.
    throwRange: 2
  - type: RMCMesonsNonviewable
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCTankReagentEmpty
  id: RMCTankReagentWater
  suffix: ent-RMCTankReagentWater-suffix
  components:
  - type: SolutionContainerManager
    solutions:
      tank:
        reagents:
        - ReagentId: Water
          Quantity: 1000
  - type: Label
    currentLabel: reagent-name-water

- type: entity
  parent: RMCTankReagentWater
  id: RMCTankReagentWaterLocked
  suffix: ent-RMCTankReagentWaterLocked-suffix
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Anchorable
    flags: None


- type: entity
  parent: RMCTankReagentEmpty
  id: RMCTankReagentFuel
  name: ent-RMCTankReagentFuel
  description: ent-RMCTankReagentFuel-desc
  suffix: ent-RMCTankReagentFuel-suffix
  components:
  - type: Sprite
    layers:
    - state: weldtank
  - type: SolutionContainerManager
    solutions:
      tank:
        reagents:
        - ReagentId: WeldingFuel
          Quantity: 1000
  - type: Explosive
    explosionType: Default
    totalIntensity: 60
  - type: ReagentTank
    tankType: Fuel
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:SolutionExplosionBehavior
        solution: tank
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnToolInteract
    tools: Welding
    weldingDamage:
      types:
        Heat: 100
  - type: Label
    currentLabel: reagent-name-welding-fuel
  - type: Tag
    tags:
    - RMCTankFuel
    - RMCTankReagent

- type: Tag
  id: RMCTankFuel

- type: Tag
  id: RMCTankReagent

