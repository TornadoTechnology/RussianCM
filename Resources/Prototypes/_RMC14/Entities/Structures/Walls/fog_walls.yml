# TODO RMC14 make a central system to manage these instead of ticking them all separately
- type: entity
  id: RMCFogWallPermanent
  name: ent-RMCFogWallPermanent
  description: ent-RMCFogWallPermanent-desc
  suffix: ent-RMCFogWallPermanent-suffix
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    drawdepth: Effects
    sprite: _RMC14/Effects/fog.rsi
    state: smoke
  - type: PlacementReplacement
    key: cm_fog_walls
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 1000
  - type: Occluder
  - type: Fog

- type: entity
  parent: RMCFogWallPermanent
  id: RMCFogWall25
  description: ent-RMCFogWall25-desc
  suffix: ent-RMCFogWall25-suffix
  components:
  - type: TimedDespawn
    lifetime: 1500

- type: entity
  parent: RMCFogWall25
  id: RMCFogWall15
  suffix: ent-RMCFogWall15-suffix
  components:
  - type: TimedDespawn
    lifetime: 900

- type: entity
  parent: MarkerBase
  id: RMCFogWallRemoverOne
  name: ent-RMCFogWallRemoverOne
  description: ent-RMCFogWallRemoverOne-desc
  suffix: ent-RMCFogWallRemoverOne-suffix
  components:
  - type: Sprite
    drawdepth: Overdoors
    sprite: Markers/cross.rsi
    state: red
  - type: RandomAnchoredRemover
    group: RMCFogWallRemoverOne
    whitelist:
      components:
      - Fog

- type: entity
  parent: MarkerBase
  id: RMCFogWallAdderOne
  name: ent-RMCFogWallAdderOne
  description: ent-RMCFogWallAdderOne-desc
  suffix: ent-RMCFogWallAdderOne-suffix
  components:
  - type: Sprite
    drawdepth: Overdoors
    sprite: Markers/cross.rsi
    state: green
  - type: RandomAnchoredSpawner
    group: RMCFogWallRemoverOne
    spawn: RMCFogWall25

- type: entity
  parent: RMCFogWallRemoverOne
  id: RMCFogWallRemoverTwo
  suffix: ent-RMCFogWallRemoverTwo-suffix
  components:
  - type: RandomAnchoredRemover
    group: RMCFogWallRemoverTwo

- type: entity
  parent: RMCFogWallAdderOne
  id: RMCFogWallAdderTwo
  suffix: ent-RMCFogWallAdderTwo-suffix
  components:
  - type: RandomAnchoredSpawner
    group: RMCFogWallRemoverTwo

- type: entity
  parent: RMCFogWallRemoverOne
  id: RMCFogWallRemoverThree
  suffix: ent-RMCFogWallRemoverThree-suffix
  components:
  - type: RandomAnchoredRemover
    group: RMCFogWallRemoverThree

- type: entity
  parent: RMCFogWallAdderOne
  id: RMCFogWallAdderThree
  suffix: ent-RMCFogWallAdderThree-suffix
  components:
  - type: RandomAnchoredSpawner
    group: RMCFogWallRemoverThree

- type: entity
  id: RMCFogShockwave
  name: ent-RMCFogShockwave
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    drawdepth: Effects
    sprite: _RMC14/Effects/fog.rsi
    state: smoke
  - type: TimedDespawn
    lifetime: 0.05
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  id: RMCFogSpawner15
  parent: MarkerBase
  name: ent-RMCFogSpawner15
  suffix: ent-RMCFogSpawner15-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Markers/landmarks.rsi
    state: fog
  - type: RandomSpawner # This is horrible if anyone knows something that just spawns something then tell me.
    prototypes:
    - RMCFogWall15
    chance: 1
