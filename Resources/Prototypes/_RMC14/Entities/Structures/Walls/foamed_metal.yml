- type: entity
  id: RMCBaseFoamedMetal
  name: ent-RMCBaseFoamedMetal
  abstract: true
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    drawdepth: Walls
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb {}
        layer:
        - WallLayer
        mask:
        - WallLayer
  - type: Occluder
  - type: Appearance
  - type: SmoothEdge
  - type: IconSmooth
    key: walls
    mode: NoSprite
  - type: Transform
    anchored: true
  - type: Airtight
  - type: ReplaceFloorOnSpawn
    replaceableTiles:
    - Plating
    - Lattice
    - TrainLattice
    replacementTiles:
    - FloorMetalFoam
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: RMCMetalFoamWall
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 45
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_RMC14/Effects/meteorimpact.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: MeleeSound
    soundGroups:
      Brute:
        path: /Audio/Items/genhit.ogg

- type: entity
  parent: MetalFoam
  id: RMCAluminiumMetalFoamEffect
  name: ent-RMCAluminiumMetalFoamEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: SpawnOnDespawn
    prototype: RMCFoamedAluminiumMetal

- type: entity
  parent: MetalFoam
  id: RMCIronMetalFoamEffect
  name: ent-RMCIronMetalFoamEffect
  categories: [ HideSpawnMenu ]
  components:
  - type: SpawnOnDespawn
    prototype: RMCFoamedIronMetal

- type: entity
  parent: RMCBaseFoamedMetal
  id: RMCFoamedAluminiumMetal
  name: ent-RMCFoamedAluminiumMetal
  description: ent-RMCFoamedAluminiumMetal-desc
  suffix: ent-RMCFoamedAluminiumMetal-suffix
  components:
  - type: Sprite
    drawdepth: Effects
    color: "#ffffffcc"
    sprite: Effects/foam.rsi
    layers:
    - state: metal_foam
      map: ["enum.FoamVisualLayers.Base"]
    - map: [ "enum.EdgeLayer.South" ]
      state: metal_foam-south
    - map: [ "enum.EdgeLayer.East" ]
      state: metal_foam-east
    - map: [ "enum.EdgeLayer.North" ]
      state: metal_foam-north
    - map: [ "enum.EdgeLayer.West" ]
      state: metal_foam-west

- type: entity
  parent: RMCBaseFoamedMetal
  id: RMCFoamedIronMetal
  name: ent-RMCFoamedIronMetal
  description: ent-RMCFoamedIronMetal-desc
  suffix: ent-RMCFoamedIronMetal-suffix
  components:
  - type: Sprite
    drawdepth: Effects
    color: "#ffffffcc"
    sprite: Effects/foam.rsi
    layers:
    - state: iron_foam
      map: ["enum.FoamVisualLayers.Base"]
    - map: [ "enum.EdgeLayer.South" ]
      state: iron_foam-south
    - map: [ "enum.EdgeLayer.East" ]
      state: iron_foam-east
    - map: [ "enum.EdgeLayer.North" ]
      state: iron_foam-north
    - map: [ "enum.EdgeLayer.West" ]
      state: iron_foam-west
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 70
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_RMC14/Effects/meteorimpact.ogg
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
