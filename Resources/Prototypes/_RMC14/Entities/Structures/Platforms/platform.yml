- type: entity
  abstract: true
  id: CMPlatformBase
  name: ent-CMPlatformBase
  description: ent-CMPlatformBase-desc
  components:
  - type: VehicleSmashable
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/platforms.rsi
  - type: InteractionOutline
  - type: Clickable
  - type: Climbable
    delay: 0.25
  - type: Tag
    tags:
    - Platform

- type: entity
  abstract: true
  id: CMPlatformBaseBroken
  name: ent-CMPlatformBaseBroken
  description: ent-CMPlatformBaseBroken-desc
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/platforms.rsi
  - type: InteractionOutline
  - type: Clickable

- type: entity
  abstract: true
  parent: CMPlatformBase
  id: CMPlatformBaseDestructible
  components:
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 110 # Excessive damage
        behaviors:
          - !type:DoActsBehavior
            acts: ["Destruction"]
      - trigger:
          !type:DamageTrigger
          damage: 90
        behaviors:
          - !type:ChangeConstructionNodeBehavior
            node: platformBroken
          - !type:DoActsBehavior
            acts: ["Breakage"]

- type: entity
  parent: CMPlatformBaseBroken
  id: CMPlatformBroken
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Physics
    canCollide: false
  - type: Sprite
    state: platform_broken
  - type: Construction
    graph: CMPlatformBaseDestructible
    node: platformBroken

- type: entity
  parent: CMPlatformBaseDestructible
  id: CMPlatform
  name: ent-CMPlatform
  description: ent-CMPlatform-desc
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.36"
        density: 1500
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Sprite
    state: platform
  - type: Construction
    graph: CMPlatformBaseDestructible
    node: start

