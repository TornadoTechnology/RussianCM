- type: entity
  id: RMCLadder
  name: ladder
  description: A sturdy metal ladder.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _RMC14/Structures/ladder.rsi
    drawdepth: WallTops
    state: ladderdown
  - type: PlacementReplacement
    key: ladders
  - type: Ladder
  - type: BlockXenoConstruction
  - type: RMCMesonsNonviewable
  - type: RMCIgnoreGhostInteractionLimits

- type: entity
  parent: RMCLadder
  id: RMCLadderUp
  suffix: Up
  components:
  - type: Sprite
    state: ladderup

- type: entity
  parent: RMCLadder
  id: RMCLadderThrough
  suffix: Through
  components:
  - type: Sprite
    state: ladder11

- type: entity
  parent: RMCLadder
  id: RMCLadderHatch
  suffix: Hatch
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Xenos/xeno_tunnel.rsi
    state: maintenancehatch_alt
    offset: 0, 0.2

- type: entity
  parent: RMCLadder
  id: RMCLadderRope
  name: rope
  description: A sturdy rope.
  components:
  - type: Sprite
    state: rope

- type: entity
  parent: RMCLadderRope
  id: RMCLadderRopeAltDrawdepth
  suffix: Layers over Platforms
  components:
    - type: Sprite
      drawdepth: SmallObjects

- type: entity
  id: CMUZLevelLadderBase
  abstract: true
  name: z-level ladder
  description: A sturdy metal ladder that passes between Z-levels.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _RMC14/Structures/ladder.rsi
    drawdepth: WallTops
    state: ladder11
  - type: PlacementReplacement
    key: ladders
  - type: BlockXenoConstruction
  - type: RMCMesonsNonviewable
  - type: RMCIgnoreGhostInteractionLimits

- type: entity
  parent: CMUZLevelLadderBase
  id: CMUZLevelLadderThrough
  suffix: Z-Level, Up
  components:
  - type: CMUZLevelLadder
    offset: 1
    landingLocalPosition: 0.05
  - type: CMUZLevelHighGround
    heightCurve:
    - 1.05
    - 1.05
    stick: true
    supportOnlyFromAbove: true

- type: entity
  parent: CMUZLevelLadderBase
  id: CMUZLevelLadderThroughDown
