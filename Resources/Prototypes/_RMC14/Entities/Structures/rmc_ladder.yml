- type: entity
  id: RMCLadder
  name: ent-RMCLadder
  description: ent-RMCLadder-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _RMC14/Structures/ladder.rsi
    drawdepth: WallTops
    state: ladderdown
  - type: PlacementReplacement
    key: ladders
  - type: Ladder
  - type: BlockXenoConstruction
  - type: RMCMesonsNonviewable
  - type: RMCIgnoreGhostInteractionLimits

- type: entity
  parent: RMCLadder
  id: RMCLadderUp
  suffix: ent-RMCLadderUp-suffix
  components:
  - type: Sprite
    state: ladderup

- type: entity
  parent: RMCLadder
  id: RMCLadderThrough
  suffix: ent-RMCLadderThrough-suffix
  components:
  - type: Sprite
    state: ladder11

- type: entity
  parent: RMCLadder
  id: RMCLadderHatch
  suffix: ent-RMCLadderHatch-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Xenos/xeno_tunnel.rsi
    state: maintenancehatch_alt
    offset: 0, 0.2

- type: entity
  parent: RMCLadder
  id: RMCLadderRope
  name: ent-RMCLadderRope
  description: ent-RMCLadderRope-desc
  components:
  - type: Sprite
    state: rope

- type: entity
  parent: RMCLadderRope
  id: RMCLadderRopeAltDrawdepth
  suffix: ent-RMCLadderRopeAltDrawdepth-suffix
  components:
    - type: Sprite
      drawdepth: SmallObjects

- type: entity
  id: CMUZLevelLadderBase
  abstract: true
  name: ent-CMUZLevelLadderBase
  description: ent-CMUZLevelLadderBase-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _RMC14/Structures/ladder.rsi
    drawdepth: WallTops
    state: ladder11
  - type: PlacementReplacement
    key: ladders
  - type: BlockXenoConstruction
  - type: RMCMesonsNonviewable
  - type: RMCIgnoreGhostInteractionLimits

- type: entity
  parent: CMUZLevelLadderBase
  id: CMUZLevelLadderThrough
  suffix: ent-CMUZLevelLadderThrough-suffix
  components:
  - type: CMUZLevelLadder
    offset: 1
    landingLocalPosition: 0.05
  - type: CMUZLevelHighGround
    heightCurve:
    - 1.05
    - 1.05
    stick: true
    supportOnlyFromAbove: true

- type: entity
  parent: CMUZLevelLadderBase
  id: CMUZLevelLadderThroughDown
  suffix: ent-CMUZLevelLadderThroughDown-suffix
  components:
  - type: CMUZLevelLadder
    offset: -1
    landingLocalPosition: 0
