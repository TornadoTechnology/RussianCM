- type: entity
  id: XenoTunnel
  name: ent-XenoTunnel
  description: ent-XenoTunnel-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/Xenos/xeno_tunnel.rsi
    state: hole
    noRot: true
  - type: InteractionOutline
  - type: Clickable
  - type: RMCNightVisionVisible
    priority: -1
    transparency: 0.2
  - type: DestroyedByExplosionType
    explosion: RMCOBXenoTunnel
  - type: RMCMesonsNonviewable
    xenoVisible: true
  - type: XenoTunnel
  - type: XenoStructureMapTracked
  - type: TacticalMapTracked
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: xenotunnel
  - type: TacticalMapAlwaysVisible
    visibleToXenos: true
    visibleAsXenoStructure: true
    visibleToMarines: false
  - type: UserInterface
    interfaces:
      enum.SelectDestinationTunnelUI.Key:
        type: SelectDestinationTunnelBui
      enum.NameTunnelUI.Key:
        type: NameTunnelBui
  - type: DeletedByWeedKiller
  - type: XenoFriendly
  - type: RMCTrackable

- type: entity
  parent: XenoTunnel
  id: XenoTunnelMaint
  name: ent-XenoTunnelMaint
  description: ent-XenoTunnelMaint-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Xenos/xeno_tunnel.rsi
    state: maintenancehatch_alt

- type: entity
  parent: XenoTunnelMaint
  id: XenoTunnelMaintNoXenoDesc
  description: ent-XenoTunnelMaintNoXenoDesc-desc
  suffix: ent-XenoTunnelMaintNoXenoDesc-suffix

- type: entity
  parent: XenoTunnelMaint
  id: XenoTunnelMaintHybrisa
  name: ent-XenoTunnelMaintHybrisa
  components:
  - type: Sprite
    state: wymanhole

- type: entity
  parent: XenoTunnelMaintNoXenoDesc
  id: XenoTunnelMaintHybrisaNoXenoDesc
  name: ent-XenoTunnelMaintHybrisaNoXenoDesc
  components:
  - type: Sprite
    state: wymanhole
