# Has an effective HP ~800 dmg compaired to CM weak reflective resin. 800 melee dmg multi so it breaks in 1 hit
- type: entity
  parent: WallXenoResinThick
  id: WallXenoResinThickSurge
  name: ent-WallXenoResinThickSurge
  description: ent-WallXenoResinThickSurge-desc
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Walls/bone_resin.rsi
  - type: Icon
    sprite: _RMC14/Structures/Walls/bone_resin.rsi
    state: bone_resin
  - type: IconSmooth
    key: walls
    base: bone_resin
  - type: TimedDespawn
    lifetime: 13.0
  - type: XenoStructureUpgradeable
    to: null
  - type: ImmuneToUnarmed
  - type: MeleeReceivedMultiplier
    xenoDamage:
      types:
        Slash: 800
    otherMultiplier: 800
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 800
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
