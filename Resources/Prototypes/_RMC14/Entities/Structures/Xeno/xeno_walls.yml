- type: entity
  parent: CMBaseWallXeno
  id: WallXenoResin
  name: ent-WallXenoResin
  description: ent-WallXenoResin-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Xenos/xeno_resin_wall.rsi
  - type: Icon
    sprite: _RMC14/Structures/Xenos/xeno_resin_wall.rsi
    state: resin
  - type: IconSmooth
    key: walls
    base: resin
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 900
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: VehicleSmashable
    deleteOnHit: true
    damageOnHit: 900
    selfDamageMultiplier: 0.6
    slowdownMultiplier: 0.2
    slowdownDuration: 1.5
    requiredVehicleTag: VehicleHeavy
    smashSound:
      collection: XenoResinBreak
  - type: XenoNestSurface
  - type: XenoConstructionMinRange
  - type: XenoConstructionPlasmaCost
    plasma: 120
    scalingCost: true
  - type: XenoStructureUpgradeable
    to: WallXenoResinThick
    cost: 50
  - type: MeleeReceivedMultiplier
    xenoDamage:
      types:
        Slash: 225

- type: entity
