- type: entity
  parent: CMSeatBase
  id: CMSeatPassenger
  name: ent-CMSeatPassenger
  description: ent-CMSeatPassenger-desc
  placement:
    mode: PlaceFree
  components:
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/vehicle_seats.rsi
    state: base

- type: entity
  parent: CMSeatPassenger
  id: RMCSeatVehiclePassenger
  description: ent-RMCSeatVehiclePassenger-desc
  components:
  - type: RemoveComponents
    components:
    - type: Damageable
    - type: Destructible
    - type: Corrodible

- type: entity
  parent: CMSeatBase
  id: CMSeatPilot
  name: ent-CMSeatPilot
  description: ent-CMSeatPilot-desc
