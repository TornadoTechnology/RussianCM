    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/vehicle_seats.rsi
    state: pilot_chair
  - type: RemoveComponents
    components:
    - type: Damageable

- type: entity
  parent: CMSeatBase
  id: RMCSeatDriver
  name: ent-RMCSeatDriver
  description: ent-RMCSeatDriver-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Furniture/vehicle_seats.rsi
    state: pilot_chair
  - type: VehicleDriverSeat
    skills:
      all:
        RMCSkillVehicles: 1
  - type: RemoveComponents
    components:
    - type: Damageable
    - type: Destructible
    - type: Corrodible

