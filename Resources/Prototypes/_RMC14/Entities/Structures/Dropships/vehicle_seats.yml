  name: ent-RMCSeatArmored

- type: entity
  parent: RMCSeatArmoredBase
  id: RMCSeatArmoredDriver
  name: ent-RMCSeatArmoredDriver
  components:
  - type: VehicleDriverSeat
    skills:
      all: {}

- type: entity
  parent: RMCSeatArmoredBase
  id: RMCSeatArmoredWeaponsOperator
