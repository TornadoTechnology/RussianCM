- type: entity
  parent: RMCBaseWindowFrame
  id: RMCWindowFramePrison
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/Frames/prison_frame.rsi
    state: prison_frame0
  - type: Icon
    sprite: _RMC14/Structures/Windows/Frames/prison_frame.rsi
    state: prison_frame0
  - type: IconSmooth
    key: windows
    additionalKeys:
    - doors
    base: prison_frame
    mode: CardinalFlags
  - type: Construction
    graph: RMCWindowPrison
    node: windowFramePrison

- type: entity
  parent: CMBaseWindow
  id: RMCWindowPrison
  name: ent-RMCWindowPrison
  description: ent-RMCWindowPrison-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/prison_window.rsi
    state: prison_window0
  - type: Icon
    sprite: _RMC14/Structures/Windows/prison_window.rsi
    state: prison_window0
  - type: IconSmooth
    key: windows
    additionalKeys:
    - doors
    base: prison_window
    mode: CardinalFlags
  - type: Repairable
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 600 # excessive damage destroys window and frame
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:DoActsBehavior
            acts: ["Destruction"]
      - trigger:
          !type:DamageTrigger
          damage: 40
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:SpawnEntitiesBehavior
            spawn:
              CMShardGlass:
                min: 1
                max: 1
          - !type:ChangeConstructionNodeBehavior
            node: windowFramePrison
  - type: RMCWallExplosionDeletable
  - type: DestroyedByExplosionType
  - type: Construction
    graph: RMCWindowPrison
    node: windowPrison
  - type: DestroyOnXenoPierceScissor
    spawnPrototype: RMCWindowFramePrison
    sound:
      collection: WindowShatter


- type: entity
  parent: RMCWindowPrison
  id: RMCWindowPrisonCell
  name: ent-RMCWindowPrisonCell
  description: ent-RMCWindowPrisonCell-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/prison_cellwindow.rsi
    state: prison_cellwindow0
  - type: Icon
    sprite: _RMC14/Structures/Windows/prison_cellwindow.rsi
    state: prison_cellwindow0
  - type: IconSmooth
    key: windows
    additionalKeys:
    - doors
    base: prison_cellwindow
    mode: CardinalFlags

- type: entity
  parent: CMBaseWindow
  id: RMCWindowPrisonReinforced
  name: ent-RMCWindowPrisonReinforced
  description: ent-RMCWindowPrisonReinforced-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/prison_rwindow.rsi
    state: prison_rwindow0
  - type: Icon
    sprite: _RMC14/Structures/Windows/prison_rwindow.rsi
    state: prison_rwindow0
  - type: IconSmooth
    key: windows
    additionalKeys:
    - doors
    base: prison_rwindow
    mode: CardinalFlags
  - type: Repairable
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 600 # excessive damage destroys window and frame
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:DoActsBehavior
            acts: ["Destruction"]
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:SpawnEntitiesBehavior
            spawn:
              CMShardGlass:
                min: 1
