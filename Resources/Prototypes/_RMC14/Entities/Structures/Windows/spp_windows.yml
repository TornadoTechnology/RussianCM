- type: entity
  parent: CMBaseWindow
  id: RMCWindowSPPReinforced
  name: ent-RMCWindowSPPReinforced
  description: ent-RMCWindowSPPReinforced-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Windows/spp_window.rsi
    state: uppwall_window0
  - type: Icon
    sprite: _RMC14/Structures/Windows/spp_window.rsi
    state: uppwall_window0
  - type: IconSmooth
    key: walls
    base: uppwall_window
    mode: CardinalFlags
  - type: Repairable
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 600 # excessive damage destroys window and frame
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:DoActsBehavior
            acts: ["Destruction"]
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
          - !type:PlaySoundBehavior
            sound:
              collection: WindowShatter
          - !type:SpawnEntitiesBehavior
            spawn:
              CMShardGlass:
                min: 1
                max: 1
              CMRodMetal:
                min: 1
                max: 1
          - !type:ChangeConstructionNodeBehavior
            node: windowFrameSPPReinforced
  - type: RMCWallExplosionDeletable
  - type: DestroyedByExplosionType
  - type: Construction
    graph: RMCWindowSPPReinforced
    node: windowSPPReinforced
  - type: DestroyOnXenoPierceScissor
    spawnPrototype: RMCWindowFrameSPPReinforced
    sound:
      collection: WindowShatter

