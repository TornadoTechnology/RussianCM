# Base

- type: entity
  parent: ExtinguisherCabinet
  id: RMCExtinguisherCabinet
  name: ent-RMCExtinguisherCabinet
  description: ent-RMCExtinguisherCabinet-desc
  suffix: ent-RMCExtinguisherCabinet-suffix
  components:
    - type: Sprite
      sprite: _RMC14/Structures/Wallmounts/extinguisher_cabinet.rsi
      layers:
      - state: frame
      - state: extinguisher
        map: ["enum.ItemCabinetVisuals.Layer"]
        visible: true
      - state: closed
        map: ["enum.OpenableVisuals.Layer"]

- type: entity
  parent: RMCExtinguisherCabinet
  id: RMCExtinguisherCabinetOpen
  suffix: ent-RMCExtinguisherCabinetOpen-suffix
  components:
  - type: Openable
    opened: true

- type: entity
  parent: RMCExtinguisherCabinet
  id: RMCExtinguisherCabinetFilled
  suffix: ent-RMCExtinguisherCabinetFilled-suffix

- type: entity
  parent: [RMCExtinguisherCabinetFilled, RMCExtinguisherCabinetOpen]
  id: RMCExtinguisherCabinetFilledOpen
  suffix: ent-RMCExtinguisherCabinetFilledOpen-suffix

