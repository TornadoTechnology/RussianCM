- type: entity
  id: XenoAcidNormal
  name: ent-XenoAcidNormal
  description: ent-XenoAcidNormal-desc
  components:
  - type: Transform
  - type: Sprite
    sprite: _RMC14/Effects/xeno_acid.rsi
    drawdepth: WallMountedItems
    layers:
    - state: acid_normal
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Fixtures
    fixtures:
      acidSensor:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        hard: false
        layer:
        - Opaque

- type: entity
  parent: XenoAcidNormal
  id: XenoAcidWeak
  name: ent-XenoAcidWeak
  components:
  - type: Sprite
    layers:
    - state: acid_weak

- type: entity
  parent: XenoAcidNormal
  id: XenoAcidStrong
  name: ent-XenoAcidStrong
  components:
  - type: Sprite
    layers:
    - state: acid_strong

- type: entity
  id: XenoAcidSprayWeak
  name: ent-XenoAcidSprayWeak
  description: ent-XenoAcidSprayWeak-desc
  components:
  - type: Transform
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.35,0.35,0.35"
        mask:
        - FullTileLayer
        layer:
        - FullTileLayer
  - type: Sprite
    sprite: _RMC14/Effects/xeno_acid.rsi
    drawdepth: Effects
    layers:
    - state: acid2-weak
  - type: TimedDespawn
    lifetime: 0.6
  - type: DamageOnCollide
    acidic: true
    acidComboDuration: 40
    acidComboResists: 2
    acidComboDamage:
      types:
        Heat: 3
    acidComboParalyze: 2
    damage:
      types:
        Heat: 30
    chainDamage:
      types:
        Heat: 10
    whitelist:
      components:
      - Marine
      - Xeno
  - type: UncloakOnHit
  - type: ExtinguishFire
  - type: IgnorePredictionHit
  - type: SprayExtinguishTileFire

- type: entity
  parent: XenoAcidSprayWeak
  id: XenoAcidSprayStrong
  name: ent-XenoAcidSprayStrong
  description: ent-XenoAcidSprayStrong-desc
  components:
  - type: Sprite
    layers:
    - state: acid2
  - type: DamageOnCollide
    paralyze: 2
    damage:
      types:
        Heat: 36
  - type: TimedDespawn
    lifetime: 1.0
  - type: SprayExtinguishTileFire
    extinguishAmount: 13

- type: entity
