- type: entity
  abstract: true
  id: VehicleVanRoofBase
  name: ent-VehicleVanRoofBase
  description: ent-VehicleVanRoofBase-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/van.rsi
    drawdepth: Overdoors
    layers:
    - state: roof_1
      map: [ "roof" ]
  - type: InteractionTransparency
