    arc: 360
  - type: Clickable
  - type: InteractionOutline
  - type: RMCIgnoreGhostInteractionLimits
  - type: VehicleViewport
  - type: RemoveComponents
    components:
    - type: InteractionTransparency

- type: entity
  parent: VehicleHumveeViewportBase
  id: VehicleHumveeViewportLarge
  components:
  - type: Sprite
