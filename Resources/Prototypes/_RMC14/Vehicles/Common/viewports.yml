- type: entity
  parent: VehicleVanInteriorBase
  id: VehicleViewport
  name: ent-VehicleViewport
  description: ent-VehicleViewport-desc
  placement:
    mode: PlaceFree
  components:
  - type: WallMount
    arc: 360
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/general.rsi
    state: viewport
    drawdepth: Overdoors
  - type: Clickable
  - type: InteractionOutline
  - type: RMCIgnoreGhostInteractionLimits
  - type: VehicleViewport
  - type: RemoveComponents
    components:
    - type: InteractionTransparency

- type: entity
  parent: VehicleViewport
  id: VehicleViewportUnanchored
  name: ent-VehicleViewportUnanchored
  description: ent-VehicleViewportUnanchored-desc
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false

- type: entity
  parent: VehicleViewport
  id: VehicleViewportSimple
  name: ent-VehicleViewportSimple
  description: ent-VehicleViewportSimple-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/general.rsi
    state: viewport_simple

- type: entity
