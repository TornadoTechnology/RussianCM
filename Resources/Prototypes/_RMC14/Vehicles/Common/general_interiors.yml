- type: entity
  abstract: true
  parent: RMCExtinguisherCabinet
  id: VehicleInteriorExtinguisherCabinetBase
  name: ent-VehicleInteriorExtinguisherCabinetBase
  description: ent-VehicleInteriorExtinguisherCabinetBase-desc
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/general.rsi
    drawdepth: Overdoors
    layers:
    - state: extinguisher
    - state: extinguisher_full
      map: ["enum.ItemCabinetVisuals.Layer"]
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.ItemCabinetVisuals.ContainsItem:
        enum.ItemCabinetVisuals.Layer:
          True: { state: extinguisher_full }
          False: { state: extinguisher_empty }
      enum.OpenableVisuals.Opened:
        enum.ItemCabinetVisuals.Layer:
          True: { visible: true }
          False: { visible: false }

- type: entity
  parent: VehicleInteriorExtinguisherCabinetBase
  id: VehicleInteriorExtinguisher
  name: ent-VehicleInteriorExtinguisher
  components:
  - type: ContainerFill
    containers:
      ItemCabinet:
      - CMFireExtinguisher

