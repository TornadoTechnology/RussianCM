- type: entity
  parent: VehicleInteriorGeneralBase
  id: VehicleInvisibleWall
  name: ent-VehicleInvisibleWall
  description: ent-VehicleInvisibleWall-desc
  placement:
    mode: PlaceFree
  components:
  - type: Marker
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Occluder
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 20000
        hard: true
        mask:
        - FullTileMask
        layer:
        - HighImpassable
        - MidImpassable
        - LowImpassable
        - Opaque
  - type: Sprite
    sprite: _RMC14/Markers/landmarks.rsi
    state: invisible_wall
    drawdepth: Overdoors

