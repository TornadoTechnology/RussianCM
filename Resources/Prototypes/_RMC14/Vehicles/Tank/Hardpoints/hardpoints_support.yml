- type: entity
  parent: VehicleTankHardpointBase
  id: VehicleTankRocketLauncher
  name: ent-VehicleTankRocketLauncher
  description: ent-VehicleTankRocketLauncher-desc
  components:
  - type: Sprite
    state: slauncher_0
  - type: HardpointItem
    hardpointType: Support
    vehicleFamily: Tank
    slotType: SupportAttachment
    damageMultiplier: 0.075
    repairRate: 0.0125
  - type: HardpointIntegrity
    maxIntegrity: 100
  - type: VehicleTurret
    useDirectionalOffsets: true
    pixelOffsetNorth: "0,-10"
    pixelOffsetEast: "-10,0"
    pixelOffsetSouth: "0,10"
    pixelOffsetWest: "10,0"
  - type: GunUseGunOrigin
  - type: GunIgnoreContainerOwnerCollision
  - type: GunIgnorePrediction
  - type: Gun
    fireRate: 0.6
    projectileSpeed: 18
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
    cameraRecoilScalar: 0
  - type: ShootAtFixedPoint
  - type: OnShootTriggerAmmoTimer
    delay: 0.2
  - type: BallisticAmmoProvider
    cycleable: false
    proto: RMC40MMGrenadeM74AGMSVehicle
    capacity: 6
  - type: VehicleHardpointAmmo
    magazineSize: 6
    maxStoredMagazines: 2
  - type: GunFireArc
    arc: 360
  - type: RefillableByBulletBox
    bulletType: VehicleAmmoBoxGrenadeLauncher
  - type: GunMuzzleOffset
    offset: "0,0"
    useDirectionalOffsets: true
    offsetEast: "0,0.2"
    muzzleOffset: "0,-1"
    useAimDirection: true
    useContainerOwner: false
  - type: HardpointVisual
    vehicleState: slauncher_0

