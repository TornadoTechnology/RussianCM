- type: entity
  id: CMGuidebookActionXenoBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Actions/xeno_actions.rsi

- type: entity
  id: ActionXenoPlantWeeds
  parent: ActionXenoBase
  name: ent-ActionXenoPlantWeeds # TODO RMC14 proper plasma costs
  description: ent-ActionXenoPlantWeeds-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: plant_weeds
    useDelay: 1
  - type: InstantAction
    event: !type:XenoPlantWeedsActionEvent

- type: entity
  id: ActionXenoChooseStructure
  parent: ActionXenoBase
  name: ent-ActionXenoChooseStructure
  description: "ent-ActionXenoChooseStructure-desc"
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: place_resin
  - type: InstantAction
    event: !type:XenoChooseStructureActionEvent
  - type: XenoChooseConstructionAction
  - type: RMCDazeableAction

- type: entity
  parent: CMGuidebookActionXenoBase
  id: RMCGuidebookActionXenoChooseResinStructure
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: place_resin

- type: entity
  id: ActionXenoSecreteStructure
  parent: ActionXenoBase
  name: ent-ActionXenoSecreteStructure
  description: "ent-ActionXenoSecreteStructure-desc"
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: secrete_resin
  - type: TargetAction
    deselectOnMiss: false
    range: 0
    repeat: true
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:XenoSecreteStructureActionEvent
  - type: XenoConstructionAction
    checkStructureSelected: true
    checkWeeds: true
    canUpgrade: true
  - type: RMCDazeableAction

- type: entity
  parent: CMGuidebookActionXenoBase
  id: RMCGuidebookActionXenoSecreteResin
  categories: [ HideSpawnMenu ]
  components:
    - type: Sprite
      state: secrete_resin

- type: entity
