- type: entity
  abstract: true
  parent: ActionMarineBase
  id: ActionMarineToggleable
  components:
  - type: Action
    backgroundOn:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: template_on_big
    itemIconStyle: NoItem

- type: entity
  id: RMCGuidebookActionSmartGunBase
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Actions/marine_smart_gun_actions.rsi

- type: entity
  parent: ActionMarineBase
  id: RMCActionToggleAmmo
  name: ent-RMCActionToggleAmmo
  description: ent-RMCActionToggleAmmo-desc
  components:
  - type: Action
    icon:
      sprite: _RMC14/Actions/marine_smart_gun_actions.rsi
      state: ammo_swap_normal
    useDelay: 0.25
    itemIconStyle: NoItem
  - type: InstantAction
    event: !type:GunToggleAmmoActionEvent

- type: entity
  parent: ActionMarineToggleable
  id: RMCActionToggleRecoil
  name: ent-RMCActionToggleRecoil
  description: ent-RMCActionToggleRecoil-desc
  components:
  - type: Action
    icon:
      sprite: _RMC14/Actions/marine_smart_gun_actions.rsi
      state: recoil_compensation
    useDelay: 0.25
    itemIconStyle: NoItem
  - type: InstantAction
    event: !type:GunToggleRecoilActionEvent

- type: entity
  parent: ActionMarineToggleable
  id: RMCActionToggleAutoFire
  name: ent-RMCActionToggleAutoFire
  description: ent-RMCActionToggleAutoFire-desc
  components:
  - type: Action
    icon:
      sprite: _RMC14/Actions/marine_smart_gun_actions.rsi
      state: autofire
    useDelay: 0.25
    itemIconStyle: NoItem
  - type: InstantAction
