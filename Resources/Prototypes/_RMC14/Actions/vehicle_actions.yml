- type: entity
  id: ActionVehicleToggleView
  name: ent-ActionVehicleToggleView
  description: ent-ActionVehicleToggleView-desc
  components:
  - type: InstantAction
    event: !type:VehicleToggleViewActionEvent
  - type: Action
    icon: Interface/Actions/eyeopen.png
    iconOn: Interface/Actions/eyeclose.png
    itemIconStyle: BigAction

- type: entity
  id: ActionVehicleDeploy
  name: ent-ActionVehicleDeploy
  description: ent-ActionVehicleDeploy-desc
  components:
  - type: InstantAction
    event: !type:VehicleDeployActionEvent
  - type: Action
    itemIconStyle: BigItem

- type: entity
  id: ActionVehicleLock
  name: ent-ActionVehicleLock
  description: ent-ActionVehicleLock-desc
  components:
  - type: InstantAction
    event: !type:VehicleLockActionEvent
  - type: Action
    icon:
      sprite: _RMC14/Actions/id_lock_actions.rsi
      state: id_lock_unlocked
    iconOn:
      sprite: _RMC14/Actions/id_lock_actions.rsi
      state: id_lock_locked
    itemIconStyle: BigItem

- type: entity
  id: ActionVehicleSelectHardpoint
  name: ent-ActionVehicleSelectHardpoint
  description: ent-ActionVehicleSelectHardpoint-desc
  components:
  - type: InstantAction
    event: !type:VehicleHardpointSelectActionEvent
  - type: Action
    autoPopulate: false
    temporary: false
    raiseOnUser: true
    itemIconStyle: BigItem
