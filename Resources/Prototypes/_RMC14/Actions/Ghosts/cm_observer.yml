- type: entity
  id: ActionToggleMarineHud
  name: ent-ActionToggleMarineHud
  description: ent-ActionToggleMarineHud-desc
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _RMC14/Interface/cm_job_icons.rsi
      state: hudsquad_co
    iconOn:
      sprite: _RMC14/Interface/cm_job_icons.rsi
      state: hudsquad_co
  - type: InstantAction
    event: !type:ToggleMarineHudActionEvent

- type: entity
  id: ActionToggleXenoHud
