  desc: reagent-rmcethanol-desc
  slipData:
    requiredSlipSpeed: 3.5
  physicalDesc: reagent-rmcethanol-physicaldesc
  flavor: alcohol
  color: "#404030"
  metabolisms:
    Alcohol:
      metabolismRate: 0.1
      effects:
      - !type:Drunk
        boozePower: 6.38
      - !type:Drunk
        conditions:
        - !type:ReagentThreshold
          min: 60
        boozePower: 9.69
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 60
        damage:
          groups:
            Toxin: 0.625
            Airloss: 1.25
      - !type:ChemVomit
        conditions:
        - !type:ReagentThreshold
          min: 60
        probability: 0.12
      - !type:Drunk
        conditions:
        - !type:ReagentThreshold
          min: 100
        boozePower: 13.125
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 100
        damage:
          groups:
            Toxin: 1.2
            Airloss: 2.5
      - !type:ChemVomit
        conditions:
        - !type:ReagentThreshold
          min: 100
        probability: 0.25 #TODO Liver damage

