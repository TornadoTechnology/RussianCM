- type: entity
  parent: BaseAction
  id: ActionStartFishing
  name: ent-ActionStartFishing
  description: ent-ActionStartFishing-desc
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: _SS14/_Goobstation/Objects/Specific/Fishing/fishing_lure.rsi
      state: icon
    sound:
      path: /Audio/_SS14/_Goobstation/Items/Fishing/fishing_rod_cast.ogg
    useDelay: 2.5
  - type: TargetAction
    range: 15
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:ThrowFishingLureActionEvent

- type: entity
  parent: BaseAction
  id: ActionStopFishing
  name: ent-ActionStopFishing
  description: ent-ActionStopFishing-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _SS14/_Goobstation/Objects/Specific/Fishing/goon_rod.rsi
      state: icon
    sound:
      path: /Audio/_SS14/_Goobstation/Items/Fishing/fishing_rod_reel.ogg
  - type: InstantAction
    event: !type:PullFishingLureActionEvent

