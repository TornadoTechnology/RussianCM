# Bluespace closet
- type: entity
  id: ClosetBluespace
  name: ent-ClosetBluespace
  suffix: ent-ClosetBluespace-suffix
  parent: ClosetMaintenance
  description: ent-ClosetBluespace-desc
  components:
    - type: ArrivalsBlacklist
    - type: BluespaceLocker
      pickLinksFromSameMap: true
      minBluespaceLinks: 1
      behaviorProperties:
        bluespaceEffectOnTeleportSource: true
      autoLinksBidirectional: true
      autoLinksUseProperties: true
      autoLinkProperties:
        bluespaceEffectOnTeleportSource: true

# Unstable bluespace closet
- type: entity
  id: ClosetBluespaceUnstable
  name: ent-ClosetBluespaceUnstable
  suffix: ent-ClosetBluespaceUnstable-suffix
  parent: ClosetMaintenance
  description: ent-ClosetBluespaceUnstable-desc
  components:
    - type: ArrivalsBlacklist
    - type: BluespaceLocker
      pickLinksFromSameMap: true
      minBluespaceLinks: 1
      behaviorProperties:
        clearLinksDebluespaces: true
        transportEntities: false
        bluespaceEffectOnTeleportSource: true
        clearLinksEvery: 2
      autoLinksBidirectional: true
      autoLinksUseProperties: true
      usesSinceLinkClear: -1 # hacky
      autoLinkProperties:
        invalidateOneWayLinks: true
        transportEntities: false
        bluespaceEffectOnTeleportSource: true
        destroyAfterUses: 2
        destroyType: DeleteComponent
