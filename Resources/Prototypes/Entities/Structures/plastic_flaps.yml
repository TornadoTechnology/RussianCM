          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 100
        mask:
        - Impassable
        layer:
        - Opaque
        - MidImpassable
  - type: Occluder
  - type: Construction
    graph: PlasticFlapsGraph
    node: opaqueFlaps

- type: entity
  id: PlasticFlapsAirtightClear
  parent: PlasticFlapsBase
  name: ent-PlasticFlapsAirtightClear
  suffix: ent-PlasticFlapsAirtightClear-suffix
  description: ent-PlasticFlapsAirtightClear-desc
  components:
  - type: Destructible
