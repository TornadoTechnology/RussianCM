#Blast door

- type: entity
  parent: BlastDoor
  id: BlastDoorCentralCommand
  suffix: ent-BlastDoorCentralCommand-suffix
  components:
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsCentralCommand ]

#Window shutters

- type: entity
  parent: ShuttersWindow
  id: ShuttersWindowCentralCommand
  suffix: ent-ShuttersWindowCentralCommand-suffix
  components:
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsCentralCommand ]
  - type: AccessReader
    containerAccessProvider: board
