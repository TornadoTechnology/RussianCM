- type: entity
  parent: FireAxeCabinet
  id: ShotGunCabinet
  name: ent-ShotGunCabinet
  description: ent-ShotGunCabinet-desc
  components:
  - type: Sprite
    sprite: Structures/Wallmounts/shotgun_cabinet.rsi
    layers:
    - state: cabinet
    - state: shotgun
      map: ["enum.ItemCabinetVisuals.Layer"]
      visible: true
    - state: glass
      map: ["enum.OpenableVisuals.Layer"]
  - type: ItemSlots
    slots:
      ItemCabinet:
        ejectOnInteract: true
        whitelist:
          tags:
          - WeaponShotgunKammerer
  - type: AccessReader
    access: [["Security"], ["Command"]]

- type: entity
  parent: ShotGunCabinet
  id: ShotGunCabinetOpen
  suffix: ent-ShotGunCabinetOpen-suffix
  components:
  - type: Openable
    opened: true
  - type: Lock
    locked: false

- type: entity
  parent: ShotGunCabinet
  id: ShotGunCabinetFilled
  suffix: ent-ShotGunCabinetFilled-suffix
  components:
  - type: ContainerFill
    containers:
      ItemCabinet:
      - WeaponShotgunKammerer

- type: entity
  parent: [ShotGunCabinetFilled, ShotGunCabinetOpen]
  id: ShotGunCabinetFilledOpen
  suffix: ent-ShotGunCabinetFilledOpen-suffix
