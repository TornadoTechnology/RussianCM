- type: entity
  parent: MarkerBase
  id: PlaqueAtmos
  name: ent-PlaqueAtmos
  suffix: ent-PlaqueAtmos-suffix
  components:
  - type: Sprite
    layers:
    - state: green
    - sprite: Structures/Wallmounts/signs.rsi
      state: atmosplaque
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: PlaqueAtmosZUM
        weight: 1
      - id: PlaqueAtmosFEA
        weight: 9
      - id: PlaqueAtmosZAS
        weight: 45
      - id: PlaqueAtmosLINDA
        weight: 45
    offset: 0.0

# individual plaques aren't placeable. you will not defy the randomness.

- type: entity
  parent: BaseSign
  id: PlaqueAtmosFEA
  name: ent-PlaqueAtmosFEA
  description: ent-PlaqueAtmosFEA-desc
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: atmosplaque

- type: entity
  parent: PlaqueAtmosFEA
  id: PlaqueAtmosLINDA
  name: ent-PlaqueAtmosLINDA
  description: ent-PlaqueAtmosLINDA-desc
  categories: [ HideSpawnMenu ]

- type: entity
  parent: PlaqueAtmosFEA
  id: PlaqueAtmosZAS
  name: ent-PlaqueAtmosZAS
  description: ent-PlaqueAtmosZAS-desc
  categories: [ HideSpawnMenu ]

# If you get the ZUM plaque it means your round will be blessed with good engineering luck.
- type: entity
  parent: PlaqueAtmosFEA
  id: PlaqueAtmosZUM
  name: ent-PlaqueAtmosZUM
  description: ent-PlaqueAtmosZUM-desc
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: zumosplaque
