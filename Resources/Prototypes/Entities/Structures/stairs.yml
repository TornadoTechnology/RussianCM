- type: entity
  id: Stairs
  name: ent-Stairs
  suffix: ent-Stairs-suffix
  description: ent-Stairs-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: Sprite
    sprite: Structures/stairs.rsi
    state: stairs_steel
    drawdepth: FloorTiles
  - type: Transform
    anchored: true
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 4
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  id: StairStage
  parent: Stairs
  suffix: ent-StairStage-suffix
  components:
  - type: Sprite
    sprite: Structures/stairs.rsi
    state: stairs_stage_steel
    drawdepth: FloorTiles

