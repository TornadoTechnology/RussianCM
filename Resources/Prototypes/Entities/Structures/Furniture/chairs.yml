- type: entity
  parent: [SeatBase, BaseDeployFoldable]
  id: ChairFolding
  name: ent-ChairFolding
  description: ent-ChairFolding-desc
  components:
  - type: Rotatable
  - type: Sprite
    sprite: Structures/Furniture/folding_chair.rsi
    layers:
    - state: folding
      map: ["unfoldedLayer"]
    - state: folding_folded
      map: ["foldedLayer"]
      visible: false
  - type: Item
    size: Huge
  - type: Appearance
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 8
    soundHit:
      collection: MetalThud
  - type: Construction
    graph: Seat
    node: chairFolding
  - type: DamageExaminable

- type: entity
  parent: ChairFolding
  id: ChairFoldingSpawnFolded
  suffix: ent-ChairFoldingSpawnFolded-suffix
  components:
  - type: Foldable
    folded: true
  - type: Strap
    enabled: False

