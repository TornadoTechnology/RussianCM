- type: entity
  name: ent-AtmosFixBlockerMarker
  id: AtmosFixBlockerMarker
  description: "ent-AtmosFixBlockerMarker-desc"
  parent: MarkerBase
  components:
    - type: Sprite
      layers:
        - sprite: Markers/atmos.rsi # {
          state: base
          shader: unshaded
        - sprite: Markers/atmos.rsi
          shader: unshaded # }
          state: vacuum
    - type: AtmosFixMarker
      mode: 1

