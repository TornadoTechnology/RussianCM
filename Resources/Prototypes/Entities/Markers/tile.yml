- type: entity
  id: RoofMarker
  name: ent-RoofMarker
  suffix: ent-RoofMarker-suffix
  parent: MarkerBase
  components:
  - type: SetRoof
    value: true
  - type: Sprite
    layers:
    - state: green
      shader: unshaded

- type: entity
  id: NoRoofMarker
  name: ent-NoRoofMarker
  suffix: ent-NoRoofMarker-suffix
  parent: MarkerBase
  components:
  - type: SetRoof
    value: false
  - type: Sprite
    layers:
    - state: red
      shader: unshaded
