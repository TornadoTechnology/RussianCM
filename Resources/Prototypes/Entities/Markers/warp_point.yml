- type: entity
  id: WarpPoint
  parent: MarkerBase
  name: ent-WarpPoint
  components:
  - type: WarpPoint
  - type: Sprite
    state: pink

- type: entity
  id: WarpPointBeacon
  parent: WarpPoint
  name: ent-WarpPointBeacon
  components:
  - type: NavMapBeacon
  - type: WarpPoint
    location: beacon

# Use for areas like CC
- type: entity
  id: GhostWarpPoint
  parent: MarkerBase
  name: ent-GhostWarpPoint
  components:
  - type: Tag
    tags:
    - GhostOnlyWarp
  - type: WarpPoint
    blacklist:
      tags:
      - GhostOnlyWarp
  - type: Sprite
    state: pink

- type: entity
  parent: WarpPoint
  id: WarpPointBombing
  name: ent-WarpPointBombing
  suffix: ent-WarpPointBombing-suffix
  components:
  - type: BombingTarget
  - type: Tag
    tags:
    - GhostOnlyWarp
  - type: WarpPoint
    location: bombing target
    blacklist:
      tags:
      - GhostOnlyWarp
  - type: Sprite
    layers:
    - state: pink
    - sprite: Objects/Weapons/Bombs/spidercharge.rsi
      state: icon
