# Base

- type: entity
  parent: FoodInjectableBase
  id: FoodDonutBase
  abstract: true
  description: ent-FoodDonutBase-desc
  components:
  - type: Food
  - type: Tag
    tags:
    - Donut
  - type: Sprite
    sprite: Objects/Consumable/Food/Baked/donut.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
        reagents:
        - ReagentId: Nutriment
          Quantity: 3
  - type: Item
    sprite: Objects/Consumable/Food/Baked/donut.rsi
    size: Tiny

- type: entity
  abstract: true
  parent: FoodDonutBase
  id: FoodDonutFruitBase
  components:
  - type: Tag
    tags:
    - Donut
    - Fruit
# Tastes like donut.

# The sprinkles are now an overlay, so you can put them on any donut! If we really
# wanted to go for EXTREME roleplay we could apply a different color to the sprinkles
# Since it's technically an alpha layer.

# You'll be able to bake the plain donuts, then mix up different glazes for them to
# apply with a brush or something.

# Plain Donuts

- type: entity
  name: ent-FoodDonutPlain
  parent: FoodDonutBase
  id: FoodDonutPlain
  components:
  - type: FlavorProfile
    flavors:
      - sweet
  - type: Sprite
    state: plain

- type: entity
  name: ent-FoodDonutJellyPlain
  parent: FoodDonutBase
  id: FoodDonutJellyPlain
  components:
  - type: FlavorProfile
    flavors:
      - jelly
  - type: Sprite
    state: jelly-plain
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
        reagents:
        - ReagentId: Nutriment
          Quantity: 3
        - ReagentId: Vitamin
          Quantity: 1

