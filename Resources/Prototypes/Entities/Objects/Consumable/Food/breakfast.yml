# When adding new food also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\food_breakfast.yml

# Base

- type: entity
  parent: FoodInjectableBase
  id: FoodBreakfastBase
  abstract: true
  description: ent-FoodBreakfastBase-desc
  components:
  - type: Item
    storedRotation: -90
  - type: Food
  - type: Sprite
    sprite: Objects/Consumable/Food/breakfast.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 60
        reagents:
        - ReagentId: Nutriment
          Quantity: 40
        - ReagentId: Vitamin
          Quantity: 10

# Breakfasts

- type: entity
  name: ent-FoodBreakfastAmerican
  parent: FoodBreakfastBase
  id: FoodBreakfastAmerican
  description: ent-FoodBreakfastAmerican-desc
  components:
  - type: FlavorProfile
    flavors:
      - food
  - type: Sprite
    state: fullamerican

- type: entity
  name: ent-FoodBreakfastEnglish
  parent: FoodBreakfastBase
  id: FoodBreakfastEnglish
  description: ent-FoodBreakfastEnglish-desc
  components:
  - type: FlavorProfile
    flavors:
      - food
  - type: Sprite
    state: fullenglish
