# When adding new food also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\food_meal.yml
# Base

- type: entity
  parent: FoodInjectableBase
  id: FoodNoodlesBase
  abstract: true
  description: ent-FoodNoodlesBase-desc
  components:
  - type: Item
    storedRotation: -90
  - type: Sprite
    sprite: Objects/Consumable/Food/noodles.rsi
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 25
        reagents:
        - ReagentId: Nutriment
          Quantity: 20

# Noodles

- type: entity
  name: ent-FoodNoodlesBoiled
  parent: FoodNoodlesBase
  id: FoodNoodlesBoiled
  description: ent-FoodNoodlesBoiled-desc
  components:
  - type: FlavorProfile
    flavors:
      - pasta
  - type: Sprite
    state: boiled
# Tastes like pasta.

- type: entity
  name: ent-FoodNoodles
  parent: FoodNoodlesBase
  id: FoodNoodles
  description: ent-FoodNoodles-desc
  components:
  - type: FlavorProfile
    flavors:
      - pasta
      - tomato
  - type: Sprite
    state: tomato
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40
        reagents:
        - ReagentId: Nutriment
          Quantity: 35
  - type: Tag
    tags:
    - Fruit
# Tastes like pasta, tomato.

- type: entity
  name: ent-FoodNoodlesCopy
  parent: FoodNoodlesBase
  id: FoodNoodlesCopy
  description: ent-FoodNoodlesCopy-desc
  components:
  - type: Food
    trash:
    - FoodPlateSmall
    - FoodPlateSmall
  - type: FlavorProfile
    flavors:
      - copypasta
  - type: Sprite
    state: copypasta
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 80
        reagents:
