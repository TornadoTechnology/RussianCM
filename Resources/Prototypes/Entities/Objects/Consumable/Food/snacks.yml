  - type: Item
    sprite: Objects/Consumable/Food/snacks.rsi
    size: Tiny
  - type: Tag
    tags:
    - Trash
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
  - type: SpaceGarbage
  - type: StaticPrice
    price: 0
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: ToxinTrash
          Quantity: 5
  - type: Food
    requiresSpecialDigestion: true

