# Trash

- type: entity
  name: ent-FoodFrozenSnowconeTrash
  parent: BaseItem
  id: FoodFrozenSnowconeTrash
  description: ent-FoodFrozenSnowconeTrash-desc
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/frozen.rsi
    state: cone-trash
  - type: Tag
    tags:
    - Trash

- type: entity
  name: ent-FoodFrozenPopsicleTrash
  parent: BaseItem
  id: FoodFrozenPopsicleTrash
  description: ent-FoodFrozenPopsicleTrash-desc
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/frozen.rsi
    layers:
      - state: stick
        map: [ "enum.DamageStateVisualLayers.Base" ]
  - type: RandomSprite
    available:
      - enum.DamageStateVisualLayers.Base:
          stick: ""
          stick2: ""
  - type: Tag
    tags:
    - Trash
  - type: SpaceGarbage
