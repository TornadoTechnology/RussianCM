- type: entity
  id: Cigarette
  parent: BaseCigar
  name: ent-Cigarette
  description: ent-Cigarette-desc
  components:
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cigarettes/cigarette.rsi
    state: unlit-icon
  - type: Tag
    tags:
      - Cigarette
      - Trash
  - type: SpaceGarbage
  - type: Clothing
    sprite: Objects/Consumable/Smokeables/Cigarettes/cigarette.rsi
    slots:
    - mask
    - ears
    equippedPrefix: unlit
  - type: Item
    size: Tiny
    sprite: Objects/Consumable/Smokeables/Cigarettes/cigarette.rsi
    heldPrefix: unlit
  - type: Construction
    graph: smokeableCigarette
    node: cigarette
  - type: CMSurgeryTool
  - type: CMCautery
  - type: CMUImprovisedSurgeryTool
    delayMultiplier: 2.8
    mishapChance: 0.20
    mishapDamageType: Heat
    mishapDamageAmount: 3
    failurePenalty: 2

- type: entity
  id: SoakedCigarette
  parent: BaseCigar
  name: ent-SoakedCigarette
  suffix: ent-SoakedCigarette-suffix
  description: ent-SoakedCigarette-desc
  components:
  - type: Sprite
    sprite: Objects/Consumable/Smokeables/Cigarettes/cigarette.rsi
    state: unlit-icon
  - type: Tag
    tags:
      - Cigarette
      - Trash
  - type: SpaceGarbage
  - type: Clothing
    sprite: Objects/Consumable/Smokeables/Cigarettes/cigarette.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
  - type: Construction
    graph: smokeableCigarette
    node: cigarette

- type: entity
  id: CigaretteSpent
  parent: Cigarette
  suffix: ent-CigaretteSpent-suffix
  components:
  - type: Sprite
    state: burnt-icon
  - type: Smokable
    state: Burnt
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 20
  - type: Tag
    tags:
      - Cigarette
      - Trash
      - Burnt

- type: entity
  id: CigaretteSyndicate
  suffix: ent-CigaretteSyndicate-suffix
  parent: Cigarette
  name: ent-CigaretteSyndicate
  components:
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 40
        reagents:
          - ReagentId: Nicotine
            Quantity: 10
          - ReagentId: Omnizine
            Quantity: 30

