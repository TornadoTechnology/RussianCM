# TODO: Find remaining cans and move to drinks_cans
# TODO: Find empty containers (e.g. mug, pitcher) and move to their own yml
# When adding new drinks also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\drinks_glass.yml
- type: entity
  parent: BaseItem
  id: DrinkBase
  abstract: true
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
  - type: MixableSolution
    solution: drink
  - type: SolutionTransfer
    canChangeTransferAmount: true
  - type: Drink
  - type: Sprite
    state: icon
  - type: MeleeWeapon
    soundNoDamage:
      path: "/Audio/Effects/Fluids/splat.ogg"
    damage:
      types:
        Blunt: 0
  - type: Spillable
    solution: drink
  - type: DrawableSolution
    solution: drink
  - type: RefillableSolution
    solution: drink
  - type: DrainableSolution
    solution: drink
  - type: UserInterface
    interfaces:
      enum.TransferAmountUiKey.Key:
        type: TransferAmountBoundUserInterface
  - type: DnaSubstanceTrace

- type: entity
  parent: DrinkBase
  id: DrinkGlassBase
  abstract: true
  components:
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Glass
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior { }
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 1
        transferForensics: true
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnLand
    ignoreResistances: true
    damage:
      types:
        Blunt: 5
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 5
  - type: PhysicalComposition
    materialComposition:
      Glass: 25
  - type: ExaminableSolution
    solution: drink
  - type: FitsInDispenser
    solution: drink
  - type: Tag
    tags:
      - DrinkGlass

# Transformable container - normal glass
- type: entity
  name: ent-DrinkGlass
  description: ent-DrinkGlass-desc
  parent: DrinkGlassBase
  id: DrinkGlass
  components:
  - type: Sprite
    sprite: Objects/Consumable/Drinks/glass_clear.rsi
    layers:
      - state: icon
        map: [ "enum.SolutionContainerLayers.Base" ]
      - state: fill1
        map: [ "enum.SolutionContainerLayers.Fill" ]
        visible: false
      - state: icon-front
        map: [ "enum.SolutionContainerLayers.Overlay" ]
  - type: Appearance
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 50 # RMC14
  - type: SolutionContainerVisuals
    maxFillLevels: 9
    fillBaseName: fill
    metamorphic: true
    metamorphicDefaultSprite:
      sprite: Objects/Consumable/Drinks/glass_clear.rsi
      state: icon
  - type: TransformableContainer

- type: entity
  name: ent-DrinkGlassCoupeShaped
  description: ent-DrinkGlassCoupeShaped-desc
  parent: DrinkGlassBase
  id: DrinkGlassCoupeShaped
  components:
    - type: Sprite
      sprite: Objects/Consumable/Drinks/glass_coupe_shape.rsi
      layers:
        - state: icon
          map: [ "enum.SolutionContainerLayers.Base" ]
        - state: fill1
          map: [ "enum.SolutionContainerLayers.Fill" ]
          visible: false
        - state: icon-front
          map: [ "enum.SolutionContainerLayers.Overlay" ]
    - type: Appearance
    - type: SolutionContainerManager
      solutions:
        drink:
          maxVol: 30
    - type: SolutionContainerVisuals
      maxFillLevels: 5
      fillBaseName: fill
      inHandsMaxFillLevels: 1
      inHandsFillBaseName: -fill-

