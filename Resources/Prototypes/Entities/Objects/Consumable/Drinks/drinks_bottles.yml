# When adding new drinks also add to random spawner located in Resources\Prototypes\Entities\Markers\Spawners\Random\Food_Drinks\drinks_bottles.yml
- type: entity
  parent: DrinkBase
  id: DrinkBottlePlasticBaseFull
  abstract: true
  suffix: ent-DrinkBottlePlasticBaseFull-suffix
  components:
  - type: Tag
    tags:
    - DrinkBottle
  - type: Openable
    sound:
      collection: bottleOpenSounds
    closeable: true
    closeSound:
      collection: bottleCloseSounds
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 100
  - type: Sprite
    state: icon
    sprite: Objects/Consumable/Drinks/generic_jug.rsi # fallback to generic plastic jug
  - type: Item
    size: Normal
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:SpillBehavior { }
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: TrashOnSolutionEmpty
    solution: drink
  - type: PhysicalComposition
    materialComposition:
      Plastic: 100
  - type: DnaSubstanceTrace
  - type: PressurizedSolution
    solution: drink
  - type: Shakeable

- type: entity
  parent: DrinkBase
  id: DrinkBottlePlasticSmallBaseFull
  abstract: true
  suffix: ent-DrinkBottlePlasticSmallBaseFull-suffix
  components:
  - type: Item
    size: Small
  - type: Tag
    tags:
      - DrinkCup
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
  - type: FitsInDispenser
    solution: drink
  - type: Openable
    sound:
      collection: bottleOpenSounds
    closeable: true
    closeSound:
      collection: bottleCloseSounds
  - type: Sprite
    state: icon
    sprite: Objects/Consumable/Drinks/waterbottle.rsi
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
       - !type:DoActsBehavior
        acts: [ "Destruction" ]
       - !type:SpillBehavior { }
  - type: DnaSubstanceTrace
  - type: PressurizedSolution
    solution: drink
  - type: TrashOnSolutionEmpty
    solution: drink
  - type: Shakeable
  - type: PhysicalComposition
    materialComposition:
      Plastic: 100

- type: entity
  parent: DrinkBottlePlasticSmallBaseFull
  id: DrinkBottleGlassSmallBaseFull
  abstract: true
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 50
  - type: Sprite
    sprite: Objects/Consumable/Drinks/beer.rsi
  - type: DamageOnLand
    damage:
      types:
        Blunt: 5
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 4
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior { }
      - !type:SpawnEntitiesBehavior
        spawn:
          BrokenBottle:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Tool
    qualities:
    - Rolling
    speedModifier: 0.75
  - type: PhysicalComposition
    materialComposition:
      Glass: 100

- type: entity
  parent: DrinkBottlePlasticBaseFull
  id: DrinkBottleGlassBaseFull
  abstract: true
  components:
  - type: Sprite
