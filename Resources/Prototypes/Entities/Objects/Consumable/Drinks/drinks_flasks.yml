- type: entity
  parent: DrinkBase
  id: FlaskBase
  abstract: true
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
  - type: Sprite
    state: icon
    sprite: Objects/Consumable/Drinks/flask.rsi
  - type: PhysicalComposition
    materialComposition:
      Steel: 300
  - type: FitsInDispenser
    solution: drink

- type: entity
  id: DrinkFlaskVisualsOpenable
  abstract: true
  components:
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        enum.OpenableVisuals.Layer:
          True: {state: "icon_open"}
          False: {state: "icon"}
  - type: Appearance
  - type: Sprite
    layers:
    - state: icon
      map: ["enum.OpenableVisuals.Layer"]
  - type: Openable
    sound:
      collection: flaskOpenSounds
    closeable: true
    closeSound:
      collection: flaskCloseSounds

# Flasks

- type: entity
  parent: [FlaskBase, DrinkFlaskVisualsOpenable]
  id: DrinkShinyFlask
  name: ent-DrinkShinyFlask
  description: ent-DrinkShinyFlask-desc
  components:
  - type: Sprite
    sprite: Objects/Consumable/Drinks/shinyflask.rsi

- type: entity
  parent: [FlaskBase, DrinkFlaskVisualsOpenable]
  id: DrinkMREFlask
  suffix: ent-DrinkMREFlask-suffix
  name: ent-DrinkMREFlask
  description: ent-DrinkMREFlask-desc
  components:
  - type: Sprite
    sprite: Objects/Consumable/Drinks/mreflask.rsi
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: Water
          Quantity: 50
  - type: TrashOnSolutionEmpty
    solution: drink

