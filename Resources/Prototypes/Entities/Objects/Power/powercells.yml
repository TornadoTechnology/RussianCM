        state: small
      - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
        state: o2
        shader: unshaded
        visible: false
  - type: Battery
    maxCharge: 360
    startingCharge: 0

- type: entity
  parent: PowerCellSmall
  id: PowerCellSmallNuclear
  name: ent-PowerCellSmallNuclear
  description: ent-PowerCellSmallNuclear-desc
  components:
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 36 # 10 seconds to recharge
    autoRechargePause: true
    autoRechargePauseTime: 30

