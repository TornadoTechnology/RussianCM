- type: entity
  id: InflatableWallStack
  parent: BaseItem
  name: ent-InflatableWallStack
  description: ent-InflatableWallStack-desc
  suffix: ent-InflatableWallStack-suffix
  components:
    - type: Stack
      stackType: InflatableWall
      count: 10
    - type: Sprite
      sprite: Objects/Misc/inflatable_wall.rsi
      state: item_wall
    - type: Item
      sprite: Objects/Misc/inflatable_wall.rsi
      size: Small
    - type: SpawnAfterInteract
      prototype: InflatableWall
      doAfter: 1
      removeOnInteract: true
    - type: Clickable
    - type: PhysicalComposition
