- type: entity
  parent: WeaponWandBase
  id: WeaponWandPolymorphBase
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: poly
    - state: poly-effect
      map: ["effect"]
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/Magic/staff_animation.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltCarp
    capacity: 5

- type: entity
  name: ent-WeaponWandPolymorphCarp
  parent: WeaponWandPolymorphBase
  id: WeaponWandPolymorphCarp
  description: ent-WeaponWandPolymorphCarp-desc
  components:
  - type: BasicEntityAmmoProvider
    proto: ProjectilePolyboltCarp
    capacity: 5
    count: 5

- type: entity
  name: ent-WeaponWandPolymorphMonkey
  parent: WeaponWandPolymorphBase
