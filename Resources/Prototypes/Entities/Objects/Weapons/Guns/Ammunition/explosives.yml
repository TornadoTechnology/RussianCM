- type: entity
  id: GrenadeFrag
  name: ent-GrenadeFrag
  parent: BaseGrenade
  components:
  - type: CartridgeAmmo
    proto: BulletGrenadeFrag
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
