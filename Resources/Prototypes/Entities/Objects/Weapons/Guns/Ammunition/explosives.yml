- type: entity
  parent: BaseGrenade
  id: GrenadeCleanade
  name: ent-GrenadeCleanade
  components:
  - type: CartridgeAmmo
    proto: BulletGrenadeCleanade
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
