- type: entity
  id: MagazinePistol
  name: ent-MagazinePistol
  parent: BaseMagazinePistol
  description: ent-MagazinePistol-desc
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistol
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
