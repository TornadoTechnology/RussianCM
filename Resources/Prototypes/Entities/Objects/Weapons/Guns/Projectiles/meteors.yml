  suffix: ent-MeteorCow-suffix
  components:
  - type: Sprite
    state: cow_pixel
  - type: Explosive
    totalIntensity: 25
  - type: SolutionContainerManager
    solutions:
      milk:
        maxVol: 500
        reagents:
        - ReagentId: Milk
          Quantity: 500
  - type: Destructible
    thresholds:
