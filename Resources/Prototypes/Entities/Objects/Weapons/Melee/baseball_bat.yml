- type: entity
  name: ent-BaseBallBat
  parent: [BaseItem, BaseMinorContraband]
  id: BaseBallBat
  description: ent-BaseBallBat-desc
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/baseball_bat.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 10
        Structural: 5
    soundHit:
      collection: MetalThud
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5
        Structural: 10
  - type: Item
    size: Normal
  - type: Tool
    qualities:
    - Rolling
    speedModifier: 0.75 # a bit unwieldly but does the job
  - type: Clothing
    quickEquip: false
    slots:
    - back
  - type: Construction
    graph: WoodenBat
    node: bat
  - type: UseDelay
    delay: 1
  - type: PhysicalComposition
    materialComposition:
      Wood: 250
  - type: Tag
    tags:
    - BaseballBat

- type: entity
  name: ent-IncompleteBaseBallBat
  parent: BaseItem
  id: IncompleteBaseBallBat
  description: ent-IncompleteBaseBallBat-desc
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/incomplete_bat.rsi
    state: icon
  - type: Item
    size: Normal
    sprite: Objects/Weapons/Melee/incomplete_bat.rsi
  - type: Construction
    graph: WoodenBat
    node: incompleteBat

- type: entity
  name: ent-WeaponMeleeKnockbackStick
  parent: BaseBallBat
  id: WeaponMeleeKnockbackStick
  description: ent-WeaponMeleeKnockbackStick-desc
  categories: [ DoNotMap ]
  components:
  - type: MeleeThrowOnHit
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 1
