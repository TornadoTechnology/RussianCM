- type: entity
  parent: BaseItem
  id: BaseKnife
  abstract: true
  components:
  - type: Tag
    tags:
    - Knife
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: Utensil
    types:
      - Knife
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Slash: 10
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Sprite
  - type: Item
    size: Small
  - type: Tool
    qualities:
      - Slicing
    useSound:
      path: /Audio/Items/Culinary/chop.ogg
  - type: CMSurgeryTool
  - type: CMScalpel
  - type: CMRetractor
  - type: CMUImprovisedSurgeryTool
    delayMultiplier: 1.8
    mishapChance: 0.12
    mishapDamageType: Slash
    mishapDamageAmount: 3
    failurePenalties:
      retractor: 2
      bone_saw: 1
  - type: DeleteOnExplosion

- type: entity
  name: ent-KitchenKnife
  parent: BaseKnife
  id: KitchenKnife
  description: ent-KitchenKnife-desc
  components:
  - type: Tag
    tags:
    - Knife
    - KitchenKnife
  - type: Sprite
    sprite: Objects/Weapons/Melee/kitchen_knife.rsi
    state: icon
  - type: Item
    sprite: Objects/Weapons/Melee/kitchen_knife.rsi
  - type: GuideHelp
    guides:
    - Chef
    - FoodRecipes

- type: entity
