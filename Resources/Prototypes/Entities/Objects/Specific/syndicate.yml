# Uplinks
- type: entity
  parent: [BaseItem, StorePresetUplink, BaseSyndicateContraband]
  id: BaseUplinkRadio
  name: ent-BaseUplinkRadio
  description: ent-BaseUplinkRadio-desc
  suffix: ent-BaseUplinkRadio-suffix
  components:
  - type: Sprite
    sprite: Objects/Devices/communication.rsi
    layers:
    - state: old-radio
  - type: Item
    sprite: Objects/Devices/communication.rsi
    heldPrefix: old-radio
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Store
    balance:
      Telecrystal: 0

- type: entity
  parent: BaseUplinkRadio
  id: BaseUplinkRadio20TC
  suffix: ent-BaseUplinkRadio20TC-suffix
  components:
  - type: Store
    balance:
      Telecrystal: 20

- type: entity
  parent: BaseUplinkRadio
  id: BaseUplinkRadio25TC
  suffix: ent-BaseUplinkRadio25TC-suffix
  components:
  - type: Store
    balance:
      Telecrystal: 25

#this uplink MUST be used for nukeops, as it has the tag for filtering the listing.
- type: entity
  parent: BaseUplinkRadio
  id: BaseUplinkRadio40TC
  suffix: ent-BaseUplinkRadio40TC-suffix
  components:
  - type: Store
    balance:
      Telecrystal: 40
  - type: Tag
    tags:
    - NukeOpsUplink

- type: entity
  parent: BaseUplinkRadio
  id: BaseUplinkRadio60TC
  suffix: ent-BaseUplinkRadio60TC-suffix
  components:
  - type: Store
    balance:
      Telecrystal: 60
  - type: Tag
    tags:
    - NukeOpsUplink

- type: entity
  parent: BaseUplinkRadio
  id: BaseUplinkRadioDebug
  suffix: ent-BaseUplinkRadioDebug-suffix
  components:
  - type: Store
    balance:
      Telecrystal: 99999
