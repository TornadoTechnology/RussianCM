
- type: entity
  name: ent-Telecrystal
  parent: [BaseItem, BaseSyndicateContraband]
  id: Telecrystal
  suffix: ent-Telecrystal-suffix
  description: ent-Telecrystal-desc
  components:
  - type: Sprite
    sprite: Objects/Specific/Syndicate/telecrystal.rsi
    state: telecrystal
  - type: Item
    sprite: Objects/Specific/Syndicate/telecrystal.rsi
    size: Tiny
  - type: Stack
    count: 20
    stackType: Telecrystal
  - type: StaticPrice
    price: 0
  - type: StackPrice
    price: 200
  - type: Currency
    price:
      Telecrystal: 1

