- type: entity
  parent: BaseHealingItem
  id: Tourniquet
  name: ent-Tourniquet
  description: ent-Tourniquet-desc
  components:
    - type: Tag
      tags:
        - SecBeltEquip
    - type: Sprite
      state: tourniquet
    - type: Item
      heldPrefix: tourniquet
    - type: Healing
      damageContainers:
        - Biological
      damage:
        groups:
          Brute: 5 # Tourniquets HURT!
        types:
          Asphyxiation: 5 # Essentially Stopping all blood reaching a part of your body
      bloodlossModifier: -10 # Tourniquets stop bleeding
      delay: 0.5
      healingBeginSound:
        path: "/Audio/Items/Medical/brutepack_begin.ogg"
        params:
          volume: 1.0
          variation: 0.125
      healingEndSound:
        path: "/Audio/Items/Medical/brutepack_end.ogg"
        params:
          volume: 1.0
          variation: 0.125

