- type: entity
  parent: BaseItem
  id: ResearchDisk
  name: ent-ResearchDisk
  description: ent-ResearchDisk-desc
  components:
  - type: Sprite
    sprite: Objects/Specific/Research/researchdisk.rsi
    state: icon
  - type: ResearchDisk
  - type: GuideHelp
    guides:
    - Science

- type: entity
  parent: ResearchDisk
  id: ResearchDisk5000
  name: ent-ResearchDisk5000
  description: ent-ResearchDisk5000-desc
  components:
  - type: ResearchDisk
    points: 5000

- type: entity
  parent: ResearchDisk
  id: ResearchDisk10000
  name: ent-ResearchDisk10000
  description: ent-ResearchDisk10000-desc
  components:
  - type: ResearchDisk
    points: 10000

- type: entity
  parent: ResearchDisk
  id: ResearchDiskDebug
  name: ent-ResearchDiskDebug
  suffix: ent-ResearchDiskDebug-suffix
  categories: [ DoNotMap ]
  description: ent-ResearchDiskDebug-desc
  components:
  - type: ResearchDisk
    unlockAllTech: true

- type: entity
  parent: BaseItem
  id: TechnologyDisk
  name: ent-TechnologyDisk
  description: ent-TechnologyDisk-desc
  components:
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    layers:
    - state: datadisk_base
      map: ["enum.DamageStateVisualLayers.Base"]
    - state: datadisk_label
  - type: RandomSprite
    available:
    - enum.DamageStateVisualLayers.Base:
        datadisk_base: Sixteen
  - type: TechnologyDisk
  - type: StaticPrice
    price: 100
  - type: StealTarget
    stealGroup: TechnologyDisk

- type: entity
  parent: TechnologyDisk
  id: TechnologyDiskRare
  suffix: ent-TechnologyDiskRare-suffix
  components:
  - type: TechnologyDisk
    tierWeightPrototype: RareTechDiskTierWeights
