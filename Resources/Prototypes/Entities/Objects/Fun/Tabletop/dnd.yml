# Board item (given to players)
- type: entity
  parent: BaseBoardEntity
  id: BaseBattlemap
  name: ent-BaseBattlemap
  abstract: true
  description: ent-BaseBattlemap-desc
  components:
    - type: Sprite
      sprite: Objects/Fun/Tabletop/grassbm.rsi
      state: icon
    - type: TabletopGame
      boardName: tabletop-battlemap-board-name
      setup:
        !type:TabletopEmptySetup
        boardPrototype: GrassBoardTabletop

- type: entity
  parent: BaseBattlemap
  id: GrassBattlemap
  name: ent-GrassBattlemap
  description: ent-GrassBattlemap-desc
  components:
    - type: Sprite
      sprite: Objects/Fun/Tabletop/Battlemaps/grassbm.rsi
    - type: TabletopGame
      setup:
        !type:TabletopEmptySetup
        boardPrototype: GrassBoardTabletop

- type: entity
