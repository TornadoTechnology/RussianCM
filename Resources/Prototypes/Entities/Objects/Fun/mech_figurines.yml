#TODO give these the new base sprite used in the regular action figures.
#No, not like a template. Just the base of the toy.
- type: entity
  parent: BaseItem
  id: BaseFigurineMech
  name: ent-BaseFigurineMech
  description: ent-BaseFigurineMech-desc
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Fun/mech_figurines.rsi
  - type: PhysicalComposition
    materialComposition:
      Plastic: 100
  - type: StaticPrice
    price: 75
  - type: Tag
    tags:
    - Figurine

#Ripley APLU
- type: entity
  parent: BaseFigurineMech
  id: ToyRipley
  name: ent-ToyRipley
  description: ent-ToyRipley-desc
  components:
