- type: entity
  name: ent-Pen
  parent: BaseItem
  id: Pen
  description: ent-Pen-desc
  components:
  - type: Sprite
    sprite: Objects/Misc/pens.rsi
    state: pen
  - type: Item
    sprite: Objects/Misc/pens.rsi
    heldPrefix: pen
    size: Tiny
  - type: Tag
    tags:
    - Write
    - Pen
  - type: CMSurgeryTool
  - type: CMSurgicalDrill
  - type: CMBoneSaw
  - type: CMUImprovisedSurgeryTool
    delayMultiplier: 2.6
    mishapChance: 0.20
    mishapDamageType: Piercing
    mishapDamageAmount: 4
    failurePenalty: 2
  - type: PhysicalComposition
    materialComposition:
      Steel: 25
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Items/pen_click.ogg
      params:
        volume: -4
        maxDistance: 2
  - type: UseDelay
    delay: 1.5

- type: entity
  parent: Pen
  id: PenEmbeddable
  abstract: true
  components:
  - type: EmbeddableProjectile
    offset: 0.3,0.0
    removalTime: 0.0
  - type: ThrowingAngle
    angle: 315
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 3

#TODO: I want the luxury pen to write a cool font like Merriweather in the future.

- type: entity
  name: ent-LuxuryPen
  parent: Pen
  id: LuxuryPen
  description: ent-LuxuryPen-desc
  components:
  - type: Sprite
    state: luxury_pen
  - type: Item
    heldPrefix: luxury_pen

- type: entity
  id: BaseAdvancedPen
  parent: PenEmbeddable
  abstract: true
  components:
  - type: Tag
    tags:
    - Write
    - WriteIgnoreStamps
    - Pickaxe
    - Pen
  - type: MeleeWeapon
    wideAnimationRotation: -45
    damage:
      types:
        Piercing: 15
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Tool
    qualities:
    - Screwing
    useSound:
      collection: Screwdriver

- type: entity
  name: ent-CyberPen
  parent: [BaseAdvancedPen, BaseSyndicateContraband]
  id: CyberPen
  description: ent-CyberPen-desc
  components:
  - type: Sprite
    state: overpriced_pen
  - type: Item
    heldPrefix: overpriced_pen
  - type: StaticPrice
    price: 500

- type: entity
  name: ent-PenCentcom
  parent: [BaseAdvancedPen, BaseCentcommContraband]
  id: PenCentcom
  description: ent-PenCentcom-desc
  components:
  - type: Sprite
    state: pen_centcom
  - type: Item
    heldPrefix: pen_centcom

- type: entity
  name: ent-PenCap
  parent: PenEmbeddable
  id: PenCap
  description: ent-PenCap-desc
  components:
  - type: Sprite
    state: pen_cap

- type: entity
  name: ent-PenHop
  parent: PenEmbeddable
  id: PenHop
  description: ent-PenHop-desc
  components:
  - type: Sprite
    state: pen_hop

- type: entity
  name: ent-PenWiz
  parent: [ PenEmbeddable, BaseMagicalContraband ]
  id: PenWiz
  description: ent-PenWiz-desc
  components:
  - type: Sprite
    state: pen_wizard
  - type: Tag
    tags:
    - WriteIgnoreStamps
    - Write
    - Pen
