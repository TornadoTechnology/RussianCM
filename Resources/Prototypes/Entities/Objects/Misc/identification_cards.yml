- type: entity
  parent: Clothing
  id: IDCardStandard
  name: ent-IDCardStandard
  description: ent-IDCardStandard-desc
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Misc/id_cards.rsi
  - type: Clothing
    slots:
    - idcard
    sprite: Objects/Misc/id_cards.rsi
  - type: Item
    size: Small
    heldPrefix: default
    storedRotation: -90
