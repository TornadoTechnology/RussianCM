- type: entity
  parent: BaseItem
  id: BedsheetBase
  name: ent-BedsheetBase
  abstract: true
  description: ent-BedsheetBase-desc
  placement:
    mode: SnapgridCenter
    snap:
    - Bed
  components:
  - type: Sprite
    sprite: Objects/Misc/bedsheets.rsi
    noRot: true
  - type: Item
    size: Small
  - type: Clothing
    quickEquip: true
    slots:
    - neck
  - type: StaticPrice
    price: 100
  - type: Tag
    tags:
    - Bedsheet

