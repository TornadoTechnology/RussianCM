- type: entity
  parent: BaseItem
  id: TreasureDatadiskEncrypted
  name: ent-TreasureDatadiskEncrypted
  description: ent-TreasureDatadiskEncrypted-desc
  components:
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    layers:
    - state: datadisk_base
      color: "#868686"
    - state: datadisk_label
    - state: datadisk_encrypted
  - type: PointLight
    radius: 1.5
    energy: 0.5
    castShadows: false
    color: "#0000ff"
  - type: StaticPrice
    price: 500

- type: entity
  parent: BaseItem
  id: TreasureHardDiskDrive
  name: ent-TreasureHardDiskDrive
  description: ent-TreasureHardDiskDrive-desc
  components:
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    layers:
    - state: harddisk
      map: [ "base" ]
  - type: Item
    storedRotation: -90
  - type: RandomSprite
    available:
    - base:
        harddisk: ""
        harddisk_mini: ""
        harddisk_micro: ""
  - type: StaticPrice
    price: 275

