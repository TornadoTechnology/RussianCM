- type: entity
  parent: BaseItem
  id: ChopSticks
  name: ent-ChopSticks
  description: ent-ChopSticks-desc
  components:
  - type: Sprite
    sprite: Objects/Misc/chopstick.rsi
    state: icon
  - type: Item
    sprite: Objects/Misc/chopstick.rsi
    size: Small
  - type: Utensil
    types:
    - Fork
  - type: Tag
    tags:
    - Trash

- type: entity
  parent: BaseItem
  name: ent-PairedChopsticks
  id: PairedChopsticks
  description: ent-PairedChopsticks-desc
  components:
  - type: SpawnItemsOnUse
    items:
      - id: ChopSticks
    sound:
      path: /Audio/Effects/chopstickbreak.ogg
  - type: Sprite
    sprite: Objects/Misc/chopstick.rsi
    state: paired
  - type: Tag
    tags:
    - Trash
