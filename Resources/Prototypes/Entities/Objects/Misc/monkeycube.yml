- type: entity
  parent: BoxCardboard
  name: ent-MonkeyCubeBox
  id: MonkeyCubeBox
  description: ent-MonkeyCubeBox-desc
  components:
  - type: StorageFill
    contents:
      - id: MonkeyCubeWrapped
        amount: 8
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi
    state: box

- type: entity
  parent: BaseItem
  abstract: true
  suffix: ent-BaseWrappedCube-suffix
  id: BaseWrappedCube
  components:
  - type: Item
    size: Tiny
  - type: SpawnItemsOnUse
    sound:
      path: /Audio/Effects/unwrap.ogg
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi

- type: entity
  parent: BaseWrappedCube
  name: ent-MonkeyCubeWrapped
  id: MonkeyCubeWrapped
  description: ent-MonkeyCubeWrapped-desc
  components:
  - type: SpawnItemsOnUse
    items:
    - id: MonkeyCube
  - type: Sprite
    state: wrapper
  - type: Tag
    tags:
    - MonkeyCube

- type: entity
  parent: MonkeyCubeBox
  name: ent-KoboldCubeBox
  id: KoboldCubeBox
  description: ent-KoboldCubeBox-desc
  components:
  - type: StorageFill
    contents:
      - id: KoboldCubeWrapped
        amount: 8
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi
    state: box_kobold

- type: entity
  parent: MonkeyCubeBox
  name: ent-VariantCubeBox
  id: VariantCubeBox
  description: ent-VariantCubeBox-desc
  components:
  - type: StorageFill
    contents:
      - id: KoboldCubeWrapped
        amount: 4
      - id: MonkeyCubeWrapped
        amount: 4
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi
    state: box_variant

- type: entity
  parent: BaseWrappedCube
  name: ent-KoboldCubeWrapped
  id: KoboldCubeWrapped
  description: ent-KoboldCubeWrapped-desc
  components:
  - type: SpawnItemsOnUse
    items:
      - id: KoboldCube
  - type: Sprite
    state: wrapper_kobold

- type: entity
  parent: MonkeyCubeBox
  name: ent-SyndicateSpongeBox
  suffix: ent-SyndicateSpongeBox-suffix
  id: SyndicateSpongeBox
  description: ent-SyndicateSpongeBox-desc
  components:
  - type: StorageFill
    contents:
      - id: SyndicateSpongeWrapped
        amount: 6
  - type: Sprite
    sprite: Objects/Misc/monkeycube.rsi
    state: box

- type: entity
  parent: MonkeyCubeWrapped
  name: ent-SyndicateSpongeWrapped
  suffix: ent-SyndicateSpongeWrapped-suffix
  id: SyndicateSpongeWrapped
  components:
  - type: SpawnItemsOnUse
    items:
      - id: SyndicateSponge
