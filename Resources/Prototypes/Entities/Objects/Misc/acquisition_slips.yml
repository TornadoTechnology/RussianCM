- type: entity
  abstract: true
  parent: Paper
  id: PaperAcquisitionSlip
  name: ent-PaperAcquisitionSlip
  description: ent-PaperAcquisitionSlip-desc
  components:
  - type: Sprite
    layers:
    - state: acquisition_form
    - state: acquisition_form_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: acquisition_form_header
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: Tag
    tags:
    - Trash
    - Document
    - Paper
  - type: Paper
    editingDisabled: true
  - type: PaperVisuals
    footerImagePath: "/Textures/Interface/Paper/AcquisitionSlips/barcode.svg.192dpi.png"
    maxWritableArea: 512.0, 512.0

