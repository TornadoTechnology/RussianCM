- type: entity
  name: ent-RubberStampBase
  parent: BaseItem
  id: RubberStampBase
  description: ent-RubberStampBase-desc
  abstract: true
  components:
  - type: Stamp
    stampedName: stamp-component-stamped-name-default
    stampState: "paper_stamp-generic"
    stampedColor: "#a23e3e"
