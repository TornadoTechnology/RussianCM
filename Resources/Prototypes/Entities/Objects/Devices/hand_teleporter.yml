- type: entity
  id: HandTeleporter
  parent: [BaseItem, BaseGrandTheftContraband]
  name: ent-HandTeleporter
  description: "ent-HandTeleporter-desc"
  components:
  - type: Sprite
    sprite: /Textures/Objects/Devices/hand_teleporter.rsi
    layers:
    - state: icon
  - type: HandTeleporter
  - type: Tag
    tags:
    - HighRiskItem
  - type: StealTarget
    stealGroup: HandTeleporter

- type: entity
  id: HandTeleporterAdmeme
  suffix: ent-HandTeleporterAdmeme-suffix
  parent: BaseItem
  name: ent-HandTeleporterAdmeme
  description: ent-HandTeleporterAdmeme-desc
  components:
  - type: Sprite
    sprite: /Textures/Objects/Devices/hand_teleporter.rsi
    layers:
    - state: icon
      color: green
  - type: HandTeleporter
    allowPortalsOnDifferentGrids: true
    allowPortalsOnDifferentMaps: true
    firstPortalPrototype: PortalGatewayBlue
    secondPortalPrototype: PortalGatewayOrange
