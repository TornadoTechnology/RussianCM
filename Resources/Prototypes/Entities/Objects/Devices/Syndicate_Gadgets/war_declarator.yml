- type: entity
  parent: BaseItem
  id: NukeOpsDeclarationOfWar
  name: ent-NukeOpsDeclarationOfWar
  description: ent-NukeOpsDeclarationOfWar-desc
  components:
    - type: Sprite
      sprite: Objects/Devices/declaration_of_war.rsi
      layers:
        - state: declarator
    - type: Item
    - type: UseDelay
      delay: 0.5
    - type: ActivatableUI
      inHandsOnly: true
      singleUser: true
      requireActiveHand: false
      key: enum.WarDeclaratorUiKey.Key
    - type: UserInterface
      interfaces:
        enum.WarDeclaratorUiKey.Key:
          type: WarDeclaratorBoundUserInterface
    - type: WarDeclarator
      message: war-declarator-default-message
    - type: AccessReader
      access: [["NuclearOperative"]]
