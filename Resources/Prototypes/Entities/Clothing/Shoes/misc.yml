  - type: Clothing
    sprite: Clothing/Shoes/Boots/moonboots.rsi
  - type: AntiGravityClothing
  - type: StaticPrice
    price: 75
  - type: Tag
    tags: [ ]
   
- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesBootsJump
  name: ent-ClothingShoesBootsJump
  description: ent-ClothingShoesBootsJump-desc
  components:
  - type: Sprite
    sprite: Clothing/Shoes/Boots/jumpboots.rsi
    layers:
    - state: icon
  - type: Clothing
    sprite: Clothing/Shoes/Boots/jumpboots.rsi
  - type: JumpAbility
    jumpDistance: 4
    jumpSound: /Audio/Effects/stealthoff.ogg
  - type: ActionGrant
    actions:
    - ActionGravityJump 
  - type: ItemActionGrant
    actions:
    - ActionGravityJump
    activeIfWorn: true
  - type: StaticPrice
    price: 220
  - type: Tag
    tags: []
