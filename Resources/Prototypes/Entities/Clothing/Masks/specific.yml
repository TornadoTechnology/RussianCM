- type: entity
  parent: ClothingMaskBase
  id: ClothingMaskGasChameleon
  name: ent-ClothingMaskGasChameleon
  description: ent-ClothingMaskGasChameleon-desc
  suffix: ent-ClothingMaskGasChameleon-suffix
  components:
    - type: Tag
      tags: [] # ignore "WhitelistChameleon" tag
    - type: Sprite
      sprite: Clothing/Mask/gas.rsi
    - type: Clothing
      sprite: Clothing/Mask/gas.rsi
    - type: ChameleonClothing
      slot: [mask]
      default: ClothingMaskGas
    - type: BreathMask
    - type: IdentityBlocker # need that for default ClothingMaskGas
    - type: UserInterface
      interfaces:
        enum.ChameleonUiKey.Key:
          type: ChameleonBoundUserInterface
    - type: HideLayerClothing
      slots:
      - Snout

- type: entity
  parent: ClothingMaskGasChameleon
  id: ClothingMaskGasVoiceChameleon
  suffix: ent-ClothingMaskGasVoiceChameleon-suffix
  components:
    - type: VoiceMask
    - type: HideLayerClothing
      slots:
      - Snout
    - type: UserInterface
      interfaces:
        enum.ChameleonUiKey.Key:
          type: ChameleonBoundUserInterface
        enum.VoiceMaskUIKey.Key:
          type: VoiceMaskBoundUserInterface

- type: entity
  parent: ClothingMaskBase
  id: ClothingMaskGoldenCursed
  name: ent-ClothingMaskGoldenCursed
  description: ent-ClothingMaskGoldenCursed-desc
  components:
  - type: Sprite
    sprite: Clothing/Mask/goldenmask.rsi
    layers:
    - state: icon
      map: [ "mask" ]
  - type: Clothing
    sprite: Clothing/Mask/goldenmask.rsi
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CursedMaskVisuals.State:
        mask:
          Neutral: { state: icon }
          Despair: { state: icon-despair }
          Joy: { state: icon-joy }
          Anger: { state: icon-anger }
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag
  - type: SelfEquipOnly
  - type: CursedMask
    despairDamageModifier:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.4
  - type: HideLayerClothing
    slots:
    - Snout
  - type: IngestionBlocker
  - type: StaticPrice
    price: 5000
