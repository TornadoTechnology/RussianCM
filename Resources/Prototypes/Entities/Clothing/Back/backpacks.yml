- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackElectropack
  name: ent-ClothingBackpackElectropack
  suffix: ent-ClothingBackpackElectropack-suffix
  description: ent-ClothingBackpackElectropack-desc
  components:
  - type: Sprite
    sprite: Clothing/Back/Backpacks/electropack.rsi
    state: icon
  - type: Clothing
    stripDelay: 10
    equipDelay: 5 # to avoid accidentally falling into the trap associated with SelfUnremovableClothing
  - type: SelfUnremovableClothing
  - type: ShockOnTrigger
    damage: 5
    duration: 3
    cooldown: 4
  - type: TriggerOnSignal
  - type: DeviceLinkSink
    ports:
      - Trigger

