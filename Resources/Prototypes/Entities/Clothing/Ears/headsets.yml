- type: entity
  abstract: true
  parent: Clothing
  id: ClothingHeadset
  name: ent-ClothingHeadset
  description: ent-ClothingHeadset-desc
  components:
  - type: ContainerContainer
    containers:
      key_slots: !type:Container
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
  - type: Headset
