- type: entity
  parent: [ClothingHeadBaseButcherable, BaseFoldable]
  id: ClothingHeadBandBase
  abstract: true
  components:
  - type: Foldable
    folded: true
  - type: Mask
    isToggled: true
    enabled: false
    disableOnFolded: true
  - type: IngestionBlocker
    enabled: false
  - type: IdentityBlocker
    enabled: false
    coverage: MOUTH
  - type: Sprite # needed for vendor inventory icons
    layers:
    - state: icon
      map: ["foldedLayer"]
      visible: true
    - state: icon_mask
      map: [ "unfoldedLayer" ]
      visible: false
  - type: HideLayerClothing # needed since head bandana inherits from mask bandana
    slots: []
  - type: Tag
    tags:
    - Bandana
    - ClothMade
    - Recyclable
    - WhitelistChameleon
  - type: CMSurgeryTool
  - type: CMUOrganClamp
  - type: CMUImprovisedSurgeryTool
    delayMultiplier: 2.5
    mishapChance: 0.14
    mishapDamageType: Blunt
    mishapDamageAmount: 2

