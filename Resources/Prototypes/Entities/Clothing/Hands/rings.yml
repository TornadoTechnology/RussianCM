- type: entity
  parent: [ RingBase, GoldRingBase ]
  id: GoldRing
  name: ent-GoldRing
  description: ent-GoldRing-desc
  components:
  - type: Sprite
    layers:
      - state: ring
        color: "#ffc833"

- type: entity
  parent: [ RingBase, SilverRingBase ]
  id: SilverRing
  name: ent-SilverRing
  description: ent-SilverRing-desc
  components:
  - type: Sprite
    layers:
      - state: ring

- type: entity
  parent: [ RingBase, GoldRingBase ]
  id: GoldRingDiamond
  name: ent-GoldRingDiamond
  description: ent-GoldRingDiamond-desc
  components:
  - type: Sprite
    layers:
      - state: ring
        color: "#ffc833"
      - state: gem
        color: "#c1ffff"
  - type: StaticPrice
    price: 1500

- type: entity
  parent: [ RingBase, SilverRingBase ]
  id: SilverRingDiamond
  name: ent-SilverRingDiamond
  description: ent-SilverRingDiamond-desc
  components:
  - type: Sprite
    layers:
      - state: ring
      - state: gem
        color: "#c1ffff"
  - type: StaticPrice
    price: 1400

- type: entity
  parent: [ RingBase, GoldRingBase ]
  id: GoldRingGem
  name: ent-GoldRingGem
  description: ent-GoldRingGem-desc
  components:
  - type: Sprite
    layers:
      - state: ring
        color: "#ffc833"
      - state: gem
        map: [ "gemColor" ]
  - type: StaticPrice
    price: 2100
  - type: RandomSprite
    getAllGroups: true
    available:
      - gemColor:
          gem: Rainbow

- type: entity
  parent: [ RingBase, SilverRingBase ]
  id: SilverRingGem
  name: ent-SilverRingGem
  description: ent-SilverRingGem-desc
  components:
  - type: Sprite
    layers:
      - state: ring
      - state: gem
        map: [ "gemColor" ]
  - type: StaticPrice
    price: 2000
  - type: RandomSprite
    getAllGroups: true
    available:
      - gemColor:
          gem: Rainbow
