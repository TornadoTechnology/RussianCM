- type: entity
  parent: Clothing
  id: ClothingNeckStethoscope
  name: ent-ClothingNeckStethoscope
  description: ent-ClothingNeckStethoscope-desc
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: Clothing/Neck/Misc/stethoscope.rsi
    state: icon
  - type: Clothing
    sprite: Clothing/Neck/Misc/stethoscope.rsi
    quickEquip: true
    slots:
    - neck
  - type: Stethoscope

- type: entity
  parent: BaseAction
  id: ActionStethoscope
  name: ent-ActionStethoscope
  components:
  - type: Action
    icon:
      sprite: Clothing/Neck/Misc/stethoscope.rsi
      state: icon
    priority: -1
    itemIconStyle: BigAction
    checkCanInteract: false
  - type: TargetAction
  - type: EntityTargetAction
    event: !type:StethoscopeActionEvent

- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckBling
