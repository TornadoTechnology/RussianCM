  description: ent-ClothingNeckBling-desc
  components:
  - type: Sprite
    sprite: Clothing/Neck/Misc/bling.rsi
  - type: Clothing
    sprite: Clothing/Neck/Misc/bling.rsi
  - type: Item
    sprite: Clothing/Neck/Misc/bling.rsi

- type: entity
