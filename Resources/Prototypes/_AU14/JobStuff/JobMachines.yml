- type: entity
  parent: RMCCommunicationsConsoleBase
  id: AUbudgetConsole
  name: ent-AUbudgetConsole
  description: ent-AUbudgetConsole-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.BudgetConsoleUi.Key
  - type: UserInterface
    interfaces:
      enum.BudgetConsoleUi.Key:
        type: BudgetConsoleBui
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno
  - type: BudgetConsole
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [ [ "AU14AccessGovforCommand" ], [ "CMAccessColonyCommand" ] ]
  - type: ItemSlots
    slots:
      CashSlot:
        whitelist:
          tags:
          - Currency
  - type: ContainerContainer
    containers:
      CashSlot: !type:ContainerSlot {}




- type: entity
  parent: BaseStructure
  id: AUSubmissionPointBase
  name: ent-AUSubmissionPointBase
  description: ent-AUSubmissionPointBase-desc
  suffix: ent-AUSubmissionPointBase-suffix
  components:
  - type: Sprite
    sprite: _AU14/Structures/colony_processor.rsi
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: InteractionOutline
  - type: ThrowInsertContainer
    containerId: submission
    probability: 100
  - type: SubmissionStorage
    rewards:
      SteelOre: 100
      AUwood: 25
      Vegetable: 10
      Fruit: 20
      CottonBoll: 15
      CMUGrain: 15
  - type: ContainerContainer
    containers:
      submission: !type:Container
      disposals: !type:Container
  - type: DisposalUnit
    whitelist:
      tags:
      - SteelOre
      - AUwood
      - Vegetable
      - Fruit
      - CottonBoll
      - CMUGrain

