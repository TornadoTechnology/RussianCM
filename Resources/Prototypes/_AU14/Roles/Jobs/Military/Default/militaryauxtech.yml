- type: job
  parent: AU14JobAuxTechBase
  id: AU14JobGOVFORAuxTech
  name: job-au14jobgovforauxtech-name
  description: job-au14jobgovforauxtech-desc
  setPreference: true
  requirements:
  - !type:TraitsRequirement
    inverted: true
    traits:
    - NonResuscitable
    - Epilepsy
  ranks:
    RMCRankStaffSergeant:
    - !type:RoleTimeRequirement
      role: AU14JobGOVFORAuxTech
      time: 270000 # 75 hours
    RMCRankSergeant:
    - !type:RoleTimeRequirement
      role: AU14JobGOVFORAuxTech
      time: 180000 # 50 hours
    RMCRankCorporal:
    - !type:RoleTimeRequirement
      role: AU14JobGOVFORAuxTech
      time: 72000 # 24 hours 
    RMCRankLanceCorporal:
    - !type:RoleTimeRequirement
      role: AU14JobGOVFORAuxTech
      time: 36000 # 10 hours
    RMCRankPrivateFirstClass: []
  startingGear: AU14GearGOVFORAuxTech
  dummyStartingGear: AU14GearGOVFORAuxTechDummy
  icon: "AU14JobIconRTO"
  requireAdminNotify: false
  spawnMenuRoleName: job-au14jobgovforauxtech-spawnmenurolename
  joinNotifyCrew: false
  supervisors: job-au14jobgovforauxtech-supervisors
  accessGroups:
  - AU14GovforAuxTech
  - CMCargoTech
  overwatchSortPriority: -6
  overwatchShowName: true
  overwatchRoleName: job-au14jobgovforauxtech-overwatchrolename
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - GOVFOR
    - type: Marine
      Faction: govfor
    - type: Skills
      preset: AU14SkillPresetPlatoonAuxTech
    - type: JobPrefix
      prefix: au14-job-prefix-govforAuxTech
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
    - type: MarineOrders
      moveOrderSoundMale:
        collection: AU14MaleMoveOrder
      moveOrderSoundFemale:
        collection: AU14FemaleMoveOrder
      focusOrderSoundMale:
        collection: AU14MaleFocusOrder
      focusOrderSoundFemale:
        collection: AU14FemaleFocusOrder
      holdOrderSoundMale:
        collection: AU14MaleHoldOrder
      holdOrderSoundFemale:
        collection: AU14FemaleHoldOrder
    - type: UserIFF
      factions:
      - GOVFOR
  hidden: false

- type: startingGear
  id: AU14GearGOVFORAuxTech
  equipment:
    shoes: CMBootsBlackFilled
    ears: AU14HeadsetGovforAuxiliary
    ears2: RMCM5CameraGear
    id: AU14JobIDCardGOVFORAuxTech
  storage:
    back:
    - CMStampApproved

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointGOVFORAuxTech
  name: ent-AU14SpawnPointGOVFORAuxTech
  components:
  - type: SpawnPoint
    job_id: AU14JobGOVFORAuxTech
  - type: Sprite
    state: syn_spawn

- type: startingGear
  id: AU14GearGOVFORAuxTechDummy
  equipment:
    shoes: CMBootsBlackFilled
    back: CMSatchelMarine
  storage:
    back:
    - CMStampApproved
