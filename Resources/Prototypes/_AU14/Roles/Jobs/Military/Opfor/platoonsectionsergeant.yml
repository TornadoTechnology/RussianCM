- type: job
  parent: AU14JobSectionSergeantBase
  id: AU14JobOpforSectionSergeant
  name: job-au14jobopforsectionsergeant-name
  description: job-au14jobopforsectionsergeant-desc
  setPreference: false
  canBeAntag: false
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 18000 # 5 hours
  - !type:TraitsRequirement
    inverted: true
    traits:
    - SocialAnxietyHeavy
    - FrontalLisp
    - NonResuscitable
    - Epilepsy
  ranks:
    RMCRankMasterSergeant:
    - !type:RoleTimeRequirement
      role: AU14JobGOVFORSectionSergeant
      time: 360000 # 100 hours
    RMCRankGunnerySergeant:
    - !type:RoleTimeRequirement
      role: AU14JobGOVFORSectionSergeant
      time: 216000 # 60 hours
#   RMCRankStaffSergeant:
#   - !type:RoleTimeRequirement
#     role: AU14JobGOVFORSectionSergeant
#     time: 36000 # 10 hours
    RMCRankStaffSergeant: []
  startingGear: AU14GearopforSectionSergeant
  dummyStartingGear: AU14GearopforPlatoonSergantDummy
  icon: "AU14JobIconOPFORPlatoonSarge"
  requireAdminNotify: true
  spawnMenuRoleName: job-au14jobopforsectionsergeant-spawnmenurolename
  joinNotifyCrew: false
  supervisors: job-au14jobopforsectionsergeant-supervisors
  accessGroups:
  - AU14OpforCommand
  overwatchSortPriority: -6
  overwatchShowName: true
  overwatchRoleName: job-au14jobopforsectionsergeant-overwatchrolename
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - OPFOR
    - type: Marine
      Faction: opfor
    - type: Skills
      preset: AU14SkillPresetPlatoonSeniorSergeant
    - type: JobPrefix
      prefix: au14-job-prefix-opforSSG
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: leader
    - type: MarineOrders
      moveOrderSoundMale:
        collection: AU14MaleMoveOrder
      moveOrderSoundFemale:
        collection: AU14FemaleMoveOrder
      focusOrderSoundMale:
        collection: AU14MaleFocusOrder
      focusOrderSoundFemale:
        collection: AU14FemaleFocusOrder
      holdOrderSoundMale:
        collection: AU14MaleHoldOrder
      holdOrderSoundFemale:
        collection: AU14FemaleHoldOrder
    - type: UserIFF
      factions:
      - OPFOR
  hidden: false

- type: startingGear
  id: AU14GearopforSectionSergeant
  equipment:
    id: AU14IDCardopforSecSergeant
    ears: AU14HeadsetOpforCommand

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointopforSectionSergeant
  name: ent-AU14SpawnPointopforSectionSergeant
  components:
  - type: SpawnPoint
    job_id: AU14JobOpforSectionSergeant
  - type: Sprite
    state: syn_spawn

- type: startingGear
  id: AU14GearopforPlatoonSergantDummy
  equipment:
    outerClothing: AU14ArmorM3JungleTwo
    shoes: CMBootsBrown
    head: AU14JunglePatrolCap
    jumpsuit: AU14JungleFatigues
    ears: AU14HeadsetOpforCommand
