- type: job
  abstract: true
  parent: AU14JobWorkingJoeBase
  id: AU14JobOPFORWorkingJoeBase
  icon: "AU14JobIconOPFORWorkingJoe"
  spawnMenuRoleName: Working Joe (OPFOR)
  supervisors: au14-job-supervisors-workingjoe-military
  usePlayerProfile: false
  jobEntity: AU14MobWorkingJoeOPFOR
  accessGroups:
  - AU14OpforCommand
  - AUPrisonStaff
  - auwy

- type: job
  parent: AU14JobOPFORWorkingJoeBase
  id: AU14JobOPFORWorkingJoe
  whitelisted: true
  whitelistParent: RMCWhitelistMedium
  requirements:
  - !type:RoleTimeRequirement
    role: AU14JobGOVFORAuxSupportSynth
    time: 9000 # 2.5 hours
  - !type:TraitsRequirement
    inverted: true
    traits:
    - SocialAnxietyHeavy
    - FrontalLisp
    - NonResuscitable
    - Epilepsy
  special:
  - !type:AddComponentSpecial
    components:
    - type: UserIFF
      factions:
      - OPFOR
    - type: IntrinsicRadioTransmitter
      channels:
      - radioAI
      - radioOpforAlpha
      - radioOpforCommand
      - radioOpforCharlie
      - radioOpforBravo
      - radioOpforIntel
      - radioOpforJTAC
    - type: ActiveRadio
      channels:
      - radioAI
      - radioOpforAlpha
      - radioOpforCommand
      - radioOpforCharlie
      - radioOpforBravo
      - radioOpforIntel
      - radioOpforJTAC
    - type: Tag
      tags:
      - WorkingJoe
      - CanPilot
      - FootstepSound
      - DoorBumpOpener
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_AU14/Interface/au14govforjobicons.rsi
        state: working_joe

- type: entity
  parent: CMSpawnPointJobBase
  id: AU14SpawnPointOPFORWorkingJoe
  name: Spawn Point Working Joe (OPFOR)
  components:
  - type: SpawnPoint
    job_id: AU14JobOPFORWorkingJoe
  - type: Sprite
    state: syn_spawn
