- type: entity
  name: ent-ObjectiveMasterBaseFOF
  parent: MarkerBase
  id: ObjectiveMasterBaseFOF
  components:
  - type: Sprite
    state: red
  - type: ObjectiveMaster
    Mode: ForceOnForce
    govforMinorObjectives: 10
    govforMajorObjectives: 5
    opforMinorObjectives: 10
    opforMajorObjectives: 5
    requiredwinpointsgovfor: 100
    requiredwinpointsopfor: 100

    # winpointsgovfor: 100  # Deprecated, now additive
    # winpointsopfor: 100   # Deprecated, now additive



