- type: entity
  parent: RMCCommunicationsConsoleBase
  id: ComputerObjectivesCLF
  name: ent-ComputerObjectivesCLF
  description: ent-ComputerObjectivesCLF-desc
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: ObjectivesConsole
