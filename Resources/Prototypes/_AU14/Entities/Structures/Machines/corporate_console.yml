
- type: entity
  id: AU14CorporateConsoleBase
  abstract: true
  parent: RMCCommunicationsConsoleBase
  name: ent-AU14CorporateConsoleBase
  description: ent-AU14CorporateConsoleBase-desc
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal1_old
  - type: InteractionOutline
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false
  - type: ActivatableUI
    key: enum.CorporateConsoleUi.Key
  - type: CorporateConsole
  - type: UserInterface
    interfaces:
      enum.CorporateConsoleUi.Key:
        type: CorporateConsoleBui
      enum.CorporateConsoleThirdPartyUi.Key:
        type: CorporateConsoleThirdPartyBui
  - type: ItemSlots
    slots:
      CashSlot:
        whitelist:
          tags:
          - Currency
  - type: ContainerContainer
    containers:
      CashSlot: !type:ContainerSlot {}
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [["AU14AccessCorporateWEYULiaison"], ["AU14AccessCorporateWEYU"]]

# Standard Corporate Console — for use in corporate offices
- type: entity
  id: AU14CorporateConsole
  parent: AU14CorporateConsoleBase
  name: ent-AU14CorporateConsole
  description: ent-AU14CorporateConsole-desc
  suffix: ent-AU14CorporateConsole-suffix
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal1_old
  - type: CorporateConsole
    callableParties:
      WYPMCParty: 12500 #RuCM change
      WYHT: 8000 #RuCM change
      IPIESynth: 5000 #RuCM change
