- type: entity
  parent: RMCCommunicationsTower
  id: AU14CommunicationsTower
  suffix: "ent-AU14CommunicationsTower-suffix"
  name: ent-AU14CommunicationsTower
  description: ent-AU14CommunicationsTower-desc
  components:
