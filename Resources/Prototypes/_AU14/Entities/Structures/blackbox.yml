- type: entity
  parent: BaseStructureDynamic
  id: AU14BlackBoxRecorder
  name: ent-AU14BlackBoxRecorder
  description: ent-AU14BlackBoxRecorder-desc
  components:
  - type: Anchorable
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Dynamic
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:EmptyAllContainersBehaviour
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          CMSheetMetal1:
            min: 1
            max: 1
  - type: Sprite
    sprite:  _AU14/Structures/blackbox.rsi
    state: blackbox
