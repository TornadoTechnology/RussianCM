- type: entity
  parent: BaseItemCabinet
  id: AU14DefibrillatorCabinet
  name: ent-AU14DefibrillatorCabinet
  description: ent-AU14DefibrillatorCabinet-desc
  placement:
    mode: SnapgridCenter
  components:
  - type: WallMount
    arc: 175
  - type: Transform
    anchored: true
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _AU14/Structures/audefibcabinet.rsi
    noRot: false
    layers:
    - state: frame
    - state: fill
      map: ["enum.ItemCabinetVisuals.Layer"]
      visible: true
    - state: closed
      map: ["enum.OpenableVisuals.Layer"]
  - type: ItemSlots
    slots:
      ItemCabinet:
        ejectOnInteract: true
        whitelist:
          components:
          - Defibrillator
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 80
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger: !type:DamageTrigger
        damage: 40
      behaviors:
      - !type:EmptyAllContainersBehaviour
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak

- type: entity
  parent: AU14DefibrillatorCabinet
  id: CMUDefibrillatorCabinetFilled
  suffix: ent-CMUDefibrillatorCabinetFilled-suffix
  components:
  - type: ContainerFill
    containers:
      ItemCabinet:
      - AU14CMDefibrillator

- type: entity
  parent: DefibrillatorCabinet
  id: AU14DefibrillatorCabinetOpen
  suffix: ent-AU14DefibrillatorCabinetOpen-suffix
  components:
  - type: Openable
    opened: true

- type: entity
  parent: DefibrillatorCabinet
  id: AU14DefibrillatorCabinetFilled
  suffix: ent-AU14DefibrillatorCabinetFilled-suffix
  components:
  - type: ContainerFill
    containers:
      ItemCabinet:
      - Defibrillator

- type: entity
  parent: [DefibrillatorCabinetFilled, DefibrillatorCabinetOpen]
  id: AU14DefibrillatorCabinetFilledOpen
  suffix: ent-AU14DefibrillatorCabinetFilledOpen-suffix
