# ├──[ CONSTRUCTION GRAPH ]──────────────────────────────────────────┤
- type: constructionGraph
  parent: RMC
  id: AU14SignGraph
  start: start
  graph:
  - node: start
    actions:
    - !type:DeleteEntity {}
    edges:
    - to: sign_mines
      steps:
      - material: RMCWood
        amount: 2
        doAfter: 2
    - to: sign_evaccenter
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
    - to: sign_cpahead
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
    - to: sign_armyorders
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
    - to: sign_freqtune
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
    - to: sign_slowdown
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
    - to: sign_empty
      steps:
      - material: CMSteel
        amount: 4
        doAfter: 5
  - node: sign_mines
    entity: DecorSignMinesProp
    edges:
    - to: start
      steps:
      - tool: Screwing
        doAfter: 3
      completed:
        - !type:SpawnPrototype
          prototype: RMCPlankWood2
  - node: sign_evaccenter
    entity: AU14PropTrafficDirector1
    edges:
    - to: start
      steps:
      - tool: Anchoring
        doAfter: 3
      - tool: Prying
        doAfter: 4
      completed:
        - !type:SpawnPrototype
          prototype: CMSheetMetal1
  - node: sign_cpahead
