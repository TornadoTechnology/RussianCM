- type: entity
  parent: [ BaseStructureDynamic, BaseBagOpenClose, StructureWheeled ]
  id: AU14Dumpster
  name: ent-AU14Dumpster
  description: ent-AU14Dumpster-desc
  abstract: true
  components:
  - type: Storage
    maxItemSize: Ginormous
    grid:
    - 0,0,15,5
  - type: SpriteFade
  - type: InteractionOutline
  - type: Sprite
    noRot: true
    sprite: _AU14/Structures/dumpsters.rsi
    drawdepth: Overdoors
    offset: 0.5,0.5
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,1.5,0.5"
        density: 1000
        mask:
        - MachineMask
        layer:
        - WallLayer
  - type: Anchorable
  - type: Rotatable
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak

- type: entity
  parent: AU14Dumpster
  id: AU14DumpsterBlue
  suffix: ent-AU14DumpsterBlue-suffix
  components:
  - type: Sprite
    state: blue
    layers:
    - state: blue
    - state: blue-open
      map: ["openLayer"]

