    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: smartguncell
  - type: Battery
    maxCharge: 10000
    startingCharge: 10000
  - type: SmartGunBattery
  - type: PhysicalComposition
    materialComposition: {}

- type: Tag
  id: AU14MagazineSmartGunUPP

- type: Tag
  id: AU14CartridgeSmartGun127x40mm
