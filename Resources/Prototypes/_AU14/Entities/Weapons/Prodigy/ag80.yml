- type: entity
  parent: CMBaseWeaponRifle
  name: ent-AU14WeaponRifleprodigyrifleAR
  id: AU14WeaponRifleprodigyrifleAR
  description: ent-AU14WeaponRifleprodigyrifleAR-desc
  components:
  - type: Sprite
    sprite: _AU14/Weapons/Guns/Prodigy/mcsmxpr32x64.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Item
    sprite: _AU14/Weapons/Guns/Prodigy/mcsmxpr32x32.rsi
    size: Large
  - type: Clothing
    sprite: _AU14/Weapons/Guns/Prodigy/mcsmxpr32x32.rsi
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Gun
    selectedMode: FullAuto
    shotsPerBurst: 2
    availableModes:
    - SemiAuto
    - Burst
    - FullAuto
    soundGunshot:
      collection: AU14M41FireSound
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    - FullAuto
    recoilUnwielded: 4.1
    scatterWielded: 2.1
    scatterUnwielded: 15
    baseFireRate: 4.1
    burstScatterMult: 1
    modifiers:
      Burst:
        fireDelay: 0.0666
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.5
    accuracyMultiplierUnwielded: 0.8
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/m41_unload.ogg
        priority: 2
        whitelist:
          tags:
          - AU14WeaponRifleprodigyrifleMagazineStandard
          - AU14WeaponRifleprodigyrifleMagazineAP
        startingItem: AU14WeaponRifleprodigyrifleMagazineStandard
  - type: GunDamageModifier
    multiplier: 1.25
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentExtendedCompensator
          - RMCAttachmentSuppressor
          - RMCM5Bayonet
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentVerticalGrip
          - RMCAttachmentFlashlightGrip
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS6ReflexSight
          - RMCAttachmentS42xTelescopicMiniscope
          - RMCAttachmentS84xTelescopicScope
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.56, 0.063
      rmc-aslot-rail: -0.32, 0.22
      rmc-aslot-underbarrel: 0.10875, -0.30

- type: entity
