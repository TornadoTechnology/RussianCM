- type: entity
  name: ent-AU14MaintenanceJack
  parent: BaseItem
  id: AU14MaintenanceJack
  description: ent-AU14MaintenanceJack-desc
  components:
  - type: Tag
    tags:
    - Wrench
    - Crowbar
  - type: Sprite
    sprite: _AU14/Objects/Tools/maintenance_jack.rsi
    state: icon
  - type: Item
    size: Small
  - type: Clothing
    quickEquip: false
    slots:
      - Belt
      - Suitstorage
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_RMC14/Handling/crowbar_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/crowbar_drop.ogg
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/crowbar_drop.ogg
      params:
        volume: -4
  - type: ToolTileCompatible
    delay: 0.5
  - type: Tool
    qualities:
      - Prying
  - type: Prying
    speedModifier: 100000
  - type: MultipleTool
    statusShowBehavior: true
    entries:
      - behavior: Prying
        sprite:
          sprite: _AU14/Objects/Tools/maintenance_jack.rsi
          state: icon
        useSound: /Audio/Items/crowbar.ogg
      - behavior: Anchoring
        sprite:
          sprite: _AU14/Objects/Tools/maintenance_jack.rsi
          state: wrench
        useSound: /Audio/Items/ratchet.ogg
  - type: MeleeWeapon
    wideAnimationRotation: 90
    attackRate: 0.87
    damage:
      types:
        Blunt: 27
        Structural: 36
    soundHit:
      collection: GenericHit
