- type: entity
  parent: CMSatchel
  id: AU14BackpackRTOPackBlack
  name: "ent-AU14BackpackRTOPackBlack"
  description: "ent-AU14BackpackRTOPackBlack-desc"
  components:
    - type: Sprite
      sprite: _AU14/Clothing/RTOPack/blackrtopack.rsi
      layers:
        - state: icon
          map: ["base"]
    - type: Storage
      maxItemSize: Large
      grid:
        - 0,0,4,1
      blacklist:
        tags:
          - Backpack
    - type: CMStorageVisualizer
      storageClosed: null
      storageOpen: null
    - type: RotaryPhone
      category: Marine
    - type: RotaryPhoneBackpack
    - type: UserInterface
      interfaces:
        enum.RMCTelephoneUiKey.Key:
          type: RMCTelephoneBui
        enum.StorageUiKey.Key:
          type: StorageBoundUserInterface
    - type: ActivatableUIBlacklist
      blacklist:
        components:
          - Xeno
    - type: GenericVisualizer
      visuals:
        enum.RotaryPhoneLayers.Layer:
          base:
            Base: { state: icon }
            Ring: { state: ring }
            Ear: { state: ear }
    - type: Undisposable

