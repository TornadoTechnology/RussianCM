  description: ent-AU14EncryptionKeyOpforJTAC-desc
  components:
  - type: EncryptionKey
    channels:
    - radioOpforJTAC

- type: entity
  parent: AU14EncryptionKeyOpfor
  id: AU14EncryptionKeyOpforMILP
  name: ent-AU14EncryptionKeyOpforMILP
  components:
  - type: EncryptionKey
    channels:
    - radioOpforMILP

# ├──[ HEADSETS ]────────────────────────────────────────────────────┤
- type: entity
  parent: RMCHeadsetShip
  id: AU14HeadsetOpforMarine
  name: ent-AU14HeadsetOpforMarine
  description: ent-AU14HeadsetOpforMarine-desc
  components:
  - type: Sprite
    state: generic_headset
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - FireteamLeader
    - BattleBuddy
    - SeniorEnlistedAdvisor
    - PrimaryLandingZone

- type: entity
  parent: AU14HeadsetOpforMarine
  id: AU14HeadsetOpforCommand
  name: ent-AU14HeadsetOpforCommand
  description: ent-AU14HeadsetOpforCommand-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
      - AU14EncryptionKeyOpforCommand
      - AU14EncryptionKeyOpforBravo
      - AU14EncryptionKeyOpforCharlie
      - AU14EncryptionKeyOpforIntel
      - AU14EncryptionKeyOpforJTAC
      - AU14EncryptionKeyOpforMILP

- type: entity
  parent: AU14HeadsetOpforMarine
  id: AU14HeadsetOpforMarineSL
  name: ent-AU14HeadsetOpforMarineSL
  description: ent-AU14HeadsetOpforMarineSL-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
      - AU14EncryptionKeyOpforCommandOnly
      - AU14EncryptionKeyOpforJTAC

- type: entity
  parent: AU14HeadsetOpforMarine
  id: AU14HeadsetOpforMarineFTL
  name: ent-AU14HeadsetOpforMarineFTL
  description: ent-AU14HeadsetOpforMarineFTL-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
      - AU14EncryptionKeyOpforJTAC

- type: entity
  parent: AU14HeadsetOpforMarine
  id: AU14HeadsetOpforAuxiliary
  name: ent-AU14HeadsetOpforAuxiliary
  description: ent-AU14HeadsetOpforAuxiliary-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
      - AU14EncryptionKeyOpforCommandOnly
      - AU14EncryptionKeyOpforIntel

- type: entity
  parent: AU14HeadsetOpforMarine
  id: AU14HeadsetOpforMarineMP
  name: ent-AU14HeadsetOpforMarineMP
  description: ent-AU14HeadsetOpforMarineMP-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyOpfor
      - AU14EncryptionKeyOpforCommand
#     - AU14EncryptionKeyOpforCommandOnly
      - AU14EncryptionKeyOpforMILP
