  id: AU14EncryptionKeyOpforCommand
  name: ent-AU14EncryptionKeyOpforCommand
  description: ent-AU14EncryptionKeyOpforCommand-desc
  components:
  - type: EncryptionKey
    channels:
    - radioOpforAlpha
    - radioOpforCharlie
    - radioOpforBravo
    - radioOpforCommand
    - radioOpforIntel
    - radioOpforJTAC
    - radioOpforMILP
    defaultChannel: radioOpforCommand

- type: entity
