# ├──[ ENCRYPTIONKEYS ]──────────────────────────────────────────────┤
- type: entity
  parent: AU14EncryptionKey
  id: AU14EncryptionKeyOpfor
  name: ent-AU14EncryptionKeyOpfor
  description: ent-AU14EncryptionKeyOpfor-desc

- type: entity
  parent: AU14EncryptionKeyOpfor
  id: AU14EncryptionKeyOpforBravo
  name: ent-AU14EncryptionKeyOpforBravo
  description: ent-AU14EncryptionKeyOpforBravo-desc
  components:
  - type: EncryptionKey
    channels:
    - radioOpforBravo
    defaultChannel: radioOpforBravo

- type: entity
  parent: AU14EncryptionKeyOpfor
  id: AU14EncryptionKeyOpforCharlie
  name: ent-AU14EncryptionKeyOpforCharlie
  description: ent-AU14EncryptionKeyOpforCharlie-desc
