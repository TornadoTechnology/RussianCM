# ├──[ ENCRYPTIONKEYS ]──────────────────────────────────────────────┤
- type: entity
  parent: AU14EncryptionKey
  id: AU14EncryptionKeyGovfor # blank key, channel set by SquadSystem.cs
  name: ent-AU14EncryptionKeyGovfor
  description: ent-AU14EncryptionKeyGovfor-desc

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforBravo
  name: ent-AU14EncryptionKeyGovforBravo
  description: ent-AU14EncryptionKeyGovforBravo-desc
  components:
  - type: EncryptionKey
    channels:
    - radioGovforBravo
    defaultChannel: radioGovforBravo

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforCharlie
  name: ent-AU14EncryptionKeyGovforCharlie
  description: ent-AU14EncryptionKeyGovforCharlie-desc
  components:
  - type: EncryptionKey
    channels:
    - radioGovforCharlie
    defaultChannel: radioGovforCharlie

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforCommand
  name: ent-AU14EncryptionKeyGovforCommand
  description: ent-AU14EncryptionKeyGovforCommand-desc
  components:
  - type: EncryptionKey
    channels:
    - radioGovforAlpha
    - radioGovforBravo
    - radioGovforCharlie
    - radioGovforCommand
    - radioGovforIntel
    - radioGovforJTAC
    - radioGovforMILP
    defaultChannel: radioGovforCommand

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforCommandOnly
  name: ent-AU14EncryptionKeyGovforCommandOnly
  description: ent-AU14EncryptionKeyGovforCommandOnly-desc
  components:
  - type: EncryptionKey
    channels:
    - radioGovforCommand
    defaultChannel: radioGovforCommand

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforIntel
  name: ent-AU14EncryptionKeyGovforIntel
  description: ent-AU14EncryptionKeyGovforIntel-desc
  components:
  - type: EncryptionKey
    channels:
    - radioGovforIntel
    defaultChannel: radioGovforIntel

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforJTAC
  name: ent-AU14EncryptionKeyGovforJTAC
  description: ent-AU14EncryptionKeyGovforJTAC-desc
  components:
  - type: EncryptionKey
    channels:
    - radioGovforJTAC

- type: entity
  parent: AU14EncryptionKeyGovfor
  id: AU14EncryptionKeyGovforMILP
  name: ent-AU14EncryptionKeyGovforMILP
  description: ent-AU14EncryptionKeyGovforMILP-desc
  components:
  - type: EncryptionKey
    channels:
    - radioGovforMILP

# ├──[ HEADSETS ]────────────────────────────────────────────────────┤
- type: entity
  parent: RMCHeadsetShip
  id: AU14HeadsetGovforMarine
  name: ent-AU14HeadsetGovforMarine
  description: ent-AU14HeadsetGovforMarine-desc
  components:
  - type: Sprite
    state: generic_headset
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyGovfor
  - type: GrantSquadLeaderTracker
    defaultMode: SquadLeader
    trackerModes:
    - SquadLeader
    - FireteamLeader
    - BattleBuddy
    - SeniorEnlistedAdvisor
    - PrimaryLandingZone

- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14HeadsetGovforCommand
  name: ent-AU14HeadsetGovforCommand
  description: ent-AU14HeadsetGovforCommand-desc
  components:
  - type: ContainerFill
    containers:
      key_slots: # give all usable keys for emergencies/promotions
      - AU14EncryptionKeyGovfor # empty key when taken out
      - AU14EncryptionKeyGovforCommand
      - AU14EncryptionKeyGovforBravo
      - AU14EncryptionKeyGovforCharlie
      - AU14EncryptionKeyGovforIntel
      - AU14EncryptionKeyGovforJTAC
      - AU14EncryptionKeyGovforMILP

- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14HeadsetGovforMarineSL
  name: ent-AU14HeadsetGovforMarineSL
  description: ent-AU14HeadsetGovforMarineSL-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyGovfor
      - AU14EncryptionKeyGovforCommandOnly
      - AU14EncryptionKeyGovforJTAC

- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14HeadsetGovforMarineFTL
  name: ent-AU14HeadsetGovforMarineFTL
  description: ent-AU14HeadsetGovforMarineFTL-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyGovfor
      - AU14EncryptionKeyGovforJTAC

- type: entity
  parent: RMCHeadsetShip
  id: AU14HeadsetGovforAuxiliary
  name: ent-AU14HeadsetGovforAuxiliary
  description: ent-AU14HeadsetGovforAuxiliary-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyGovfor
      - AU14EncryptionKeyGovforCommandOnly
      - AU14EncryptionKeyGovforIntel

- type: entity
  parent: AU14HeadsetGovforMarine
  id: AU14HeadsetGovforMarineMP
  name: ent-AU14HeadsetGovforMarineMP
  description: ent-AU14HeadsetGovforMarineMP-desc
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - AU14EncryptionKeyGovfor
      - AU14EncryptionKeyGovforCommand
#     - AU14EncryptionKeyGovforCommandOnly
      - AU14EncryptionKeyGovforMILP
