- type: entity
  parent: CMWebbingBase
  id: AU14WebbingMagazine
  name: ent-AU14WebbingMagazine
  description: ent-AU14WebbingMagazine-desc
  components:
    - type: Sprite
      sprite: _AU14/Clothing/UniversalWebbing/magazinewebbing.rsi
      state: webbing
    - type: Storage
      maxItemSize: Normal
      grid:
        - 0,0,5,1 # 3 slots
    - type: FixedItemSizeStorage
    - type: IgnoreContentsSize
      items:
        tags:
          - MRE
          - PillPacket
          - PillCanister
          - CMSurgicalCase
    - type: Webbing
      playerSprite:
        sprite: _AU14/Clothing/UniversalWebbing/magazinewebbing.rsi
        state: equipped
      components:
        - type: Storage
          maxItemSize: Small
          grid:
            - 0,0,5,1 # 3 slots
        - type: IgnoreContentsSize
          items:
            tags:
              - CMMagazineSmg
              - CMMagazinePistol
              - CMMagazineRifle
              - CMMagazineSniper
              - MRE
              - PillPacket
              - PillCanister
              - CMSurgicalCase
        - type: FixedItemSizeStorage
        - type: RMCStorageEjectHand
          state: Open
        - type: ExplosionResistance
          damageCoefficient: 0
          worn: false
        - type: StoreAfterFailedInteract

