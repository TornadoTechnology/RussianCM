# Abstract base — all abomination actions parent this so they get the
# cooldown-sweep background visual (matches the xeno action chrome).
- type: entity
  abstract: true
  id: ActionAbominationBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    backgroundOn:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: template_active_big

# --- Spider ---

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationSpiderLeap
  name: ent-ActionAbominationSpiderLeap
  description: ent-ActionAbominationSpiderLeap-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: pounce
    useDelay: 5
  - type: TargetAction
    range: 6
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:Content.Shared._AU14.Abominations.Abilities.AbominationLeapActionEvent

- type: entity
  parent: ActionAbominationBase
  id: ActionAbominationSpiderSpit
  name: ent-ActionAbominationSpiderSpit
  description: ent-ActionAbominationSpiderSpit-desc
  components:
