- type: job
  parent: CMJobBase
  id: AU14JobCLFSurvLeader
  name: au14-job-name-clfcellleader
  description: au14-clfsurv-greeting
  playTimeTracker: AU14CLFSurvivorLead
  startingGear: AU14GearCLFSurvLeader
  greeting: au14-clfsurv-greeting
  icon: "CMJobIconEmpty"
  joinNotifyCrew: false
  supervisors: au14-job-supervisors-clfcellleader
  accessGroups:
  - Colonist
  special:
  - !type:AddComponentSpecial
    components:
    - type: NpcFactionMember
      factions:
      - CLF
    - type: Skills
      skills:
        RMCSkillCqc: 2
        RMCSkillConstruction: 2
        RMCSkillEndurance: 2
        RMCSkillEngineer: 2
        RMCSkillFirearms: 2
        RMCSkillFireman: 2
        RMCSkillIntel: 2
        RMCSkillJtac: 4
        RMCSkillLeadership: 3
        RMCSkillMedical: 1
        RMCSkillNavigations: 1
        RMCSkillOverwatch: 1
        RMCSkillPolice: 1
        RMCSkillPowerLoader: 1
        RMCSkillSurgery: 1
        RMCSkillVehicles: 1
    - type: EquipEntityPreset
      preset: AU14CLFSurvLeaderPreset
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: synth
  hidden: false

- type: entity
  parent: AU14BaseMobSpeciesOrganicCLF
  id: AU14CLFSurvLeader
  name: CLF CellLeader (Survivor)
  components:
  - type: GhostTakeoverAvailable
  - type: GhostRoleApplySpecial
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: au14-job-name-clfcellleader
    description: au14-clfsurv-desription
    reregister: false
    job: AU14JobCLFSurvLeader
    raffle:
      settings: short
    rules: au14-clfsurv-desription

