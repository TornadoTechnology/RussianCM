- type: entity
  id: BasePart
  parent: BaseItem
  name: "ent-BasePart"
  abstract: true
  components:
  - type: Damageable
    damageContainer: Biological
  - type: BodyPart
  - type: Gibbable
  - type: ContainerContainer
    containers:
      bodypart: !type:Container
        ents: []
  - type: StaticPrice
    price: 100
  - type: Tag
    tags:
      - Trash

- type: entity
  id: BaseTorso
  name: "ent-BaseTorso"
  parent: BasePart
  abstract: true
  components:
  - type: BodyPart
    partType: Torso

- type: entity
  id: BaseHead
  name: "ent-BaseHead"
  parent: BasePart
  abstract: true
  components:
  - type: BodyPart
    partType: Head
    vital: true
  - type: Input
    context: "ghost"
  - type: Tag
    tags:
      - Head

- type: entity
  id: BaseLeftArm
  name: "ent-BaseLeftArm"
  parent: BasePart
  abstract: true
  components:
  - type: BodyPart
    partType: Arm
    symmetry: Left

- type: entity
  id: BaseRightArm
  name: "ent-BaseRightArm"
  parent: BasePart
  abstract: true
  components:
  - type: BodyPart
    partType: Arm
    symmetry: Right

- type: entity
  id: BaseLeftHand
  name: "ent-BaseLeftHand"
  parent: BasePart
  abstract: true
  components:
  - type: BodyPart
    partType: Hand
    symmetry: Left

- type: entity
  id: BaseRightHand
  name: "ent-BaseRightHand"
  parent: BasePart
  abstract: true
  components:
  - type: BodyPart
    partType: Hand
    symmetry: Right

- type: entity
  id: BaseLeftLeg
  name: "ent-BaseLeftLeg"
  parent: BasePart
  abstract: true
  components:
  - type: BodyPart
    partType: Leg
    symmetry: Left
  - type: MovementBodyPart
    walkSpeed: 2.7
    sprintSpeed: 5

- type: entity
  id: BaseRightLeg
  name: "ent-BaseRightLeg"
  parent: BasePart
  abstract: true
  components:
  - type: BodyPart
    partType: Leg
    symmetry: Right
  - type: MovementBodyPart
