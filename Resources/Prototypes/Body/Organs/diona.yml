- type: entity
  id: BaseDionaOrgan
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Diona/organs.rsi
  - type: Organ
  - type: Food
  - type: Extractable
    grindableSolutionName: organ
  - type: SolutionContainerManager
    solutions:
      organ:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: FlavorProfile
    flavors:
      - people

- type: entity
  id: OrganDionaBrain
  parent: [BaseDionaOrgan, OrganHumanBrain]
  name: ent-OrganDionaBrain
  description: "ent-OrganDionaBrain-desc"
  components:
  - type: Item
    size: Small
    heldPrefix: brain
  - type: Sprite
    state: brain
  - type: SolutionContainerManager
    solutions:
      organ:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      Lung:
        maxVol: 100
        canReact: False
      food:
        maxVol: 5
        reagents:
        - ReagentId: GreyMatter
          Quantity: 5

- type: entity
  id: OrganDionaEyes
  parent: BaseDionaOrgan
  name: ent-OrganDionaEyes
  description: "ent-OrganDionaEyes-desc"
  components:
  - type: Sprite
    layers:
      - state: eyeball-l
      - state: eyeball-r

- type: entity
  id: OrganDionaStomach
  parent: BaseDionaOrgan
  name: ent-OrganDionaStomach
  description: "ent-OrganDionaStomach-desc"
  components:
  - type: Sprite
    state: stomach
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50
      food:
        maxVol: 5
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
  - type: Stomach
  - type: Metabolizer
    maxReagents: 6
    metabolizerTypes: [ Plant ]
    removeEmpty: true
    groups:
      - id: Food
      - id: Drink
      - id: Medicine
      - id: Poison
      - id: Narcotic
      - id: Alcohol
        rateModifier: 0.1
  - type: Item
    size: Small
    heldPrefix: stomach

- type: entity
  id: OrganDionaLungs
  parent: BaseDionaOrgan
  name: ent-OrganDionaLungs
  description: "ent-OrganDionaLungs-desc"
  components:
  - type: Sprite
    state: lungs
  - type: Item
    size: Small
    heldPrefix: lungs
  - type: Lung 
  - type: Metabolizer
    removeEmpty: true
    solutionOnBody: false
    solution: "Lung"
    metabolizerTypes: [ Plant ]
    groups:
    - id: Gas
      rateModifier: 100.0
  - type: SolutionContainerManager
    solutions:
      organ:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
      Lung:
        maxVol: 100
        canReact: False

# Organs that turn into nymphs on removal
- type: entity
  id: OrganDionaBrainNymph
  parent: OrganDionaBrain
  categories: [ HideSpawnMenu ]
  name: ent-OrganDionaBrainNymph
  description: "ent-OrganDionaBrainNymph-desc"
  components:
  - type: Brain
  - type: Nymph # This will make the organs turn into a nymph when they're removed. 
    entityPrototype: OrganDionaNymphBrain
    transferMind: true

- type: entity
  id: OrganDionaStomachNymph
  parent: OrganDionaStomach
  categories: [ HideSpawnMenu ]
  name: ent-OrganDionaStomachNymph
  description: "ent-OrganDionaStomachNymph-desc"
  components:
  - type: Nymph
    entityPrototype: OrganDionaNymphStomach

- type: entity
  id: OrganDionaLungsNymph
  parent: OrganDionaLungs
  categories: [ HideSpawnMenu ]
  name: ent-OrganDionaLungsNymph
  description: "ent-OrganDionaLungsNymph-desc"
  components:
  - type: Nymph
    entityPrototype: OrganDionaNymphLungs

# Nymphs that the organs will turn into
- type: entity
  id: OrganDionaNymphBrain
  parent: MobDionaNymph
  categories: [ HideSpawnMenu ]
  name: ent-OrganDionaNymphBrain
  suffix: ent-OrganDionaNymphBrain-suffix
  description: ent-OrganDionaNymphBrain-desc
  components:
  - type: IsDeadIC
  - type: Body
    prototype: AnimalNymphBrain

- type: entity
  id: OrganDionaNymphStomach
  parent: MobDionaNymphAccent 
  categories: [ HideSpawnMenu ]
  name: ent-OrganDionaNymphStomach
  suffix: ent-OrganDionaNymphStomach-suffix
  description: ent-OrganDionaNymphStomach-desc
  components:
  - type: IsDeadIC
  - type: Body
    prototype: AnimalNymphStomach

- type: entity
  id: OrganDionaNymphLungs
  parent: MobDionaNymphAccent
  categories: [ HideSpawnMenu ]
  name: ent-OrganDionaNymphLungs
  suffix: ent-OrganDionaNymphLungs-suffix
  description: ent-OrganDionaNymphLungs-desc
  components:
  - type: IsDeadIC
  - type: Body
    prototype: AnimalNymphLungs
