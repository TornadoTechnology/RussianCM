# Blacklist is for throwing error when found on maps
# Whitelist is for overriding the blacklisted regex
# on_paths allows us to execute a type on specific files
# entityMatchers has full regex support
- id: "GeneralBlacklist"
  type: "Blacklist"
  entityMatchers:
  - "CMStamp.*"
  - "RMCStamp.*"
  - "CMIdCard.*"
  - "AU14IDCard.*"
  - "CMUAdminAccessConfigurator"
  - "RMCAdminAccessConfigurator"
  - "RMCAdminFax"
  - "AdminPDA"
  - "AdminHypo"
  - "RMCPlushie.*"

- id: "AllowAllOnAdminMaps"
  type: "Whitelist"
  on_paths:
  - "adminfaxhub.yml"
  - "admin_fax.yml"
  - "admin_fax_old.yml"
  - "dev_map.yml"
  entityMatchers:
  - ".*"

# ├──[ Prototypes marked with suffix "Don't Map" ]───────────────────┤
- id: "DoNotMapSpecifiers"
  type: "Blacklist"
  entityMatchers:
  - "AU14SpawnPoint.*K9Handler"
  - "RMCDebugSoundDevice"
  - "RMCPillAntiZed"
  - "RMCBottleAntiZed"
  - "RMCBlackGooGlass.*"

# ├──[ Legacy Map Stamps support - should remove them instead ]──────┤
- id: "AllowFactionStamps"
  type: "Whitelist"
  entityMatchers:
  - "CMStamp(Liaison|CO|QM)"
  - "RMCStamp(FreePress|TSE|SPP|CLF)"

# ├──[ Legacy Approved/Denied Stamps - remove them for AU14Stamp ]───┤
- id: "AllowApprovedDeniedStamps"
  type: "Whitelist"
  entityMatchers:
  - "CMStamp(Approved|Denied)"

# ├──[ Warships ]────────────────────────────────────────────────────┤
- id: "USSBushWarship"
  type: "Whitelist"
  on_paths:
  - "USSBush_above.yml"
  - "USSBush.yml"
  - "USSBush_below.yml"
  entityMatchers:
  - "CMStamp.*"

- id: "USSBushWarshipRedux"
  type: "Whitelist"
  on_paths:
  - "USSBushReworkFinalize0"
  - "USSBushReworkFinalize-1"
  - "USSBushReworkFinalize1"
  - "USSBushReworkFinalize2"
  - "USSBushReworkFinalize3"
  entityMatchers:
  - "CMStamp.*"

- id: "AllowStampsOnWarships"
  type: "Whitelist"
  on_paths:
  - "almayer_rucm.yml" # rucm
  - "almayer.yml"
  - "savannah.yml"
  entityMatchers:
  - "CMStamp.*"

# ├──[ Plushies ]────────────────────────────────────────────────────┤
- id: "AllowedPlushies"
  type: "Whitelist"
  entityMatchers:
  - "RMCPlushieMoth"
  - "RMCPlushieSharkBlue"
  - "RMCPlushieGnarpGnarp"

# ├──[ Figurines ]───────────────────────────────────────────────────┤
- id: "RemoveFigurines"
  type: "Blacklist"
  entityMatchers:
  - "RMCFigurine.*"

# ├──[ Comms / Sensor Towers ]───────────────────────────────────────┤
- id: "SensorCommsTowers"
  type: "Blacklist"
  entityMatchers:
  - "RMCCommunicationsTower.*"
  - "RMCSensorTower.*"

- id: "SensorCommsTowersProps"
  type: "Whitelist"
  entityMatchers:
  - "RMCCommunicationsTowerProp.*"

# ├──[ Unused Vending Machines (base ss14) ]─────────────────────────┤
- id: "BaseGameVendingMachines"
  type: "Blacklist"
  entityMatchers:
    - "VendingMachine(Engi|Booze|Cart|Chef|Dinner|Med|Nutri|Sec|Robotics|Salvage|WallMed|HappyHonk|Chemicals|Chapel).*"
    - "VendingMachineSeeds"     # there's also SeedsUnlocked
    - "VendingMachine.*robe.*"  # secdrobe, lawdrobe, hydrobe, etc.

