name: Notify Discord on Issue Opened

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: read

jobs:
  new_issue_send_discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send New Issue
        uses: actions/github-script@v9
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          script: |
            const webhook = process.env.DISCORD_WEBHOOK_URL;
            if (!webhook) {
              core.info("DISCORD_WEBHOOK_URL is not configured; skipping Discord notification.");
              return;
            }

            const issue = context.payload.issue;
            const payload = {
              embeds: [{
                title: "🔔 Новая Issue",
                description: `[Номер #${issue.number}](${issue.html_url})\n**${issue.title}**\n_от_ **${issue.user.login}**`,
                color: 0x5865F2,
              }],
            };

            const response = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              throw new Error(`Discord webhook failed: ${response.status} ${await response.text()}`);
            }
