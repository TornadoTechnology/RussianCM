name: PR Discord Notify

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Embed
        uses: actions/github-script@v9
        env:
          DISCORD_WEBHOOK_PR: ${{ secrets.DISCORD_WEBHOOK_PR }}
        with:
          script: |
            const webhook = process.env.DISCORD_WEBHOOK_PR;
            if (!webhook) {
              core.info("DISCORD_WEBHOOK_PR is not configured; skipping Discord notification.");
              return;
            }

            const pr = context.payload.pull_request;
            const payload = {
              embeds: [{
                title: "📢 Новый Pull Request",
                description: `**${pr.title}**`,
                url: pr.html_url,
                color: 5814783,
                author: {
                  name: pr.user.login,
                },
                fields: [
                  {
                    name: "📦 Бранч",
                    value: `${pr.head.ref} → ${pr.base.ref}`,
                    inline: true,
                  },
                  {
                    name: "🔢 Номер PR",
                    value: `#${pr.number}`,
                    inline: true,
                  },
                  {
                    name: "🕒 Статус",
                    value: pr.draft ? "Draft" : "Ready",
                    inline: true,
                  },
                ],
                footer: {
                  text: "GitHub Actions",
                },
              }],
            };

            const response = await fetch(webhook, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              throw new Error(`Discord webhook failed: ${response.status} ${await response.text()}`);
            }
