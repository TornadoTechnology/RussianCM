name: "Labels: Approved"
on:
  pull_request_review:
    types: [submitted]
jobs:
  update_review_labels:
    if: ${{ github.event.review.state == 'approved' || github.event.review.state == 'changes_requested' }}
    permissions:
      pull-requests: read
      issues: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/github-script@v9
      with:
        script: |
          const issue_number = context.payload.pull_request.number;
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const state = context.payload.review.state;

          const add = state === "approved" ? "S: Approved" : "S: Awaiting Changes";
          const remove = state === "approved"
            ? ["S: Awaiting Changes", "S: Needs Review"]
            : ["S: Approved", "S: Needs Review"];

          await github.rest.issues.addLabels({
            owner,
            repo,
            issue_number,
            labels: [add],
          });

          for (const name of remove) {
            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
          }
